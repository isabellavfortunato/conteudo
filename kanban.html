elado. Em minutos você vê o tamanho da diferença e para de contar com dinheiro que ainda não é seu. Isso porque tem cliente que pediu para pagar daqui a 30 dias, quando paga. Tem cliente que parcelou em 10 vezes, então de 10 você recebeu um. Enquanto isso, as suas contas continuam vencendo do mesmo jeito. O seu relatório de vendas mostra um número e a sua conta mostra a realidade. Vender é ótimo e merece comemoração, mas o que segura a sua empresa de fato é o dinheiro que já está na conta. Então você tem que tomar conta desses 2 números, o que você vendeu e o que de fato entrou. E as contas para pagar estão chegando de qualquer forma. Cuidado E você, que já está me seguindo o que eu sei, sabe quanto vendeu no mês passado e quanto de fato entrou na sua conta? Me conta aqui.", "legenda": "Você vendeu muito e mesmo assim a conta está vazia? O que você vende e o que entra na conta são coisas diferentes. Tem cliente que paga em 30 dias, que parcelou em 10 ou que some e dá calote. O relatório de vendas mostra um número e a conta mostra a verdade. Baixe um extrato só de entradas e outro só de saídas, jogue no Claude com o relatório de vendas e veja quanto de fato entrou."}}]}, {"id": "072", "date": "10/09", "dow": "qui", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "O medo de crescer", "det": {"theme": "Mentalidade de dona de negócio", "tela": "Você tem medo da dona que precisa se tornar?", "corpo": "Você sonha em crescer e trava toda vez que chega perto, porque crescer pede uma dona que você ainda tem medo de virar. Para mim o medo de crescer é o maior sabotador que existe. É óbvio que crescer vem com grandes responsabilidades, isso é um fato. Mas várias outras coisas na vida dão responsabilidade e nem por isso a gente sai correndo. O que ajuda nesse medo é conversar com outras empresárias que estão sentindo a mesma coisa, porque parece que elas não existem. Ninguém vê uma empresária que bate no peito e diz que tem medo. Então peça ao Claude para buscar grupos de mulheres empresárias, para você trocar com quem está na mesma condição. E peça também para o Claude te ajudar a enxergar quais rotinas da sua empresa dá para automatizar, delegar, para PJ ou para CLT, para você ter fôlego e pensar nas coisas importantes do negócio. E você, que eu sei que já está me seguindo, qual o medo te trava na hora de crescer? Me conta aqui.", "legenda": "O medo de crescer trava muita empresária e a empresa junto. Crescer pede uma dona diferente e é disso que a gente foge sem perceber. Ajuda conversar com quem sente o mesmo, então peça ao Claude para achar grupos de mulheres empresárias. E peça também para ele te mostrar o que dá para delegar, para PJ ou CLT, para você ganhar fôlego."}}, {"t": "pov", "tag": "POV", "titulo": "POV: você entrega mais que todo mundo e ainda acha que é uma fraude.", "det": {"text": "POV: você entrega mais que todo mundo e ainda acha que é uma fraude.", "grupo": "TDAH e cabeça"}}]}, {"id": "073", "date": "11/09", "dow": "sex", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Comparação, o seu bastidor contra a vitrine dos outros", "det": {"theme": "Papo de empresa, sem o Claude", "tela": "Você compara o seu bastidor com a vitrine", "corpo": "Esse aqui é um Papo de empresa, sem o Claude, então hoje é só a real entre a gente. Você abre o Instagram, vê todo mundo arrasando e pensa por que só você está patinando. E o assunto é um que me pega também. Eu já fiz muito isso, abria o celular e me afundava. Você abre o Instagram, vê todo mundo arrasando com a empresa bombando e pensa, por que só eu estou patinando? Para. O que você está vendo não conta a história toda. Porque cada uma só mostra a sua vitrine. A foto bonita, o resultado, o dia que deu certo. Ninguém posta a noite mal dormida, a conta que atrasou, a cliente que sumiu. Então você está comparando o seu dia comum e tudo que você sabe que deu errado, com o melhor momento editado da vida dos outros. Essa comparação é injusta com você desde o começo. E isso mexe com a sua cabeça sem você perceber. Você passa a se medir pela régua da vitrine dos outros, que nem existe de verdade. A vergonha sussurra que você é a única que não dá conta. Isso é mentira, todo mundo tem o seu bastidor difícil. Primeiro, silencia quem te faz sentir pequena, sem dó. Depois, segue quem mostra o bastidor de verdade e fala de competência. E desliga aquela notificação de curtida que te puxa para o celular o tempo todo. O que você consome molda como você se sente. E sempre que bater aquela comparação, lembra que você não conhece o bastidor de ninguém. Não dá para crescer de olho no jardim do vizinho. Compara você de hoje com a você de 6 meses atrás. Essa é a única comparação que te leva para frente. E você, que eu sei que já está me seguindo, você se compara com a internet ou já aprendeu a olhar só para o seu caminho? Me conta aqui.", "legenda": "Você abre o Instagram, vê todo mundo arrasando e pensa que só você está patinando? Para. Cada uma mostra só a vitrine, a foto bonita, o dia que deu certo. Ninguém posta a conta que apertou nem a cliente que sumiu. Você está comparando o seu dia comum com o melhor momento editado dos outros. Silencia quem te faz sentir pequena, segue quem mostra o bastidor de verdade e compara você só com a você de 6 meses atrás."}}, {"t": "carrossel", "tag": "Carrossel Ensino", "titulo": "5 Histórias e representação · Como eu toco empresa e conteúdo quase sozinha", "det": {"tipo": "Ensino", "assunto": "5 Histórias e representação · Como eu toco empresa e conteúdo quase sozinha", "arquivo": "Ensino/5 Histórias e representação/03 Como eu toco empresa e conteúdo quase sozinha"}}]}, {"id": "074", "date": "12/09", "dow": "sáb", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "O CRM que você abandona no primeiro mês", "det": {"theme": "CRM com o Claude", "tela": "Quase todo CRM morre assim", "corpo": "Quase todo mundo que monta um controle de cliente abandona ele no primeiro mês. E quase nunca a culpa é da ferramenta. O que mata é parar de alimentar a ferramenta. Um CRM sem atualização vira um monte de informação velha, que não serve para nada. O segredo para não acontecer isso são duas coisas: um CRM no Claude e o hábito de, depois de cada conversa com cliente, atualizar a minha conversa com o Claude. Tudo o que acontece com os clientes, você vai jogando numa conversa através do microfone. Não precisa nem digitar. Aí pede para ele arrumar, organizar e fazer uma lista de prioridades do dia e as mensagens para enviar. Deixa o celular do teu lado. Coloca um botão pra falar direto com o Claude, sem nem desbloquear a tela. Você só atualiza o que mudou e pergunta o que fazer. O Claude carrega o peso de organizar, você fica com a parte leve, que é registrar e falar com a cliente. Um CRM no Claude se sustenta no cuidado frequente, não na montagem bonita do começo. E é justamente esse hábito que o Claude torna leve o bastante para você manter. E você, que eu sei que já está me seguindo, você é de manter a organização ou de largar no primeiro mês? Me conta aqui.", "legenda": "Quase todo controle de cliente é abandonado no primeiro mês. E quase nunca a culpa é da ferramenta. O que mata é parar de alimentar. O segredo é um ritual de 10 minutos por dia. Depois de cada conversa eu atualizo a planilha e peço ao Claude a lista de prioridades e as mensagens do dia. Ele carrega o peso de organizar e você fica com a parte leve, decidir e falar com a cliente."}}]}, {"id": "075", "date": "13/09", "dow": "dom", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Organizar a empresa não vai te fazer perder dinheiro", "det": {"theme": "Produtividade", "tela": "Eu não tenho tempo para parar e organizar minha empresa", "corpo": "Isso é o que eu mais ouço. Mas, na maioria das vezes, tempo é o de menos. O que costuma travar mesmo é o medo de começar e aquela sensação de que parar para organizar vai te custar caro. Você não vai perder dinheiro para se organizar. O que vai acontecer é o seguinte. Por um tempo, você vai investir um pouco mais de tempo, talvez trabalhar um pouquinho até mais tarde, dedicar uma ou 2 horas por dia para arrumar as coisas, na maioria das vezes dá para fazer isso numa hora extra, sem tirar nem um minuto do seu tempo de atender e entregar. Ou seja, esse momento de transição não tira dinheiro do seu bolso. O que ele pede é uma energia que você acha que não tem. Mas esse esforço extra tem prazo de validade. Muito em breve você não vai mais precisar desse tempo todo, porque a sua gestão vai estar organizada, automatizada e o Claude vai fazer boa parte dela por você. O que hoje te toma a tarde inteira depois vira coisa de minutos. Ou o que você sequer faz, porque, na tua cabeça, você não tem tempo, em meia hora diária, você vai fazer junto com o Claude. Enquanto essa virada acontece, o Claude já te ajuda de 2 jeitos. Primeiro, ele calcula quanto tempo por semana você de fato precisa dedicar para “arrumar a casa” sem largar os seus atendimentos, para você ver com os próprios olhos que cabe. Segundo, eu te ajudo a entender tudo o que você pode automatizar na sua empresa e o Claude te diz como e te ajuda nesse momento de automatização. Várias questões ligadas ao financeiro e ligadas à gestão do cliente: Cobrança Inadimplência Cadastro de clientes Mensagens que você precisa mandar e sempre esquece Gestão de calendário Tudo isso o Claude pode te ajudar a gerir, mas você precisa organizar primeiro para ele poder te ajudar a respirar melhor. E você, que eu sei que já está me seguindo, o que mais te segura na hora de organizar a empresa, o medo de perder dinheiro ou a falta de tempo? Me conta aqui.", "legenda": "Eu não tenho tempo é o que eu mais ouço. Mas quem te segura de verdade costuma ser o medo de começar. Você não perde dinheiro para se organizar, investe só um pouco da energia que acha que não tem, muitas vezes uma hora extra por dia. E tem prazo curto, porque logo a sua gestão fica automatizada e o Claude assume boa parte, cobrança, inadimplência, cadastro, mensagens, calendário. Mas você organiza primeiro, para depois respirar."}}]}]}, {"n": 12, "label": "14 a 20 set", "days": [{"id": "076", "date": "14/09", "dow": "seg", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Contrato simples", "det": {"theme": "Cobrança e inadimplência", "tela": "Pela primeira vez eu digo: não use o Claude", "corpo": "Estou falando do seu contrato de prestação de serviço. Vale a pena ter um contrato e firmar um contrato com seu cliente no início da prestação de serviço. Principalmente, vale pagar um advogado para redigir esse contrato para você. O Claude entra de outro jeito, ele escreve a mensagem que pede para o cliente assinar, no tom certo e ele lê o juridiquês para você quando precisa. Porque o que mais acontece é a pessoa montar um contrato com taxa e multa abusivas sem saber e na hora de cobrar de verdade, aquilo é derrubado fácil fácil numa ação e ninguém quer levar isso para o jurídico. Um advogado faz uma vez, certinho e te protege de cara. E quando a cliente acha frescura assinar, você usa a mensagem que o Claude escreve dizendo, primeiro que é uma norma da empresa e segundo explicando que o contrato preserva os 2 lados e não tem nada a ver com desconfiança. E tem outro momento em que o Claude salva: quando a outra parte quer mudar uma cláusula e você não tem o advogado à mão na hora, o que não está errado: a venda é uma negociação, então nada mais justo que um ceda de um lado e outro ceda do outro. Aí sim você joga o texto para o Claude ler aquele juridiquês e te dizer, em português de gente, se aquilo é normal ou se tem cara de abusivo. Aí você decide com calma. E você, que já está me seguindo, que eu sei. Você assina contrato com seu cliente ou você tem medinho? Me conta aqui.", "legenda": "Pela primeira vez eu digo, o contrato, de preferência, não faça com o Claude. Vale pagar um advogado uma vez e reusar, porque taxa e multa abusivas são derrubadas numa ação. O Claude entra para escrever a mensagem que pede a assinatura, apresentando o contrato como segurança para os 2 lados e para ler o juridiquês de uma cláusula que a outra parte queira mudar."}}, {"t": "pov", "tag": "POV", "titulo": "POV: você queria postar todo dia e não dá conta de criar, gravar e editar sozinha.", "det": {"text": "POV: você queria postar todo dia e não dá conta de criar, gravar e editar sozinha.", "grupo": "Conteúdo e produção"}}]}, {"id": "077", "date": "15/09", "dow": "ter", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "O Claude me montou o Diário Estóico nos lembretes, sozinho", "det": {"theme": "IA no dia a dia", "tela": "O Claude me fez manter um hábito", "corpo": "Aquele hábito bom que você jura que vai manter e esquece no terceiro dia, eu botei o Claude para resolver o meu. Tem um livro que eu amo, o Diário Estóico, com 366 ensinamentos, um para cada dia do ano, tirados dos grandes pensadores da Grécia antiga. Eu queria parar todo dia para ler um e refletir, mas sozinha eu sempre esquecia. Aí o Claude resolveu por mim. Eu pedi para ele fazer com que isso aparecesse no meu computador num horário certo do dia. E ele montou uma automação nos meus lembretes. Nos lembretes, não tem como eu não ler, porque eu uso lembretes o dia inteiro. Eu criei uma lista só para isso e ele encheu ela com os 366 ensinamentos, divididos por dia e por mês, com um lembrete todo dia às 11 da manhã para eu ler e refletir. E olha que bonito como ele trabalhou. No começo a automação não funcionava, porque ele não estava achando a pasta que eu tinha criado nos lembretes. O problema era que ela não estava sincronizando. Aí ele me falou, coloca um lembrete qualquer nessa pasta para ver se ela aparece. Apareceu. Então ele fez primeiro um teste com 3 ensinamentos, para garantir que estava certo. Ficou perfeito, a pasta sincronizou e aí ele colocou os 366, indo de mês em mês. Eu larguei o computador trabalhando e fui dormir. De manhã, eu já tinha uma pasta imensa e linda. Agora eu vou só marcando cada dia. E o melhor, ela se repete todo ano sozinha, então eu nem preciso me preocupar em refazer, ela se regenera. Se isso não é genial, eu não sei o que significa a palavra genial. É uma coisa que eu sozinha nunca pensaria em fazer. E ele fez numa noite. E você, que eu sei que já está me seguindo, qual hábito bom você vive esquecendo e podia botar o Claude para te lembrar? Me conta aqui.", "legenda": "Tem um livro que eu amo, o Diário Estóico, com 366 ensinamentos, um para cada dia. Eu sempre esquecia de ler. Pedi para o Claude e ele montou uma automação nos meus lembretes, com os 366 divididos por dia e por mês e um aviso todo dia às 11 da manhã. A automação não achava a pasta porque não sincronizava, então ele testou com 3 primeiro, deu certo e colocou todos. Larguei e fui dormir, de manhã estava pronta. E ela se repete todo ano sozinha."}}, {"t": "carrossel", "tag": "Carrossel Verdade", "titulo": "Dinheiro e preço", "det": {"tipo": "Verdade", "assunto": "Dinheiro e preço", "arquivo": "Verdades/3 Dinheiro e preço/01"}}]}, {"id": "078", "date": "16/09", "dow": "qua", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "O erro mais caro de uma cliente", "det": {"theme": "Bastidores e histórias", "tela": "Preço baixo fala mal de você", "corpo": "Você cobra abaixo do mercado achando que prende cliente e está queimando o seu nome com a concorrência inteira. As pessoas estão com você pelo preço, não pelo seu trabalho. E eu fico me perguntando, se você aumentar o preço, essas pessoas continuariam, com você já que está muito abaixo do mercado daquela região. Isso, mais do que atrair gente, queima o filme. Os concorrentes em volta, que trabalham a imagem deles, acabam concorrendo de forma desleal com alguém que cobra abaixo do piso da classe. Isso prejudica todo mundo. E o Claude entra fazendo a pesquisa de mercado e te ajudando a precificar certo. O preço certo tem a ver com os insumos que você usa, com o valor do seu serviço e com tudo o que esse serviço carrega de estudo de especialização. Em relação a isso, o Claude te ajuda a fazer a transição de um preço mais baixo para um mais alto sem fazer tudo de uma vez, porque de uma vez cria resistência com quem já é cliente. O Claude primeiro, avalia todos os seus serviços e tudo o que você tem de custo para prestar esse serviço, depois, ele monta uma timeline para você subir o preço aos poucos e já propor um preço novo para quem vai chegando. A ideia é fazer uma divulgação que traga gente nova, que já entra no preço certo. E você, que eu sei que já está me seguindo, segura o preço baixo com medo ou já subiu? Me conta aqui.", "legenda": "Um dos erros mais caros que eu vejo, atender em bairro nobre cobrando preço baixo. As pessoas ficam pelo preço, a concorrência vira desleal e o nome queima. O Claude pesquisa o mercado, te ajuda a precificar certo e monta uma timeline para subir o preço aos poucos, com um preço novo já para quem chega. Subir de uma vez só cria resistência."}}]}, {"id": "079", "date": "17/09", "dow": "qui", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Cobrar por hora ou por entrega", "det": {"theme": "Precificação", "tela": "Por hora ou por entrega?", "corpo": "Você cobra por hora ou por projeto e nos dois jeitos vive com medo de estar cobrando errado. Independentemente da forma que você trabalha, o Claude pode te ajudar a precificar seu serviço. Eu tenho 2 empresas: uma trabalha por projeto e a outra trabalha por hora. Eu sempre tive uma grande dificuldade de precificar, porque o projeto muda o preço de acordo com a quantidade de elementos que ele tem. A hora não muda de preço: é aquela hora. Mas como é que eu chego ao valor dessa hora Como sempre, eu fui pro Claude, descrevi absolutamente tudo o que eu faço em cada empresa e abri uma conversa para cada uma. Despejei tudo o que eu faço, como eu trabalho e quem são meus clientes. Listei os serviços, as entregas e pedi para ele ver quanto os meus concorrentes cobram e quais as semelhanças e as diferenças do meu trabalho em relação ao deles. No final, ele me deu um relatório de tudo o que eu poderia fazer e me deu cenários de cobrança, porque cada valor que eu cobrasse iria mudar a minha imagem perante os possíveis clientes. Ali eu tive que escolher o meu posicionamento. Então o Claude funciona para os 2 lados. Se o seu trabalho for por hora, ele descobre quanto vale a sua hora somando as suas despesas, o seu tempo e o seu lucro, para você parar de cobrar uma hora barata sem perceber. Se é por projeto, ele calcula quanto custa cada projeto do começo ao fim e bota o seu lucro em cima, para você fechar um preço que não vira prejuízo no meio do caminho. Seja qual for o seu jeito de cobrar, o que não dá é para precificar no chute. E aí, você aqui já me segue, que eu sei, você precifica de qualquer jeito ou você calcula o seu preço direitinho?", "legenda": "Você que cobra por hora e você que cobra por projeto, o recado é para os 2. O modelo já vem com o tipo do trabalho e ninguém escolhe. O que importa é precificar certo. Descreva o que você faz para o Claude e peça os cenários de preço. Se for por hora, ele calcula quanto vale a sua hora. Se for por projeto, ele soma o custo do começo ao fim e põe o seu lucro em cima."}}, {"t": "pov", "tag": "POV", "titulo": "POV: sobrou um dinheiro esse mês e você já achou onde gastar antes de guardar.", "det": {"text": "POV: sobrou um dinheiro esse mês e você já achou onde gastar antes de guardar.", "grupo": "Reserva e futuro"}}]}, {"id": "080", "date": "18/09", "dow": "sex", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "O que é um mentor de verdade", "det": {"theme": "Mentoria", "tela": "Mentor de verdade pega você pela mão  (Parte 1)", "corpo": "Você nunca teve um mentor que te pega pela mão e fica, só caiu em grupo caro que te largou sozinha. Eu já falei o que não é mentoria, deixa eu te contar de onde veio essa palavra, porque ela foi sequestrada. A ideia de mentor nasceu dentro das empresas. É aquela pessoa mais experiente, que pega o novato pela mão e mostra absolutamente tudo, desde onde fica o café e como usa a cafeteira até as tarefas mais difíceis, com quem ele pode falar e com quem é melhor não falar. Ele te diz assim, faz do seu jeito, mas vai dar tal problema, então pensa com calma. E está sempre ali, disposto a ajudar quem ele pegou para orientar. Porque o novato precisa aprender com quem tem estrada, precisa de uma referência. Mentor é isso, alguém que já passou por ali e te guia. E a marca de um mentor é a disponibilidade. Não o tempo todo, mas quase sempre ele está ali, à disposição para tirar a sua dúvida, para te dar um norte quando você trava. Agora repara no que faz uma boa mentoria. A primeira coisa, ela não escala e isso é de propósito. Ele não consegue pegar muita gente porque precisa dar atenção de verdade para cada mentorado, então tem que gostar do que faz. A segunda, ele pode sim cobrar caro. E pode porque te dá atenção um número certo de vezes e estuda o seu caso antes. Ele não chega despreparado na reunião, ele chega sabendo do seu negócio. A terceira, ele fica mais ou menos disponível fora do expediente, entre aspas. Sempre que dá, ele responde e ajuda. E a quarta, é o seguinte. Na mentoria fraca, a mentora aparece pouco. E quando aparece é para marcar encontro, dar aviso, apresentar o mais novo produto. Ela não conduz o trabalho. O bom mentor é o contrário. É ele que te marca, você não esquece dele, porque ele te pegou pela mão e te levou até onde você queria chegar ou pelo menos bem pertinho da linha. E você, que eu sei que já está me seguindo, você já teve um mentor assim, daqueles que pegam pela mão e ficam ou só caiu num grupo caro? Me conta aqui.", "legenda": "A palavra mentor nasceu dentro das empresas, alguém mais experiente que pega o novato pela mão e mostra tudo, do café às tarefas difíceis. A marca dele é a disponibilidade. O bom mentor não escala de propósito, estuda o seu caso, cobra caro porque dá atenção de verdade e fica por perto até fora do expediente. A mentora fraca só aparece para o operacional. O bom mentor te leva pela mão até onde você queria chegar."}}, {"t": "carrossel", "tag": "Carrossel Ensino", "titulo": "4 Produtividade e rotina · Como parar de carregar tudo na cabeça", "det": {"tipo": "Ensino", "assunto": "4 Produtividade e rotina · Como parar de carregar tudo na cabeça", "arquivo": "Ensino/4 Produtividade e rotina/06 Como parar de carregar tudo na cabeça"}}]}, {"id": "081", "date": "19/09", "dow": "sáb", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "A parceria que estabiliza o seu caixa", "det": {"theme": "Previsibilidade e caixa", "tela": "Nem toda parceria estabiliza o caixa", "corpo": "Você fecha parceria que só te dá movimento em troca de desconto e depois não entende por que o caixa não firma. E existe a que te deixa negociar prazo e prioridade, essa sim ajuda o seu caixa. E o Claude te ajuda a montar a proposta. O Claude te ajuda a desenhar a proposta de parceria, o que pedir e o que oferecer e escreve o combinado de um jeito firme e claro. Ele também te ajuda a achar negócios que atendem a mesma cliente que você sem ser concorrente. Porque a parceria mais poderosa é com quem completa o seu serviço, com quem atende a sua cliente antes ou depois de você. Em vez de brigar pelo mesmo espaço, vocês trocam indicação e dividem esforço. Sai o desconto que corrói a sua margem e entra a parceria que traz cliente bom e ainda te dá previsibilidade. E você, que eu sei que já está me seguindo, você tem parceria que estabiliza ou só troca desconto? Me conta aqui.", "legenda": "Nem toda parceria ajuda o seu caixa. A que só dá movimento em troca de desconto corrói a margem. A que vale te deixa negociar prazo e prioridade. É melhor ainda com quem completa o seu serviço sem ser concorrente, quem atende a sua cliente antes ou depois de você. O Claude desenha a proposta, escreve o combinado e te ajuda a achar o parceiro certo."}}]}, {"id": "082", "date": "20/09", "dow": "dom", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Você é a memória da IA", "det": {"theme": "IA na prática, negócio e conteúdo", "tela": "O Claude disse que não dava. Dava.", "corpo": "O Claude me disse que não dava para fazer o que eu queria e eu não aceitei esse não, mostrei para ele que dava. Eu queria montar um painel para o meu financeiro. 2 abas, uma das minhas despesas pessoais e outra das despesas da empresa, com um jeito de ir ticando o que eu já paguei. Pedi para o Claude e ele me disse que não dava para eu lançar uma despesa sozinha. Que não era possível. Eu não aceitei esse não. Eu já uso um aplicativo de orações que funciona em qualquer navegador e guarda tudo na memória, então baixei o arquivo dele e mostrei para o Claude. Ele olhou e mudou de ideia na hora. Aquilo que ele jurava que não dava virou possível e a gente montou o painel do jeito que eu queria. Isso me ensinou 2 coisas. A primeira, que você precisa ficar esperta no que dá e no que não dá, porque às vezes o não é só falta de informação dele. A segunda, que cada conversa começa do zero, a IA não guarda o que ficou para trás. Então a memória é você. Você que leva o contexto de uma conversa para a outra, que lembra, que mostra o arquivo certo na hora certa. E é por isso que eu rio quando dizem que a IA te emburrece. Para tirar coisa boa dela você precisa pensar, escolher, alimentar e insistir. Ela exige que você use a sua cabeça, não que você desligue o cérebro. E você, que eu sei que já está me seguindo, você acha que a IA te deixa mais burra ou que ela te obriga a pensar melhor? Me conta aqui.", "legenda": "Eu quis montar um painel financeiro com 2 abas, uma pessoal e outra da empresa. O Claude disse que não dava para eu lançar despesa sozinha. Eu não aceitei, mostrei o arquivo de um app de orações que já uso com memória e ele mudou de ideia na hora. Aprendi que cada conversa começa do zero, a IA não guarda nada, então a memória é você. E que ela te obriga a pensar melhor, não te emburrece."}}]}]}, {"n": 13, "label": "21 a 27 set", "days": [{"id": "083", "date": "21/09", "dow": "seg", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Como eu toco a empresa com TDAH", "det": {"theme": "TDAH e cabeça", "tela": "Eu toco a empresa sem confiar na memória", "corpo": "Quem tem TDAH sabe: se não está anotado, não existe. A informação simplesmente some da cabeça. Então eu parei de confiar na minha memória e botei ela toda para fora, em um segundo cérebro. O app Lembretes é meu melhor amigo. O Tarefas do Google tem exatamente o mesmo efeito. Tudo que passa na minha cabeça vai para uma lista de inbox pela Siri, ideia, conta a pagar, tarefa. Depois eu processo essa lista algumas vezes por dia. Faço na hora ou jogo para a lista certa. Os lembretes são a minha memória de fora. Outra coisa, eu deixo cada coisa onde eu vou estar na hora que preciso dela. O remédio do almoço fica na mesa da cozinha, o que eu vou tomar na hora do trabalho Fica na mesa de trabalho, o da noite na cabeceira da cama. Se depender de eu lembrar de ir buscar, eu esqueço. E a tarefa que eu percebo que estou travada, eu gamifico. Eu transformo ela num desafio e me dou um prêmio quando termino, tipo só assistir uma coisa que eu amo depois que acabar. Funciona, eu termino rápido só pela recompensa. Eu descobri que eu adoro ticar coisas. Aí eu faço artefatos no Claude pra ticar. E o ponto é esse. Com o sistema certo em volta, o TDAH para de te atrapalhar tanto. Ele não some, mas você constrói uma estrutura que segura as pontas por você. E você, que eu sei que já está me seguindo, qual é o truque que segura a sua memória no dia a dia? Me conta aqui.", "legenda": "Quem tem TDAH sabe, se não está anotado, some da cabeça. Então eu botei a minha memória toda para fora, em lembrete. Tudo vai para uma lista de inbox pela Siri e eu processo uma vez por dia. Deixo cada remédio onde vou estar na hora certa. E a tarefa que odeio eu gamifico, com prêmio no fim. É organização construída para a minha cabeça e não uma regra copiada de fora."}}, {"t": "pov", "tag": "POV", "titulo": "POV: você mistura o dinheiro da empresa com o seu e no fim não sabe quanto é de quem.", "det": {"text": "POV: você mistura o dinheiro da empresa com o seu e no fim não sabe quanto é de quem.", "grupo": "Financeiro e caixa"}}]}, {"id": "084", "date": "22/09", "dow": "ter", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "O Claude te diz qual cliente chamar primeiro hoje", "det": {"theme": "CRM com o Claude", "tela": "Qual cliente você atende primeiro hoje?", "corpo": "Você atende cliente por ordem de chegada e gasta a sua melhor energia em quem talvez nem vá fechar. Você abre a sua lista de cliente e bate aquela paralisia, por onde eu começo hoje? Aí você vai respondendo por ordem de chegada. Ou pior, por quem grita mais alto. E gasta a sua melhor energia em quem talvez nem vá fechar. O Claude resolve isso para você. Com a sua base de clientes na mão (Eu espero que você tenha um controle das suas clientes), eu peço para ele separar cada cliente em quente, morno ou frio. Quente é quem está perto de fechar, morno é quem tem interesse mas ainda precisa de tempo e frio é quem está longe. Ele usa critério, o interesse, o encaixe, a verba, a urgência. Não é achismo. E aí vem a parte que muda o seu dia. Eu peço para ele montar a ordem de quem falar primeiro. A extensão do Claude para o Chrome pode, por exemplo, ler as mensagens do WhatsApp. Ele me dá a lista, começa por quem está quente e esperando só um empurrãozinho, depois desce para os mornos. Eu vou atrás de quem tem mais chance de fechar, em vez de me perder no que apareceu na frente. Não caia na besteira de ficar discutindo com quem está gritando e fazendo escândalo e ameaças. Esses são os piores clientes. O Claude não vende por você. Mas ele te coloca na frente das pessoas certas, na ordem certa. E isso sozinho já faz você fechar mais, trabalhando menos. E você, que eu sei que já está me seguindo, hoje você atende por prioridade ou por ordem de chegada? Me conta aqui.", "legenda": "Você abre a lista de cliente e não sabe por onde começar, então responde por ordem de chegada e gasta energia em quem nem vai fechar. Eu peço para o Claude separar cada um em quente, morno ou frio, com critério de interesse, verba e urgência. Depois ele monta a ordem de quem falar primeiro. Você vai atrás de quem tem mais chance de fechar, em vez do que apareceu na frente."}}, {"t": "carrossel", "tag": "Carrossel Lamentação", "titulo": "A cabeça da empresária", "det": {"tipo": "Lamentação", "assunto": "A cabeça da empresária", "arquivo": "Lamentação/06 A cabeça da empresária parte 1"}}]}, {"id": "085", "date": "23/09", "dow": "qua", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Trabalhar 14 horas não é mérito", "det": {"theme": "Provocações e mitos para quebrar", "tela": "Trabalhar 14 horas não é nada bonito", "corpo": "Você senta às 7 da manhã, levanta às 22 horas e quando olha quase nada do que importava saiu do lugar. Trabalhar 14 horas por dia parece dedicação, parece que você é uma empresária foda, muito ocupada, quando, na verdade e uma grande red flag. É aquela história de estar ocupada e estar produtiva. O grande mérito é fazer a empresa funcionar em 8 horas, dependendo até de 6 horas. O resto, muitas vezes e desorganização e quando você vê sua casa está caindo e sua saúde está indo pelo ralo. E o Claude ajuda quando ele conhece todas as tarefas que você precisa fazer na empresa, ele consegue estimar quanto tempo você precisa para dar conta de tudo e te ajuda a achar o que está fazendo o seu dia esticar tanto e o que dá para cortar, delegar ou automatizar. E consegue montar melhores processos com você. Porque, sério, não é bonito trabalhar 12 a 14 horas. Não é bonito acordar às 4h da manhã e fazer reunião às 6h, a não ser que você curta isso. Nada disso é legal. O que é bom é ter a vida que você sempre quis, porque a gente empreende para isso. A gente não empreende para virar escrava da própria empresa. Não faz sentido nenhum. E você, que eu sei que já está me seguindo, está vivendo ou só trabalhando? Me conta aqui.", "legenda": "Trabalhar 14 horas parece dedicação e é alerta. Mérito é a empresa funcionar em 8. O resto costuma ser desorganização vendida como esforço e cobra na sua saúde e na sua casa. O Claude conhece as suas tarefas, estima o tempo que você precisa e te ajuda a achar o que dá para cortar, delegar ou automatizar."}}]}, {"id": "086", "date": "24/09", "dow": "qui", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "O INSS é importante mas não basta sozinho", "det": {"theme": "Reserva e futuro", "tela": "Você é empresária e está deixando a sua velhice só na mão do INSS", "corpo": "A sua velhice não cabe só no INSS, que tem teto e dificilmente segura o seu padrão de vida lá na frente. Os nossos pais trabalharam de carteira assinada a vida inteira e se aposentaram pelo INSS, Mas o estilo de vida deles era muito diferente. Era muito mais fácil comprar um imóvel, era muito mais fácil comprar um carro, era muito mais barato viver. O INSS é uma conquista do povo e continua importante. Só que para uma empresária ele tem um teto e dificilmente esse teto vai segurar o padrão de vida que você tem hoje lá na frente. Por isso eu encaro a aposentadoria como mais um colchão que eu construo desde já, do meu jeito, com o que eu consigo investir por mês. E o Claude me ajuda A fazer essa conta e me ajuda na parte do investimento, porque a grande verdade é que a gente vai fazer o investimento com esse dinheiro. Eu conto para ele o padrão de vida que eu tenho e que eu quero manter e por quanto tempo (tem que pensar que você pode morrer com 80, 90 ou 100 anos - conheço gente que não achou que fosse viver até mais de 90 e aí ficou sem dinheiro no finalzinho da vida). Então o Claude me mostra mais ou menos de quanto esse investimento mensal precisa ser e quanto dá para separar agora sem apertar o presente. E o objetivo aqui é um só: chegar na velhice com a mesma independência que você tem agora, sem depender de ninguém. Eu penso muito nisso, em chegar lá inteira e dona da minha vida. Como eu não tenho filhos, eu preciso pensar muito seriamente em ter a possibilidade de pagar uma casa de repouso decente para eu terminar a minha vida. Ninguém gosta de pensar na velhice. Essa é a grande verdade: a gente acha que vai ficar novo pra sempre. Nisso, passaram-se 20 anos, e mais 20 anos, e daqui a pouco a velhice está na nossa cara. O caminho para esse colchão pode ser uma previdência ou outro investimento. Lembra que previdência e investimento, você evita fazer em bancos grandes e faça uma consultoria de investimentos antes de tomar qualquer decisão. E você, que eu sei que já está me seguindo, você já pensou em como quer estar na velhice ou está deixando isso só na mão do INSS? Me conta aqui.", "legenda": "Os nossos pais se aposentaram pelo INSS, que é uma conquista do povo e segue importante. Mas para a empresária ele tem teto e dificilmente segura o seu padrão lá na frente. Por isso eu trato a aposentadoria como mais um colchão que construo desde já. O Claude me ajuda a calcular de quanto preciso e quanto dá para guardar por mês. A escolha do caminho você fecha com a contadora. Quanto mais cedo, menor o esforço depois."}}, {"t": "pov", "tag": "POV", "titulo": "POV: é domingo à noite e a sua cabeça já está na segunda-feira.", "det": {"text": "POV: é domingo à noite e a sua cabeça já está na segunda-feira.", "grupo": "Bastidores e rotina"}}]}, {"id": "087", "date": "25/09", "dow": "sex", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Mentoria é enganação ou não?", "det": {"theme": "Mentoria", "tela": "Mentoria é enganação? (Parte 1)", "corpo": "Você pagou caro numa mentoria e no fim era só um grupo de WhatsApp e uma aula por mês que nem é com o mentor? Tem dois tipos, vamos falar o que vale e o que não. Bom, a maioria das mentorias caras, principalmente as dos grandes gurus e enganação mesmo. Começa por aquele mentor que se gaba dos 18 milhões que entraram. Só que o fato de estar entrando aquele dinheiro não quer dizer é isso que sobra. Se ele gasta muito, sobra pouco. Esse número acaba sendo só uma forma de te impressionar. E é com esse número na testa que muita gente vende mentoria. Só que na maioria das caras você nem vê o mentor. Você vê a equipe dele, vê convidado aleatório dando aula e a mentora mesmo só aparece uma vez por mês, numa aula superficial. Você sonhou com acesso, com alguém olhando o seu negócio de perto, uma atenção personalizada e recebeu aula gravada. Você está pagando 20 mil para ter o mentor por perto? Se não tem, está pagando errado. No fim, pagou 15, 20 mil num grupo de WhatsApp caríssimo com etiqueta de mentoria. E fica pior se a mentoria for cíclica, porque aí nem o whatsapp presta. Sabe aquela mentoria com gente nova entrando o tempo todo? Você sente que não evolui, porque toda hora chega alguém que não sabe nem o básico do método. E adivinha quem ensina o básico para os novatos? Você. Quer dizer, você paga 20 mil e ainda vira mentora dos outros de graça, fazendo o trabalho que era dela. Ela cobra caro justamente para não estar presente. Eu nem discuto mais se isso é mentoria. Você comprou um grupo de WhatsApp dos caros, com um nome bonito na capa. E ainda sai achando que o problema foi você que não soube aproveitar. Mas existe o outro lado, o mentor que vale cada centavo. Disso eu falo no próximo vídeo. E você, que eu sei que já está me seguindo, você já pagou caro numa mentoria que no fim era só um grupo de WhatsApp? Me conta aqui, sem vergonha, porque já aconteceu com muita gente boa.", "legenda": "Mentoria é enganação ou não? Tem das duas e a maioria das caras, principalmente as dos grandes gurus, é. O guru se gaba dos 18 milhões que entraram, mas o que entra não quer dizer o que sobra. Você nunca vê o mentor, só a equipe e um hot seat superficial por mês. Na cíclica é pior, você ainda ensina os novatos e faz o trabalho que era da mentora. No fim, pagou 15, 20 mil num grupo de WhatsApp com nome bonito."}}, {"t": "carrossel", "tag": "Carrossel Ensino", "titulo": "5 Histórias e representação · O dia em que o Claude disse que não dava", "det": {"tipo": "Ensino", "assunto": "5 Histórias e representação · O dia em que o Claude disse que não dava", "arquivo": "Ensino/5 Histórias e representação/04 O dia em que o Claude disse que não dava"}}]}, {"id": "088", "date": "26/09", "dow": "sáb", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Parar é produtivo", "det": {"theme": "Mentalidade de dona de negócio", "tela": "A culpa de parar te custa as melhores ideias", "corpo": "Você se sente culpada toda vez que para e mesmo assim é parada que vêm as suas melhores ideias. Dizem que a música \"Imagine\", dos Beatles, veio exatamente de uma pausa que o empresário deles obrigou o Paul McCartney a tirar. Ele estava há muito tempo tentando compor, mas a música não saía e aí ele foi obrigado a tirar uma pausa. E não é que valeu a pena? A música veio. Eu achava que era lenda, mas aconteceu de verdade. O seu cérebro continua trabalhando no problema enquanto você relaxa e é aí que a solução aparece sozinha. E o Claude entra aqui de um jeito concreto. A pausa só acontece se o trabalho não estiver te puxando o tempo todo, então: primeiro, eu espero que você já tenha automatizado várias coisas, a ideia é programá-lo para continuar trabalhando enquanto você está tirando sua pausa. Mas aí você pode também jogar a sua lista no Claude e ele organiza a semana e encaixa as tarefas, para sobrar espaço de verdade para você parar. E quando a ideia boa chega no meio do descanso, você joga ela numa conversa que você tem com o Claude, só para jogar ideias aleatórias por comando de voz e ele transforma aquilo solto no próximo passo organizado, antes de virar mais um pensamento que some. Porque ideia que não vira tarefa some do mesmo jeito que veio. E você, que eu sei que já está me seguindo, onde vêm as suas melhores ideias? Me conta aqui.", "legenda": "As melhores ideias não vêm na mesa de trabalho, vêm no banho, na caminhada, quando a cabeça relaxa. Por isso parar é produtivo. A pausa só acontece se o trabalho não estiver te puxando, então você joga a lista no Claude e ele organiza a semana para sobrar espaço. E quando a ideia chega no descanso, você joga no Claude na hora e ele vira o próximo passo, antes de sumir."}}]}, {"id": "089", "date": "27/09", "dow": "dom", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "O medo dos comentários e a coragem de aparecer", "det": {"theme": "Papo de empresa, sem o Claude", "tela": "O medo de aparecer é medo de quê?", "corpo": "Esse aqui é um Papo de empresa, sem o Claude, então hoje é só a real entre a gente. Você não aparece por medo de alguém apontar um defeito seu na frente de todo mundo. Eu sei que dói só de imaginar. Esse medo é real e tem fundamento, mas ele não pode mandar na sua vida. Deixa eu te contar uma coisa que me marcou. Aquela pesquisadora que estudou a vergonha a vida inteira, a Brené Brown, quando o vídeo dela viralizou, entrou em pânico e pediu para o marido tirar aquilo do ar. Ela mesma contou que passou anos mantendo a carreira dela pequena de propósito, só para não se expor a isso. E os ataques que vieram foram quase todos sobre a aparência dela e quase nenhum sobre o que ela tinha a dizer. Pra mulher é sempre assim. Quando alguém quer te diminuir, vai no alvo mais fácil, o seu corpo, o seu rosto, a sua roupa. Repara que isso não diz nada sobre a qualidade do seu trabalho. E olha, eu não vou te dizer para fingir que comentário não dói, dói sim. Mas dá para escolher o peso que ele vai ter. Um defeito que apontam em você não apaga o valor do que você entrega. E vou te dizer: depois de um tempo, você já nem liga mais. Agora pensa numa coisa. Quem está fazendo não tem tempo de ficar criticando a internet. Você tem tempo de só destilar seu ódio no TikTok? Não tem. Então quando bater o medo, lembra disso. A sua mensagem e o que você tem para oferecer são mais importantes do que a opinião de quem só sabe atacar de longe. Deixa eles na plateia e segue o seu caminho. E você, que eu sei que já está me seguindo, o que mais te segura, o medo do comentário ou o medo de não ser perfeita? Me conta aqui.", "legenda": "Se o que te trava é o medo dos comentários cruéis, lembra disso. Até a pesquisadora que estudou a vergonha a vida inteira entrou em pânico quando viralizou. Os ataques foram sobre a aparência dela, quase nada sobre o trabalho. Quem quer te diminuir vai no alvo mais fácil, o seu corpo, a sua roupa. Isso não diz nada sobre a qualidade do que você faz. Quem mais critica é quem nunca se arrisca. A sua voz importa mais do que os seus medos."}}]}]}, {"n": 14, "label": "28 set a 4 out", "days": [{"id": "090", "date": "28/09", "dow": "seg", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Não existe método de organização que serve para todo mundo", "det": {"theme": "TDAH e cabeça", "tela": "Nenhum método serve para todo mundo", "corpo": "Eu já gastei rios de dinheiro em papelaria, caderno inteligente, caneta bonita, para me organizar tudo na mão. Depois virei doida por Notion. Hoje eu desinstalei o Notion e me organizo só com lembrete e Google Docs. O que eu aprendi com isso é que não existe método de organização que serve para todo mundo. Cada cabeça funciona de um jeito e a sua própria forma muda com o tempo. O que te organizava há 2 anos pode não te organizar hoje. E tá tudo bem. Por isso para de copiar o método da influencer que vende a vida perfeita dela. Organização de verdade se resume a 2 hábitos só. Você junta a informação num lugar e consulta esse lugar de tempos em tempos. Pode ser lista, pode ser mapa mental, pode ser caderno, pode ser uma conversa no Claude. O que importa é fazer essas 2 coisas. Então não se sinta um fracasso porque aquele aplicativo lindo não funcionou para você. Ele não era para você, ponto. Acha o seu jeito e fica nele, até o dia em que ele mudar de novo. E você, que eu sei que já está me seguindo, qual foi o método de organização que você tentou seguir e simplesmente não funcionou? Me conta aqui.", "legenda": "Eu já fui de papelaria, de caderno inteligente e de Notion. Hoje me organizo só com lembrete e Google Docs. Não existe método de organização que serve para todo mundo, cada cabeça funciona de um jeito e isso muda com o tempo. Para de copiar o método dos outros. Organização é só juntar a informação num lugar e consultar de tempos em tempos. Pode ser lista, caderno ou uma conversa no Claude."}}, {"t": "pov", "tag": "POV", "titulo": "POV: era 1h da manhã, você não tinha com quem falar do negócio e abriu o Claude.", "det": {"text": "POV: era 1h da manhã, você não tinha com quem falar do negócio e abriu o Claude.", "grupo": "IA e Claude no dia a dia"}}]}, {"id": "091", "date": "29/09", "dow": "ter", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "O controle de saúde dos meus 7 cachorros e o susto dos R$ 5 mil", "det": {"theme": "IA no dia a dia", "tela": "Sete cachorros e um susto de 5 mil", "corpo": "Eu tenho sete cachorros e quando deixava tudo acumular levava uma paulada de cinco mil reais de uma vez só. Quem tem um já sabe a confusão de vacina, remédio e banho. Imagina 7. Se eu não tivesse um jeito de organizar, era o caos e dinheiro escorrendo. Então eu organizo tudo com o Claude. Para a saúde deles, eu tenho um controle de vacina de cada um, com um calendário que me lembra das datas. Eu coloquei todas as datas dos caderninhos de vacina para cada um, porque são diferentes. Coloquei também aniversário nesse calendário e importei no meu calendário do Google. Eu também montei com o Claude uma tabela comparando as veterinárias aqui perto, para eu saber onde vale mais a pena para dar vacina e fazer check-up. E quando algum deles está tomando algum remédio, eu jogo a receita na conversa e peço para ele fazer um dashboard, aí eu fico de olho, posso ticar cada um no horário certo, então sempre sei o que dar e quando. Para não falhar, eu ainda programei a Alexa para me lembrar dos horários. Já aconteceu de deixar tudo acumular e chegar uma hora de ter que desembolsar uns R$ 5 mil de uma vez para resolver banho, tosa, vacina e check-up de todo mundo junto. Então eu não deixo mais acumular. Eu peguei os preços de check-up e de banho e tosa e fico rodando as possibilidades com o Claude. O que dá para fazer agora, o que dá para deixar para depois, qual cachorro é mais urgente. Aí eu vou arrumando aos poucos e nunca levo aquela paulada de uma vez só. A lição que eu tiro daqui serve para a empresa inteira. Quando você organiza e antecipa, o gasto deixa de ser “de qualquer jeito” e passa a ser planejado. Assim, a única coisa que é “de qualquer jeito” é caso aconteça uma urgência. Você decide quando e quanto, em vez de ser pega de surpresa. E você, que eu sei que já está me seguindo, o que na sua casa ou na sua empresa vive te pegando de surpresa por falta de organização? Me conta aqui.", "legenda": "Eu tenho 7 cachorros. Se eu não organizasse, era o caos e dinheiro escorrendo. Com o Claude eu tenho controle de vacina de cada um, calendário das datas, uma tabela comparando as veterinárias e um dashboard de remédio, com a Alexa me lembrando dos horários. E no bolso, em vez de pagar R$ 5 mil de uma vez em banho, tosa e check-up de todos juntos, eu rodo as possibilidades e vou arrumando aos poucos. Organizar faz o gasto virar escolha."}}, {"t": "carrossel", "tag": "Carrossel Verdade", "titulo": "Organização e produtividade", "det": {"tipo": "Verdade", "assunto": "Organização e produtividade", "arquivo": "Verdades/2 Organização e produtividade/01"}}]}, {"id": "092", "date": "30/09", "dow": "qua", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "A conversa de vídeo e edição que me ensinou a exportar direito", "det": {"theme": "IA na prática, negócio e conteúdo", "tela": "O seu vídeo perde qualidade na exportação", "corpo": "Você grava um vídeo caprichado e na hora de exportar ele perde qualidade, fica estranho? Eu passei por isso não sei quantas vezes e eu só aprendi a exportar direito por causa do Claude. Eu tenho uma conversa só sobre vídeo e iluminação, onde eu aprendo a usar a câmera do iPhone ao máximo, quais aplicativos valem a pena e como exportar do jeito certo para não perder qualidade. Essa parte de exportar, que parece boba, eu só entendi ali. Porque eu fazia vídeo no iPhone, bom, usava câmera traseira, como todo mundo dizia, mas, quando eu ia postar o vídeo no Tik Tok, ficava horrível. Foi nessa conversa também que eu descobri o JumpCut, um aplicativo que tira os silêncios e as palavras de preenchimento do vídeo. Eu falo muito ahm, ahm e odeio disso. Ele tira sozinho e o vídeo já fica mais limpo e mais rápido de assistir. E tem o CapCut, que é onde eu edito. O Claude me ajuda a mexer nos atalhos dele, para automatizar o que é repetitivo e fazer rápido o que eu faria devagar na mão. Aquele trabalho chato de edição, que toma horas, fica muito menor quando você aprende os caminhos certos. O ponto que eu quero deixar é esse. Você não precisa ser editora profissional para o seu vídeo ficar bom. Você precisa de alguém que te ensine os caminhos. E o Claude faz isso com paciência, no seu tempo, quantas vezes você precisar perguntar. E você, que eu sei que já está me seguindo, o que mais te trava na hora de fazer os seus vídeos, gravar, editar ou exportar? Me conta aqui.", "legenda": "Você grava um vídeo caprichado e na hora de exportar ele perde qualidade? Eu só aprendi a exportar direito por causa do Claude. Tenho uma conversa só sobre vídeo, onde aprendo a usar a câmera do iPhone no máximo e a exportar sem perder qualidade. Ali descobri o JumpCut, que tira os silêncios e os ahm do vídeo e aprendi atalhos do CapCut para editar mais rápido. Você não precisa ser editora profissional, precisa de quem te ensine os caminhos."}}]}, {"id": "093", "date": "01/10", "dow": "qui", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Pessoas que planejam a semana na sexta", "det": {"theme": "Produtividade", "tela": "Planejar na sexta nunca colou para você", "corpo": "Eu realmente admiro quem planeja a semana na sexta-feira ou na segunda de manhã. Eu admiro muito essas pessoas e gostaria muito de ser uma pessoa dessa, mas a grande verdade é que eu não lembro nem o que eu comi ontem no almoço e no meu trabalho, coisas surgem aleatoriamente a qualquer momento do dia. E é aqui que o Claude entra para mim. Ele não inventa a minha semana, porque as tarefas estão na minha cabeça e aparecem na hora que querem. O que ele faz é pegar a minha lista solta, aquela bagunça que eu vou anotando o dia inteiro e me dizer o que fazer agora, o que cabe no tempo que eu tenho até o próximo compromisso e o que pode esperar. Em segundos eu tenho um plano para a próxima hora, sem precisar adivinhar a semana inteira lá na sexta. Eu trabalho com o aplicativo Lembretes do iOS aberto na minha frente. Sempre que surge alguma coisa, eu coloco numa lista através do comando de voz, que é a Siri, para eu não ter que parar o que eu tô fazendo para colocar a tarefa na lista. De tempos em tempos, entre uma tarefa e outra, eu olho a minha lista e eu vou fazendo e ticando o que eu puder fazer. O que eu não puder fazer, eu deixo ali para não esquecer e assim que der um tempo, eu faço. Se for prioritário, eu faço na hora. E você, que eu sei que já está me seguindo, planeja a semana com antecedência ou é mais de anotar as coisas na hora que elas aparecem? Me conta aqui.", "legenda": "Eu admiro quem planeja a semana na sexta, mas eu não sou assim, as coisas surgem a qualquer hora. O Claude não inventa a sua semana, as tarefas estão na sua cabeça. O que ele faz é pegar a sua lista solta e dizer o que fazer agora, o que cabe no tempo que você tem e o que pode esperar. Você vai anotando tudo pelo comando de voz e pede o plano da próxima hora quando senta."}}, {"t": "pov", "tag": "POV", "titulo": "POV: você responde o orçamento na hora e mesmo assim o cliente some.", "det": {"text": "POV: você responde o orçamento na hora e mesmo assim o cliente some.", "grupo": "Vendas e cliente"}}]}, {"id": "094", "date": "02/10", "dow": "sex", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Pagando para trabalhar", "det": {"theme": "Bastidores e histórias", "tela": "Faça a conta: você ganha por hora?", "corpo": "Você abriu mão de descanso, tempo e segurança e quando fez a conta descobriu que está pagando para trabalhar. O nosso negócio é como um filho, a gente tem muita expectativa de que aquilo vai dar um futuro melhor e um dinheiro maior do que a gente conseguia na CLT. A gente aguenta as responsabilidades pensando nesse retorno e ele nunca vem. Aí quando você para para analisar os números, você vê: Meu Deus, estou pagando para trabalhar. É um dos olhares mais tristes que eu já vi, o de uma mulher que entende isso. Ela colocou tudo de si, abriu mão de tempo com a família, de descanso e de segurança, achando que ia ter uma luz no fim do túnel. E no fim a conta não fecha. Mas tem solução. Algumas, na verdade. O Claude pode te ajudar a enxergar isso a tempo para mudar de rumo. Você alimenta ele com as informações certas: Informações sobre o seu financeiro Informações sobre os seus serviços Sobre as suas despesas fixas Sobre o preço que você cobra ele lê os seus números e te dá um dashboard que mostra exatamente o que está acontecendo. Ele te dá um norte, te diz o que dá para fazer para sair daquela situação. Atenção! Ele não vai tomar decisões por você, mas ele vai deixar escancarado onde é que estão os erros que você cometeu e vai te ajudar a remediar aquilo ali. E aí, você decide se vai por um caminho ou pelo outro. E você, que eu sei que já está me seguindo, já parou para olhar se está pagando para trabalhar? Me conta aqui.", "legenda": "Não tem nada mais triste do que ver uma cliente entender que está pagando para trabalhar. A gente aguenta tudo esperando um retorno que não vem. Mas tem solução. Você alimenta o Claude com a documentação certa, ele lê os seus números e te dá um dashboard com a verdade nua e crua e ainda te diz o que fazer para sair dali."}}, {"t": "carrossel", "tag": "Carrossel Ensino", "titulo": "1 Dinheiro e caixa · Para onde foi o dinheiro que entrou", "det": {"tipo": "Ensino", "assunto": "1 Dinheiro e caixa · Para onde foi o dinheiro que entrou", "arquivo": "Ensino/1 Dinheiro e caixa/01 Para onde foi o dinheiro que entrou"}}]}, {"id": "095", "date": "03/10", "dow": "sáb", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Pagar a conta adiantado está te deixando sem fôlego", "det": {"theme": "Financeiro", "tela": "Adiantar conta está te sufocando", "corpo": "Você antecipa todas as contas só para o dinheiro não ficar parado na conta e acha que está sendo organizada. Você antecipa as contas, fica com a conta zerada antes da hora e quando aparece um imprevisto no meio do mês você não tem com o que se virar. Aí volta a sacar de onde não devia. O que resolve é simples. Você lista as suas contas fixas com a data de cada uma e pede para o Claude organizar isso para você. Ele coloca tudo em ordem por data e joga cada vencimento no seu Google Calendar, com lembrete no dia certo. Aí você paga cada conta no dia que ela vence, nem antes nem depois. Você pode até usar essa visão do calendário para poder organizar As contas no débito automático. Aí você vai botar seu dinheiro sempre que entrar ou, periodicamente, você bota o seu dinheiro em algum investimento de liquidez diária ou algo assim. Aí você fica mais tranquilo em relação ao pagamento das contas. Com isso o seu dinheiro fica com você até o último dia, rendendo de leve naquela conta digital que rende sozinha. E você ainda guarda uma folga para o caso de algo aparecer no meio do caminho. Quando as datas estão na sua frente, some o medo de esquecer boleto e some a vontade de antecipar tudo no susto. E principalmente, você para de pagar juros e multas. E você, que eu sei que já está me seguindo, você paga as contas no dia certo ou adianta tudo só para não ver o dinheiro? Me conta aqui.", "legenda": "Você paga as contas adiantado só para não ver o dinheiro parado e fica sem fôlego quando aparece um imprevisto. Lista as suas contas fixas com a data de cada uma e pede para o Claude organizar e jogar os vencimentos no Google Calendar, com lembrete no dia certo. Aí você paga na data, com o dinheiro rendendo até lá e uma folga guardada para imprevisto."}}]}, {"id": "096", "date": "04/10", "dow": "dom", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "O programa de indicação feito de propósito", "det": {"theme": "Previsibilidade e caixa", "tela": "Você espera a indicação cair do céu", "corpo": "A indicação é o seu cliente mais barato e você fica só esperando ela cair do céu. Dá para fazer ela acontecer de propósito, com frequência. E o Claude monta esse programa com você. Você conta para o Claude como o seu negócio funciona, quais seus serviços, como seus clientes normalmente chegam, quem são, quem mais te traz dinheiro e ele desenha o programa de indicação, define a recompensa que vale a pena para quem indica e para quem chega indicado, escreve a mensagem para você pedir a indicação (é pode pedir na cara de pau mesmo) e monta um controle de quem indicou quem, para você não perder o fio. Porque tem um detalhe que muda tudo: a hora de pedir. O momento certo é no auge da satisfação, logo depois de um resultado que a cliente sentiu na pele, não 3 meses depois quando o brilho já passou. E a recompensa tem que ser de verdade. Indicação vira hábito quando vale a pena dos 2 lados, um benefício para quem indica e algo bom para quem chega. Pedir de qualquer jeito, na hora errada e sem recompensa e o que faz a indicação não acontecer. E você, que eu sei que já está me seguindo, você pede indicação de propósito ou só espera acontecer? Me conta aqui.", "legenda": "A indicação é o cliente mais barato que existe e a maioria só espera ela cair do céu. Dá para fazer de propósito. Peça no auge da satisfação, logo depois de um resultado que a cliente sentiu, não meses depois. E dê uma recompensa de verdade, que valha para quem indica e para quem chega. O Claude monta o programa, escreve a mensagem e controla quem indicou quem."}}]}]}, {"n": 15, "label": "5 a 11 out", "days": [{"id": "097", "date": "05/10", "dow": "seg", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Multa por atraso", "det": {"theme": "Cobrança e inadimplência", "tela": "Sem multa você empresta dinheiro de graça", "corpo": "O seu cliente atrasa, você não cobra juro nem multa e ainda paga as suas contas atrasada por causa disso. Foi o Claude me mostrou o tamanho do prejuízo que isso tava me trazendo, porque, sem o dinheiro do meu trabalho, quem pagava multas e juros era eu, porque pagava minhas contas atrasado. Você entende a lógica de que você está emprestando dinheiro e ficando num prejuízo? Um dia, eu estava fazendo uma análise do meu negócio como um todo com o Claude. Ele percebeu que eu tinha muito atraso no pagamento e me sugeriu ter uma política de multa e juros. Para isso, ele fez um cálculo por alto de quanto eu estava perdendo de dinheiro e que, na verdade, eu estava estimulando os clientes a fazerem aquilo ali. Hoje eu fiz essa política: eu aviso desde o início da prestação do serviço. Porque você só pode cobrar juro e multa se isso estiver combinado antes, por escrito. Sem o aviso, não dá para cobrar depois. Então você precisa ver, na sua área e dentro da lei, o que é possível e justo cobrar e deixar isso combinado antes de começar o serviço. O mais comum é uma multa de 2% e um juro de um por cento ao mês, mas o número certo depende do seu caso, então a sua contadora ou um advogado confirmam. E aí, pelo menos uma vez por semana, eu peço para ele calcular, dia após dia, quanto aquela cliente que atrasou já me deve de multa e de juros. Em segundos eu tenho o número certo e aí, quando eu vou cobrar, eu cobro com tranquilidade, porque está tudo combinado desde o começo. E o melhor de cobrar o atraso direitinho nem é o dinheiro a mais. É que você educa os seus clientes a não atrasarem com você. Quando eles sabem que tem juro e que você cobra de verdade, o atraso simplesmente diminui. O brasileiro só funciona quando dói no bolso. E você, que eu sei que já está me seguindo. Você tem coragem de cobrar juros e multas de quem paga atrasado? Ou você finge que não viu?", "legenda": "Quando o cliente atrasa e você não cobra juro nem multa, empresta dinheiro de graça. Mas só dá para cobrar se estiver combinado antes, por escrito. Veja na sua área e na lei o que é justo e combine no começo. O mais comum é multa de 2% e juro de um por cento ao mês, mas confirme com a contadora ou o advogado. Peça ao Claude para calcular o atraso dia a dia."}}, {"t": "pov", "tag": "POV", "titulo": "POV: você olhou para trás e viu o quanto já tirou do papel sozinha.", "det": {"text": "POV: você olhou para trás e viu o quanto já tirou do papel sozinha.", "grupo": "Virada e mentalidade"}}]}, {"id": "098", "date": "06/10", "dow": "ter", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Aumentar o preço não é arrogância", "det": {"theme": "Precificação", "tela": "Você cobra o mesmo de quando começou?", "corpo": "Você acha que aumentar o seu preço é arrogância e por isso cobra o mesmo de quando começou. Não foi nem minha mãe que puxou minha orelha, foi o Claude que chamou minha atenção e abriu um portal dentro da minha cabeça. Eu pedi para ele calcular quanto vale a minha hora de verdade, levando em conta as minhas despesas, a concorrência e outras coisas ligadas à minha especialidade. Aí veio um número bem acima do que eu cobrava. Eu dei risada né? Falei jamais será. Eu nunca vou conseguir cobrar isso. Até que ele falou uma coisa para mim: você esqueceu das noites estudando, dos anos de curso e de especialização, do tanto que você se dedicou para chegar no ponto em que está? Tudo isso tem que estar dentro do seu preço e cobrar por isso é o justo. O preço do seu serviço ele tem que estar ele tem que ser condizente com a profissional que você é e a profissional que você é ela trabalhou muito para chegar aonde você chegou. Então você tem que cobrar de acordo. Você pode até subir aos poucos para poder não assustar suas clientes antigas afinal ela te trouxeram até aqui, dá um aviso com 60 dias vai fazendo uma contagem regressiva pro aumento que vai haver, mas para as clientes novas, eu já apresento o preço novo desde o começo. E você, que eu sei que já está me seguindo, também acha que aumentar o preço é arrogância ou já cobra de acordo com a profissional que você é? Me conta aqui.", "legenda": "Aumentar o preço parece arrogância e não é. O seu preço carrega as noites estudando, os anos de curso e a sua dedicação, então ele tem que ser condizente com a profissional que você é. Peça ao Claude para calcular quanto vale a sua hora pelas despesas, pela concorrência e pela sua especialidade. Com a cliente antiga, suba aos poucos e avise 60 dias antes. Com a nova, já comece no preço novo."}}, {"t": "carrossel", "tag": "Carrossel Lamentação", "titulo": "A cabeça da empresária", "det": {"tipo": "Lamentação", "assunto": "A cabeça da empresária", "arquivo": "Lamentação/07 A cabeça da empresária parte 2"}}]}, {"id": "099", "date": "07/10", "dow": "qua", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Os atalhos que o Claude me ensinou no iPhone", "det": {"theme": "IA no dia a dia", "tela": "Você tem esse app e nunca abriu", "corpo": "Você tem um app no iPhone que pode te devolver horas por semana e quase ninguém abre. Chama Atalhos. Parece coisa de gente que entende de tecnologia, então fica ali parado. Eu também achava complicado, até abrir uma conversa no Claude só sobre o meu iPhone. Eu falei, com as minhas palavras, qual tarefa repetida estava me cansando porque tinha muitas etapas sempre iguais e pedi para ele me ensinar a transformar aquilo num toque só. Ele me deu o passo a passo certinho. Foi aí que eu montei os meus 4 atalhos preferidos. O primeiro é a captura de ideia. Eu falo e a ideia cai sozinha numa nota única, sem eu abrir nada, então nunca mais perco uma ideia. O segundo é o escanear e arquivar. Eu fotografo um comprovante e ele já vai sozinho para a pasta certa. Esses 2 funcionam em qualquer iPhone. Os outros 2 são o pulo do gato, porque a IA roda dentro do atalho. Num toque, eu jogo um texto comprido e o atalho me devolve o resumo em 3 bullets. E de manhã, um atalho lê a minha agenda e os meus lembretes e já me diz as tarefas mais importantes. Esses 2 pedem um iPhone mais novo, com o Apple Intelligence. No de resumir eu sempre confiro contra o original, porque a IA prepara e eu que decido. A lição é essa: organizar e automatizar vale para a empresa e vale também para a sua vida no celular. E o Claude é melhor que um professor particular que te ensina isso no seu ritmo, sem julgar você por não saber. E você, que eu sei que já está me seguindo, qual tarefinha chata do seu celular você bem que queria resolver num toque? Me conta aqui.", "legenda": "Tem um app no seu iPhone, o Atalhos, que pode te devolver horas por semana. Eu achava complicado, até o Claude me ensinar o passo a passo do meu aparelho. Hoje eu tenho 4 atalhos que amo: capturar ideia por voz, escanear e arquivar um comprovante, resumir um texto comprido e receber as tarefas do dia. Os 2 últimos têm a IA rodando dentro do atalho. Organizar vale para a empresa e vale para o seu celular também."}}]}, {"id": "100", "date": "08/10", "dow": "qui", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "A reserva é uma conta que a empresa se paga", "det": {"theme": "Reserva e futuro", "tela": "Você espera sobrar para guardar e nunca sobra: nunca guarda nada", "corpo": "Você espera sobrar dinheiro para guardar e no final  nunca guarda nada. Quando as contas apertam, você corre na conta da empresa e tira um pouco para pagar uma coisa ali, outra aqui. Aí no fim do mês não tem reserva, tem só fica apertada de novo no mês seguinte. Vamos ver como é que o Claude vai ajudar você nessa: você baixa o extrato da empresa dos últimos 6 meses e joga na conversa com ele. Ele soma as suas despesas, te diz quantos meses a sua empresa aguentaria parada hoje e quanto dá para separar todo mês sem sufocar a conta. Em minutos você sai do achismo e passa a ter um número. Se eu fosse você, eu faria exatamente a mesma coisa com sua conta pessoal, porque a sua conta empresarial só vai ter saúde se a sua conta pessoal também tiver. Afinal, você é uma pequena empresária e a sua conta pessoal ainda precisa muito da empresa. Pede a ele onde é que você pode cortar. O que você pode fazer? Às vezes tem muita coisa que você faz por estar acostumada e nunca ter pensado em tirar aquilo ali. Coisas pequenas somadas dão um bom valor. Pensa também em coisas que você pode vender em casa. Você pode pedir a extensão do Claude para Chrome através das fotos das coisas que você tem para vender, e um preço razoável para colocar aquilo ali para vender em algum site. Mas a verdade é que quando você está apertada de grana, a gente precisa tomar cuidado com como a gente enxerga a reserva. Ela entra na sua lista de contas fixas, do lado da luz, do aluguel e das outras que a empresa paga todo mês. Ela sai primeiro, antes de você olhar para o que sobrou. É assim que ela sai do papel, como se fosse um boleto. E não precisa ser muito. Começa com o que cabe, nem que seja pouco por mês. O que importa é deixar fixo e não depender de sobrar. Esse dinheiro você não deixa parado, você guarda num lugar seguro que rende sozinho e eu te mostro onde no próximo vídeo. E você, que eu sei que já está me seguindo, hoje você tem quantos meses de reserva ou ainda saca da empresa no aperto? Me conta aqui.", "legenda": "Você espera sobrar para guardar e por isso nunca guarda nada. A reserva precisa entrar na lista de contas fixas da empresa e sair antes do que sobra. Joga o extrato dos últimos meses no Claude, ele soma as suas despesas, diz de quanto a reserva precisa ser e quanto dá para separar por mês sem sufocar a conta. Começa com pouco, o que importa é deixar fixo."}}, {"t": "pov", "tag": "POV", "titulo": "POV: você descobriu que organizar custa energia e não dinheiro.", "det": {"text": "POV: você descobriu que organizar custa energia e não dinheiro.", "grupo": "Organização e previsibilidade"}}]}, {"id": "101", "date": "09/10", "dow": "sex", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "O caderninho que virou empresa", "det": {"theme": "Bastidores e histórias", "tela": "Comecei com um caderninho perdido", "corpo": "Eu controlava as minhas clientes numa planilha feia sem saber quanto entrava na conta e hoje eu olho para trás sem acreditar. Eu não tenho noção nenhuma de design. Não tinha conexão entre a planilha, as pastas e o financeiro. Eu não tinha como saber o que estava pagando para os fornecedores, mesmo pagando uma pessoa para fazer esse controle. Não tinha controle de quanto estava vendendo nem de quanto entrava na conta da empresa. Hoje é tudo integrado no Claude, todos os produtos do Google automatizados com o meu CRM e eu ainda faço auditorias mensais com o Claude Cowork para ver se o que foi feito bate com o que foi vendido, com o que está na planilha e com o que entrou na conta. Sempre tem algum erro, mas eu sei apontar exatamente qual, sem ficar olhando pasta por pasta. Ninguém fica controlando 50 mil pastas no Drive. Hoje quem faz isso é o Claude Cowork. Até o preenchimento da planilha é automatizado com as pastas, então não tem como dar erro. E você, que eu sei que já está me seguindo, ainda está no caderninho ou já integrou tudo? Me conta aqui.", "legenda": "Eu vivi o empreendedorismo do caderninho e hoje vivo o empreendedorismo com inteligência artificial. Antes era planilha feia, sem conexão com as pastas nem com o financeiro, sem saber quanto entrava. Hoje é tudo integrado no Claude e eu faço auditorias mensais para ver se o que foi feito bate com o que foi vendido, com a planilha e com a conta. O erro aparece apontado, sem olhar pasta por pasta."}}, {"t": "carrossel", "tag": "Carrossel Ensino", "titulo": "5 Histórias e representação · A hora em que entendi que a IA depende de mim", "det": {"tipo": "Ensino", "assunto": "5 Histórias e representação · A hora em que entendi que a IA depende de mim", "arquivo": "Ensino/5 Histórias e representação/05 A hora em que entendi que a IA depende de mim"}}]}, {"id": "102", "date": "10/10", "dow": "sáb", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Não tem empresa, tem emprego mal pago", "det": {"theme": "Provocações e mitos para quebrar", "tela": "Talvez você tenha o pior emprego da sua empresa", "corpo": "Você trabalha sem férias, sem folga e sem hora extra e ainda ganha por hora menos do que pagaria a uma funcionária. Isso não é para te desanimar. É para você se valorizar e cobrar o que merece. Isso é completamente desanimador. Só quem já passou sabe o quanto isso bate lá dentro. Você fala, caraca, não acredito. E acontece mais do que vocês imaginam. É por isso que a gente precisa calcular o preço dos nossos serviços antes, para ter certeza de que está cobrando certo e vendendo para um público que pode pagar. Coloque todos os seus números e todos os seus serviços no Claude. Tudo o que você oferece como serviço, também faz parte. Às vezes eu ofereço café, também faz parte, porque eu coloco uma música (quem paga o spotify?) e coloco uma essência no difusor. Alguém tem que pagar por isso. Coloque tudo no Claude. E peça para ele fazer essa conta com você, o que sobra dividido pelas horas que você trabalha. Ele te mostra o seu valor real por hora. Porque não adianta anunciar para uma galera que não pode pagar o seu preço. Você tem que estar no lugar certo e anunciar para o público certo. Aí você vai ver que vale a pena ser empresária. E você, que eu sei que já está me seguindo, já fez essa conta do seu valor por hora? Me conta aqui.", "legenda": "Faz uma conta dura, mas necessária. Divida o que sobra para você pelas horas que você trabalha. Muita gente ganha por hora menos do que pagaria a uma funcionária. Não é para desanimar. É para se valorizar e cobrar o que merece. Peça para o Claude fazer essa conta com você e ele te mostra o seu valor real por hora."}}]}, {"id": "103", "date": "11/10", "dow": "dom", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "O Claude te mostra onde o seu dinheiro está travando", "det": {"theme": "CRM com o Claude", "tela": "Tem um buraco no seu caixa", "corpo": "Entra cliente o mês inteiro e mesmo assim o dinheiro não bate com o movimento. Tem um buraco que você não enxerga.Tem gente chegando e mesmo assim pouca venda fecha. O problema é que você não enxerga onde, no caminho, as pessoas estão escapando. Com a sua base de clientes pronta, o Claude te mostra isso. Eu colo o conteúdo da planilha de controle de clientes (você tem uma, certo?) e peço uma leitura do meu funil. Ele me diz quantas pessoas passam de uma etapa para a outra e, principalmente, em qual etapa a maioria para de comprar ou para de responder. Aí fica claro se o seu problema é atrair, responder ou fechar. E ele vai além. Ele te mostra de onde vêm as melhores clientes, aquelas que fecham e pagam bem, para você botar energia no canal que funciona. E me mostra quanto tempo passa, em média, entre o primeiro contato e o fechamento. Tudo isso eu só descobri olhando os meus próprios números, não chutando na doida. Essa é a diferença entre achar que precisa de mais cliente e descobrir que o seu gargalo, na verdade está em outro lugar. Muita gente gasta energia tentando atrair mais, Mas atrair cliente é muito mais difícil e custoso do que converter cliente que já te conhece e já quer comprar de você. Não é só saber que tem buraco pra fechar. Isso, todo mundo tem e todo mundo sabe. A questão é que o Claude te ajuda a saber qual é o buraco certo que você precisa tapar agora. E você, que eu sei que já está me seguindo, você sabe em qual etapa as suas clientes mais desistem? Me conta aqui.", "legenda": "Entra cliente, mas no fim do mês o dinheiro não bate com o movimento? O problema é não enxergar onde as pessoas escapam no caminho. Eu colo a minha base no Claude e peço uma leitura do funil. Ele mostra em qual etapa a maioria empaca, de onde vêm as melhores clientes e quanto tempo leva até fechar. Você conserta o buraco certo, em vez de só correr atrás de mais cliente."}}]}]}, {"n": 16, "label": "12 a 18 out", "days": [{"id": "104", "date": "12/10", "dow": "seg", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Antes de pagar a mentoria, faça esse teste", "det": {"theme": "Mentoria", "tela": "Uma pergunta antes de pagar a mentoria", "corpo": "Antes de passar 15 ou 20 mil numa mentoria, tem uma pergunta que te diz na hora se ela vale ou se é enganação: eu vou ter acesso a você ou à sua equipe? A resposta já te diz quase tudo. Se for à equipe, você está comprando aula gravada com nome de mentoria. Eles vão querer te enganar, que a é a equipe, e eu vou aparecer, não tava aparecer quantas vezes? Vai aparecer dando aula pra todo mundo ou vai aparecer em encontro um a um comigo? Depois pergunta quanto tempo dura. Mentoria de verdade é de 3 a 6 meses. Se te vendem um ano com um monte de gente junto, não tem como aquela pessoa te dar atenção e humanamente impossível. Pergunta também se a turma é fechada ou se entra gente nova o tempo todo. Se for dessas cíclicas, você já sabe, vai acabar ensinando os novatos de graça. E olha o grupo, a mentora aparece e responde ou quem movimenta é só a equipe avisando data de encontro? Por último, pede para ver o que está incluído de verdade. Quantas vezes você fala com a mentora mesmo, não com convidado. E se ela estuda o seu caso antes ou chega na reunião sem saber nada do seu negócio. Faz essas perguntas sem medo. Quem entrega de verdade responde na hora e com orgulho. Quem está te vendendo um grupo de WhatsApp caro vai enrolar. E você, que eu sei que já está me seguindo, a mentoria que você fez ou que você pensa em fazer passa nesse teste? Me conta aqui.", "legenda": "Antes de pagar 15, 20 mil numa mentoria, faz essas perguntas. Vou ter acesso a você ou à sua equipe? Quanto tempo dura, mentoria boa é de 3 a 6 meses. A turma é fechada ou cíclica? No grupo, a mentora responde ou só a equipe? Quantas vezes eu falo com a mentora mesmo? Quem entrega de verdade responde na hora. Quem vende grupo de WhatsApp caro enrola."}}, {"t": "pov", "tag": "POV", "titulo": "POV: você precisa de uma estrutura feita para a sua cabeça e não de mais força de vontade.", "det": {"text": "POV: você precisa de uma estrutura feita para a sua cabeça e não de mais força de vontade.", "grupo": "TDAH e cabeça"}}]}, {"id": "105", "date": "13/10", "dow": "ter", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Vender caro é receber parcelado e está tudo bem", "det": {"theme": "Financeiro", "tela": "Vendi uma mentoria de 15 mil e recebi mil no primeiro mês", "corpo": "Você vende uma mentoria de 15 mil e no primeiro mês cai mil reais na conta. Calma que está tudo certo. Você só precisa se preparar para isso. Quando você vende um produto high ticket, com certeza ele vai ser parcelado e o Claude te ajuda a fazer a conta de quantas vendas você precisa para tirar o que precisa por mês contando com esse parcelamento. Uma conta que precisa ser feita e que você pode pedir para o Claude, treinando-o com os dados que o banco te passa e quanto você recebe dependendo do tempo que você antecipa o recebimento do dinheiro. Vamos supor que você mandou um link de pagamento e que esse link de pagamento te paga em 31 dias. Você pode, através de uma taxa, antecipar esse recebimento caso você precise muito do dinheiro. Pra fazer esse cálculo, pode ser no próprio aplicativo do banco ou você pode achar essas informações facilmente na internet: se vale a pena pagar a taxa do banco para receber de uma vez o teu dinheiro logo, ou se vale esperar cada parcela e trabalhar com a quantidade de clientes para chegar na quantidade de dinheiro que você quer tirar por mês. A questão é se planejar. Se você quer tirar um determinado valor por mês, você precisa saber quantos clientes pagando parcelado ao mesmo tempo para você chegar lá. Acho que uma ideia aqui, que até o próprio Claude com certeza daria e ter uma escada de produtos. Ou seja, você Você vende em várias frentes e acaba tendo várias rendas ao mesmo tempo. Assim você ganha de vários lugares para chegar a esse montante que você quer por mês. E você, sabe quantas vendas precisa ter rodando para tirar o que quer por mês? Me conta aqui.", "legenda": "Vender uma mentoria de 15 mil e receber mil no primeiro mês está certo, porque produto caro vem parcelado e isso é normal. O que muda o jogo é planejar. Cada cliente novo se soma às parcelas dos que já pagam e é a soma do mês que te dá o seu dinheiro. Diga ao Claude quanto quer tirar, o valor do produto e o parcelamento e ele calcula quantos clientes você precisa ter pagando ao mesmo tempo."}}, {"t": "carrossel", "tag": "Carrossel Verdade", "titulo": "Organização e produtividade", "det": {"tipo": "Verdade", "assunto": "Organização e produtividade", "arquivo": "Verdades/2 Organização e produtividade/02"}}]}, {"id": "106", "date": "14/10", "dow": "qua", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "A extensão do Claude no Chrome é outra história e some, salva no Google Docs", "det": {"theme": "IA na prática, negócio e conteúdo", "tela": "Você vai perder esse trabalho todo", "corpo": "Você faz um trabalho lindo dentro da extensão do Claude no Chrome, fecha a aba e quando volta ele sumiu. E não tem como recuperar. Deixa eu te contar como eu aprendi a não passar mais por isso. A extensão do Claude no Chrome é uma forma diferente de usar o Claude. Ela funciona como se fosse você entrando dentro dos sites e clicando nas coisas, ela faz sozinha. Mas ela não conversa com o Claude normal, aquele do chat no site. O que você faz dentro dela fica só ali, naquela aba. Se a conversa some, acabou, você não traz de volta. E é dentro dela que eu faço muita coisa pesada, co
