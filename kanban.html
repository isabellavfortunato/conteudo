rantia de resultado. Você sabe quando e como vai pagar de volta. Aqui, o Claude pode te ajudar muito: coloque o contrato do empréstimo no Claude para ver exatamente: quanto você vai pagar de juros, em quantas parcelas, em quanto tempo, para calcular em quanto tempo você precisa juntar dinheiro para fazer esse pagamento. Você sabe que aquilo que o dinheiro vai gerar dá conta de pagar as parcelas. Você vai conseguir aumentar o seu preço para poder pagar esse equipamento? Esse curso, de onde vai sair esse dinheiro? Se você ganha X e, depois do curso, por exemplo, você continuar ganhando X, não valeu a pena a compra. Para decidir com segurança, peça ao Claude para simular se a parcela cabe no seu caixa e quanto o dinheiro precisa render para valer a pena. Para comparar as condições entre um banco e outro, o Perplexity é quem tem uma boa pesquisa na internet também pode pesquisar para você. E você, que já tá me seguindo, que eu sei, já pegou um empréstimo sem saber direito como ia pagar? Me conta aqui.", "legenda": "Antes de pegar aquele empréstimo, responda 3 coisas. Você sabe para que vai usar, sabe quando e como vai pagar e sabe que o que ele gera dá para pagar as parcelas. Faltou um sim, não pegue, porque vira só mais uma conta. Peça ao Claude para simular se a parcela cabe e quanto o dinheiro precisa render, use o Perplexity para comparar bancos e a contadora para o imposto."}}, {"t": "pov", "tag": "POV", "titulo": "POV: são 23h e você ainda está respondendo cliente no WhatsApp.", "det": {"text": "POV: são 23h e você ainda está respondendo cliente no WhatsApp.", "grupo": "Bastidores e rotina"}}]}]}, {"n": 2, "label": "6 a 12 jul", "days": [{"id": "006", "date": "06/07", "dow": "seg", "actions": [{"t": "story", "tag": "Story", "titulo": "Stories do dia, Mais leve", "det": {"tema": "Mais leve", "fisgar": "Recorte do seu canto de gravação, é daqui que saem os vídeos.", "desenvolver": "Mostre os ahm que o JumpCut tira, rindo de você mesma.", "interagir": "Enquete, você se incomoda de aparecer nos vídeos?", "direcionar": "Caixinha, qual a sua maior vergonha na hora de gravar?", "frames": ["enquete e caixinha"]}}, {"t": "video", "tag": "Vídeo", "titulo": "A amiga acha caro, a cliente certa não", "det": {"theme": "Precificação", "tela": "Quem reclama do preço não é cliente", "corpo": "A sua amiga acha o seu trabalho caro e a cliente certa paga sem reclamar. Todo mundo sempre fala que atender a uma amiga ou a um parente é um problema, porque: Ou vem calote. Ou vai reclamar. Ou vai fofocar com outra pessoal sobre seu serviço. Mas o Claude pode te ajudar a não deixar essa relação prejudicar o seu trabalho. Até porque uma amiga ou um parente são pessoas que, principalmente no início, podem te ajudar muito a começar o seu trabalho e a divulgar o seu trabalho. Se eu fosse você, eu colocaria no Claude essa situação, botaria todo o contexto (quanto você cobra, o que você faz, se você atende no lugar tal ou tal) e pediria para o Claude fazer uma simulação das coisas que podem ser desafiadoras no atendimento de uma pessoa conhecida. E qual tom usar quando você precisa impor limites? Porque a profissional é você. Outra: como é que pode ser feita a cobrança dessas pessoas? Porque muitas vezes, por serem amigas ou parentes, as pessoas acham que você é obrigado a fazer de graça ou a dar desconto e você não é. Aquele é o seu trabalho. Você pode pedir para o Claude o que fazer nessas situações e como falar com as pessoas sobre essas questões. Ele sempre vai ter alguma solução para te dar que não vai queimar seu filme, nem te prejudicar e muito menos acabar com a sua amizade Mas, lembrando e uma grande oportunidade de você mostrar o seu trabalho muito bem feito para que as pessoas fiquem estupefatas com o que você tem a oferecer e se tornem seus maiores fãs.", "legenda": "Atender uma amiga ou um parente é diferente, sempre vem o medo do calote, da reclamação ou da fofoca. Mas eles são quem mais te ajuda a divulgar no começo. Jogue a situação no Claude com todo o contexto e peça para ele simular os momentos difíceis e o tom certo para impor limites. E lembre, mesmo sendo amiga e o seu trabalho, ocupa tempo, energia e expertise, então também se cobra."}}, {"t": "pov", "tag": "POV", "titulo": "POV: você jogou a sua bagunça financeira no Claude e ele te mostrou para onde o dinheiro está indo.", "det": {"text": "POV: você jogou a sua bagunça financeira no Claude e ele te mostrou para onde o dinheiro está indo.", "grupo": "IA e Claude no dia a dia"}}]}, {"id": "007", "date": "07/07", "dow": "ter", "actions": [{"t": "story", "tag": "Story", "titulo": "Stories do dia, Reflexão", "det": {"tema": "Reflexão", "fisgar": "Texto, se sobrasse uma tarde, o que você arrumaria primeiro?", "desenvolver": "Você falando sobre escolher uma coisa só para organizar na semana.", "interagir": "Caixinha, qual a parte mais bagunçada da sua empresa hoje?", "direcionar": "Apresente a Consultoria Expressa de leve, em duas horas a gente resolve uma dessas.", "frames": ["fisgar", "consultoria", "enquete e caixinha"]}}, {"t": "video", "tag": "Vídeo", "titulo": "Como eu burlo o meu TDAH quando travo na tarefa mais importante", "det": {"theme": "TDAH e cabeça", "tela": "Você senta, sabe o que fazer e perde 3 horas", "corpo": "Essa é da série Empresária com TDAH. O meu TDAH não me define, mas... Quem tem TDAH conhece essa cena. Você senta com a tarefa aberta na frente. Já sabe o que fazer, metade já está pronta. É só fazer. E você não faz. Arruma desculpa, abre outra coisa, vai ver um vídeo. E quando vê, passaram 3 horas. O pior é que isso acontece justo na tarefa mais importante. A minha transição de carreira depende de revisar, gravar e editar os meus roteiros. E era exatamente aí que eu travava. O que me destravou foi uma descoberta simples. O meu cérebro adora um joguinho. Eu já tinha provado isso com as minhas orações. O Claude me fez um aplicativo com um contador que zera se eu não fizer os 15 minutos do dia. E eu nunca deixo zerar. Levei a mesma ideia para os roteiros. Pedi ao Claude um artefato com uma aba para revisar, uma para gravar e uma para editar, separado por área, com um contador que mostra quantos faltam a cada vez que eu marco um. Agora o que eu mais quero é marcar aquele contador. Quando a tarefa que pode mudar a sua vida é justo a que você não consegue começar, brigar com você não adianta. O que adianta é enganar o bloqueio, virar a coisa num jogo que o seu cérebro queira jogar. É assim que o cérebro com TDAH funciona. No caso, o meu funciona com gamificação para determinadas coisas. E a criatividade de achar a solução que vai te tirar dessa trava é a prova de que ele é muito potente, não incapaz. E você, que eu sei que já está me seguindo, em qual tarefa importante você trava justo quando mais precisa agir? Me conta aqui.", "legenda": "Quem tem TDAH conhece a cena. Você senta, sabe o que fazer e não faz. Some 3 horas, justo na tarefa que pode mudar a sua vida. O que me destravou foi gamificar. Pedi ao Claude um artefato com aba para revisar, gravar e editar, separado por área e com um contador que mostra quantos faltam. Agora eu quero é marcar o contador. Tenho laudo, terapia e psiquiatra. Quem cuida do TDAH é o médico."}}, {"t": "carrossel", "tag": "Carrossel Verdade", "titulo": "Mentalidade", "det": {"tipo": "Verdade", "assunto": "Mentalidade", "arquivo": "Verdades/1 Mentalidade/01"}}]}, {"id": "008", "date": "08/07", "dow": "qua", "actions": [{"t": "story", "tag": "Story", "titulo": "Stories do dia, Organização", "det": {"tema": "Organização", "fisgar": "Texto, tem uma coisa na minha empresa que só eu sei fazer.", "desenvolver": "Mostre você gravando a tela de uma tarefa e o Claude virando aquilo num passo a passo.", "interagir": "Enquete, o que só você sabe fazer na sua empresa?", "direcionar": "Caixinha, quer o passo a passo de como eu documento isso?", "frames": ["fisgar", "enquete e caixinha"]}}, {"t": "video", "tag": "Vídeo", "titulo": "Quanto cada venda deixa para pagar as suas contas", "det": {"theme": "Financeiro", "tela": "Quanto sobra de cada venda sua?", "corpo": "Você vende um serviço e não sabe quanto de verdade sobra para você depois de pagar o custo dele. Quem vai ajudar você a calcular quanto fica depois que você entregou o seu serviço vai ser quem? O Claude! Pode entrar Claude! Primeiro, você precisa descrever detalhadamente o seu serviço para o Claude. Fala absolutamente tudo, desde o início, quando a cliente entra, até quando ela sai. O que você compra, o que você usa de produto, de material. Tudo. Fala para ele quanto você cobra. Fala também caso você venda prazo ou venda parcelado. Nesse caso, fala a taxa da máquina e juros também. Fala, se você repassa ou se você assume essa despesa. Bom, o Claude vai te dizer exatamente quanto fica desse dinheiro entre o que você pagou para fazer o serviço e o que você cobrou pelo serviço. Óbvio que tem um valor aí, uma gordura aí. Só que essa gordura não vai pro seu bolso. Dessa gordura, você precisa tirar o dinheiro para poder cobrir o aluguel do espaço e outras despesas que você acaba tendo na empresa. O que fica dessa subtração aí, sim e dinheiro seu. O Claude vai te ajudar a fazer esse cálculo perfeitamente, porque ele sabe exatamente como funcionam as coisas e você já o alimentou muito bem com todos os seus dados. E você, que está me seguindo, que eu sei, sabe quantas vendas precisa fazer no mês só para cobrir as suas contas? Me conta aqui.", "legenda": "Você sabe quanto cada venda deixa de dinheiro depois de tirar o custo dela? Esse pedaço que sobra é o que paga o aluguel, a luz e o seu pró-labore. Sabendo quanto cada venda deixa, você descobre quantas precisa vender para cobrir as contas e o que vender a mais vira lucro. Jogue o preço e o custo no Claude e peça quanto sobra de cada uma e quantas vender no mês."}}]}, {"id": "009", "date": "09/07", "dow": "qui", "actions": [{"t": "story", "tag": "Story", "titulo": "Stories do dia, IA na prática", "det": {"tema": "IA na prática", "fisgar": "Texto, eu parei de pagar caro na farmácia.", "desenvolver": "Print do Claude comparando preço, conte o truque do CEP para ele não procurar longe.", "interagir": "Caixinha, o que você sempre compra sem comparar preço?", "direcionar": "Salva esse story para lembrar na próxima compra.", "frames": ["fisgar", "post do dia", "enquete e caixinha"]}}, {"t": "video", "tag": "Vídeo", "titulo": "Por que se imaginar lá no topo te trava", "det": {"theme": "TDAH e cabeça", "tela": "Você foge da coisa que mais quer?", "corpo": "Faz 3 dias que eu estava travada numa coisa que eu quero demais e descobri que o que me trava é justamente me imaginar já lá no topo. Foi um vídeo da A Cami que me inspirou a olhar pra esse assunto e fazer esse vídeo. Toda vez que eu tento me imaginar com aquilo pronto, bem na vida, eu me vejo numa situação nova e o meu cérebro já quer combater. Ela disse: Não se imagine com a tarefa cumprida. Porque a grande verdade é que ver essa grandiosidade dá mais medo e pavor do que atrai. Então hoje eu fiz diferente. Em vez de tentar visualizar a coisa pronta e maravilhosa, eu abri o Claude, falei pra ele todas as coisas que eu preciso fazer. Ele sabe, mas sabe em conversas diferentes. Eu peguei todos os documentos de continuidade que eu tenho, alimentei ele com tudo que eu tenho pra fazer, com tudo que já foi feito, e aí pedi, com as minhas palavras, para ele fazer listas do que eu preciso fazer e quebrar no menor passo possível. Mandei ele fazer um artefato pra ele me mostrar só a primeira tarefa e a próxima, e só ir revelando as próximas quando eu fizesse a anterior. Gamifiquei porque meu cérebro funciona muito bem através de jogos e de ticar coisas. Ele me devolveu uma única tarefa de 5 minutos. Foi a primeira vez em 3 dias que eu não fugi. E você, que eu sei que já está me seguindo, está travada em alguma coisa agora porque está tentando enxergar ela gigante demais? Me conta aqui.", "legenda": "Eu descobri que me imaginar lá no topo, rica e realizada, me dava mais medo do que vontade. E era esse medo que me travava. Em vez de visualizar a coisa pronta, eu peço para o Claude quebrar o que me trava no menor passo possível e me mostrar só o próximo. Crédito para a criadora que me abriu a cabeça nesse vídeo sobre TDAH, vou deixar o arroba dela aqui [arroba da criadora]."}}, {"t": "pov", "tag": "POV", "titulo": "POV: o cliente sumiu de repente e você já achou que era o fim.", "det": {"text": "POV: o cliente sumiu de repente e você já achou que era o fim.", "grupo": "Vendas e cliente"}}]}, {"id": "010", "date": "10/07", "dow": "sex", "actions": [{"t": "story", "tag": "Story", "titulo": "Stories do dia, Mentalidade", "det": {"tema": "Mentalidade", "fisgar": "Texto, eu demorei para ver que eu não era dona, era funcionária do meu próprio negócio.", "desenvolver": "Você contando a virada de autônoma para empresária.", "interagir": "Enquete, você se sente dona do negócio ou funcionária dele?", "direcionar": "Caixinha, o que mais te prende dentro da operação?", "frames": ["fisgar", "enquete e caixinha"]}}, {"t": "video", "tag": "Vídeo", "titulo": "O dinheiro que a empresa precisa ter para rodar", "det": {"theme": "Financeiro", "tela": "Porque sobra trabalho e falta dinheiro?", "corpo": "Você fecha o projeto da sua vida e mesmo assim passa aperto, porque o dinheiro só entra lá na frente. Quando a gente faz uma venda boa, a primeira coisa que a gente faz é comemorar e gastar, sem pensar no amanhã. Mas o amanhã chega e os boletos também. E aí, o que você vai fazer agora? Toda empresa precisa de um fôlego para rodar, para pagar as contas do dia a dia enquanto o dinheiro das vendas a prazo e parcelado não chega. Se a sua empresa tem 30 mil de despesa por mês, você precisa ter um tanto guardado para não depender de cada venda cair na hora certa. Que que eu fiz? Joguei as minhas despesas no Claude e pedi para ele calcular quanto eu precisava ter parado na conta para aguentar os meses apertados antes de o cliente me pagar. Depois você vai alimentá-lo com todas as despesas que a sua empresa tem e com o quanto você tem a receber. Ele vai fazer tipo um calendário do dia do recebimento desses projetos que você já vendeu e distribuir para a frente quanto e quando você pode pagar suas contas. Crescer sem esse fôlego sufoca, mesmo quando você faz uma venda grande. E você, que está me seguindo, o que eu sei, se a sua empresa ficasse um mês sem entrar nada, aguentava? Me conta aqui.", "legenda": "Você pega um trabalho grande e mesmo assim fica sem dinheiro? Toda empresa precisa de um fôlego guardado só para rodar, enquanto as vendas não caem na conta. Se a despesa é 30 mil por mês, você precisa de um tanto parado, de um a 3 meses. E quando entra um valor grande, primeiro separe as contas da empresa e só depois veja o que dá para tirar. Peça ao Claude para calcular o seu fôlego."}}, {"t": "carrossel", "tag": "Carrossel Ensino", "titulo": "5 Histórias e representação · O conselho ignora quem você é", "det": {"tipo": "Ensino", "assunto": "5 Histórias e representação · O conselho ignora quem você é", "arquivo": "Ensino/5 Histórias e representação/02 O conselho ignora quem você é"}}]}, {"id": "011", "date": "11/07", "dow": "sáb", "actions": [{"t": "story", "tag": "Story", "titulo": "Stories do dia, Preço", "det": {"tema": "Preço", "fisgar": "Texto, eu já cobrei pouco com medo de perder o cliente.", "desenvolver": "Você confessando, recorte fechado no rosto.", "interagir": "Quiz, quando foi a última vez que você subiu o seu preço?", "direcionar": "Caixinha, qual o seu maior medo na hora de passar o preço?", "frames": ["fisgar", "enquete e caixinha"]}}, {"t": "video", "tag": "Vídeo", "titulo": "Acompanhar e projetar o mês em vez de torcer", "det": {"theme": "Previsibilidade e caixa", "tela": "Pare de torcer e comece a projetar o mês", "corpo": "A maioria das empresárias começa o mês torcendo para entrar dinheiro e só descobre que não deu no último dia. Por que, em vez de torcer, você não começa a projetar? A Isabella, nem sei o que é isso. Calma que o Claude vai te ajudar. O Claude monta 2 controles. Um de quem pediu orçamento e não fechou, com um lembrete para você fazer o retorno na hora certa. E outro que projeta o seu mês provável, olhando as etapas do que já está em andamento, para você estimar o que vem pela frente. Você precisa disso para saber quanto você vai receber durante o mês para pagar as suas contas. Se não, você fica sempre dependendo do acaso. Porque tem venda que parece perdida e só está esperando um retorno simples. A pessoa pediu o orçamento e sumiu. E quase sempre é só a correria, sem recusa nenhuma. Um lembrete gentil recupera muito disso. E mesmo num negócio de compra eventual, dá para projetar. Quando você acompanha as etapas, quantos orçamentos saíram, quantos viraram conversa, quantos estão perto de fechar, você para de adivinhar e começa a estimar o mês com base em número.\nNão preciso nem dizer que, se você treinar o Claude direitinho com a sua forma de falar, ele escreve as mensagens para você, soando como você, mas ainda sendo simpática. Obviamente, eu estou dizendo isso porque eu não sou simpática. Espero que você seja. E você, que eu sei que já está me seguindo, você projeta o seu mês ou começa ele só na torcida? Me conta aqui.", "legenda": "A maioria começa o mês torcendo para o dinheiro entrar, mas você pode projetar quanto vai entrar. Monte com o Claude um controle de quem pediu orçamento e não fechou, com lembrete para o retorno, porque muita venda que parece perdida só espera uma mensagem. E peça um controle das etapas do que está em andamento, para estimar o mês provável com base em número, em vez de adivinhar."}}]}, {"id": "012", "date": "12/07", "dow": "dom", "actions": [{"t": "story", "tag": "Story", "titulo": "Stories do dia, Bastidor", "det": {"tema": "Bastidor", "fisgar": "Recorte do caderno à noite, depois que a empresa fecha começa a faculdade.", "desenvolver": "Mostre o NotebookLM com o seu material de estudo montado.", "interagir": "Caixinha, você está estudando alguma coisa agora?", "direcionar": "Enquete, quer ver como eu estudo com a IA?", "frames": ["enquete e caixinha"]}}, {"t": "video", "tag": "Vídeo", "titulo": "O aplicativo de orações e estudos que o Claude criou para mim", "det": {"theme": "IA no dia a dia", "tela": "O Claude me criou um aplicativo do zero", "corpo": "Dá para pedir para o Claude criar um aplicativo só seu, do tamanho exato da sua rotina. Quase ninguém sabe disso. Eu faço orações todo dia, de manhã e de noite. E eu gosto de marcar um tempo para cada uma. Então eu pedi para o Claude montar um aplicativo de timer, já com os tempos que eu costumo usar. Depois eu dei um upgrade nele, agora eu consigo ajustar o tempo na mão, do jeito que eu quiser na hora, 3 minutos, mais 3, o que eu precisar naquele dia. A primeira aba conta quantas orações eu fiz por dia. E como eu estou num desafio de 100 dias agora, eu pedi para ele contar os dias também. Mas não só os dias soltos. Todo dia que eu marco, ele conta. E conta também os dias seguidos, a sequência. Se eu falho um dia, ele zera a sequência, o que me dá aquele empurrãozinho para não quebrar a corrente. E claro, isso tudo dá para ajustar do meu jeito. Tem ainda uma segunda aba, que é só para os meus estudos. Tudo num lugar só, feito sob medida para a minha rotina, não uma coisa genérica que eu tive que me encaixar. E é isso que eu queria que você Sou Bessie. O Claude não serve só para texto e planilha. Ele constrói ferramentas para a sua vida real, do tamanho exato da sua necessidade, coisa que antes só quem programava conseguia ter. E você, que eu sei que já está me seguindo, que aplicativozinho a sua rotina pedia que ninguém nunca fez do seu jeito? Me conta aqui.", "legenda": "Você sabia que dá para pedir para o Claude criar um aplicativo só seu? Eu faço orações todo dia e pedi um app de timer com os meus tempos. Depois dei um upgrade para ajustar na mão. Uma aba conta as orações e a sequência do meu desafio de 100 dias, zerando se eu falho. Outra é só para estudo. O Claude constrói ferramenta para a sua vida real, não serve só para texto."}}]}]}, {"n": 3, "label": "13 a 19 jul", "days": [{"id": "013", "date": "13/07", "dow": "seg", "actions": [{"t": "story", "tag": "Story", "titulo": "Stories do dia, Mais leve", "det": {"tema": "Mais leve", "fisgar": "Vídeo da tela, isso aqui eu faço num clique só.", "desenvolver": "Mostre um atalho seu funcionando no iPhone.", "interagir": "Enquete, você usa atalhos no celular?", "direcionar": "Caixinha, qual tarefa chata do celular você queria num clique?", "frames": ["enquete e caixinha"]}}, {"t": "video", "tag": "Vídeo", "titulo": "O dia em que entendi que precisava de gestão", "det": {"theme": "Bastidores e histórias", "tela": "Eu não conhecia a minha empresa", "corpo": "No dia em que a pessoa que tocava a minha empresa entrou de férias eu descobri que não sabia quase nada do meu próprio negócio. E eu achei o máximo, porque foi a primeira vez que eu fui obrigada a olhar para minha empresa. Porque eu tinha uma depressão, havia uma ordem interna que não foi dada por mim, mas eles se colocaram essa ordem de não me incomodar com nada. Consequentemente, eu não sabia de nada. Toda a informação estava na mão dessa pessoa e dos outros funcionários. E o pior, quando eu melhorei e voltei para a empresa, eles não queriam me passar essas informações. Eu até me perguntei: será que é para me poupar ou por outro motivo? Quando eu peguei as rédeas da minha empresa de novo, eu tive que reconstruir tudo do início. A primeira coisa que eu fiz foi escrever cada processo e cada tarefa que era feita em cada área da empresa. Foi como montar um quebra-cabeça, porque muita coisa estava escondida e eu não sabia onde. O Claude me ajudou muito nessa etapa. Eu fui ditando todas as coisas que eu ia descobrindo e a gente montou um manual da empresa mesmo sabendo que tinha coisas que a gente precisava descobrir ainda. Toda vez que eu descobri alguma coisa, eu ditava naquela conversa e ele ia ajeitando o manual. Esse manual é atualizado até hoje, todo mundo passou a seguir os manuais, os treinamentos saíram deles e até hoje toda decisão é tomada com base no que está escrito. Com isso, eu acabei trocando a equipe inteira e pude treinar os novos do jeito que eu tinha definido. As pessoas antigas não queriam seguir, porque faziam do mesmo jeito havia muitos anos. Trocar a equipe inteira foi muito triste, mas foi absolutamente necessário para eu tomar o controle novamente e tocar a empresa do jeito que eu achava certo. Eu nunca tive dúvida de que ia colocá-la de volta nas minhas mãos do jeito que eu achava certo. E você, que eu sei que já está me seguindo, você conhece a sua empresa ou ela vive na cabeça dos outros? Me conta aqui.", "legenda": "O dia em que o meu braço direito saiu de férias eu descobri que não sabia nada da minha própria empresa. Tudo estava na cabeça dos funcionários e eles não queriam me passar. Tive que reconstruir do zero. Quem me ajudou foi o Claude, registrando cada rotina aos poucos até virar manual de cada área. Hoje todo mundo segue o mesmo padrão e toda decisão sai do que está escrito."}}, {"t": "pov", "tag": "POV", "titulo": "POV: você cansou de viver no susto e resolveu organizar de uma vez.", "det": {"text": "POV: você cansou de viver no susto e resolveu organizar de uma vez.", "grupo": "Virada e mentalidade"}}]}, {"id": "014", "date": "14/07", "dow": "ter", "actions": [{"t": "story", "tag": "Story", "titulo": "Stories do dia, Prova social", "det": {"tema": "Prova social", "fisgar": "Print de um obrigada de alguém, com permissão.", "desenvolver": "Você comentando o quanto uma mensagem dessas te move.", "interagir": "Caixinha, qual a sua maior trava com a IA hoje?", "direcionar": "Fale do curso de leve, é isso que eu ensino lá dentro.", "frames": ["curso", "prova social", "enquete e caixinha"]}}, {"t": "video", "tag": "Vídeo", "titulo": "O pacote segura cliente e dá dinheiro previsível", "det": {"theme": "Precificação", "tela": "O avulso te deixa refém do cliente", "corpo": "Você vende serviço avulso e vive refém de cliente que some e volta só quando quer. Vender pacotes é muito mais inteligente mesmo que o produto individual em si fique mais barato. O Claude vai te ajudar com isso. Primeiro ele calcula se o desconto ainda deixa lucro, ele escolhe outros serviços e, por exemplo, produtos que você pode vender junto com esses serviços, como se tivesse dando um brinde ou então escolher serviços diferentes e complementares para formar um pacote Premium. E ele pode até criar a arte para você mandar no WhatsApp anunciando a novidade. Ele sugere novas formas de entregar o serviço de formas que nem você tinha pensado. Outra coisa ele mesmo calcula o preço certo que você precisa colocar nesses pacotes para ter lucro porque, de certa forma, você dá um desconto no produto individual em prol da quantidade, esse é um cálculo que tem que ser feito de forma racional e o Claude faz isso por você. E deixa eu te explicar por que o pacote vale tanto a pena. Quando a cliente compra um pacote, ela se compromete a voltar até terminar, então você ganha 2 coisas de uma vez. Previsibilidade, porque você sabe quanto vai entrar e por quanto tempo. E fidelidade, porque ela fica com você em vez de testar a concorrência a cada atendimento. Dessa forma você tem mais tempo para mostrar o valor do seu trabalho e aí fica muito mais fácil vender novamente para ela. Vender para mesma cliente, nem preciso dizer né e a venda mais fácil e mais barata que existe. E você, que já está me seguindo, você já pensou em vender pacote em vez de só vender o produto ou serviço individual?", "legenda": "O pacote é uma das melhores formas de segurar cliente e ter dinheiro previsível. A cliente se compromete a voltar até terminar, então você ganha previsibilidade e fidelidade e ainda vende mais para quem já confia em você. O único cuidado é o desconto deixar lucro. O Claude calcula isso, monta o pacote, sugere o que vender junto, faz a arte para o WhatsApp e dá ideias de novas formas de entrega."}}, {"t": "carrossel", "tag": "Carrossel Lamentação", "titulo": "Cliente e cobrança", "det": {"tipo": "Lamentação", "assunto": "Cliente e cobrança", "arquivo": "Lamentação/01 Cliente e cobrança parte 1"}}]}, {"id": "015", "date": "15/07", "dow": "qua", "actions": [{"t": "story", "tag": "Story", "titulo": "Stories do dia, Organização", "det": {"tema": "Organização", "fisgar": "Texto, eu fazia o checklist e não cumpria o checklist.", "desenvolver": "Mostre a lista do dia já na ordem da sua energia, do jeito que o Claude monta.", "interagir": "Enquete, o seu checklist você cumpre ou ele vira enfeite?", "direcionar": "Caixinha, quer que eu mostre como ele ordena pela sua energia?", "frames": ["fisgar", "enquete e caixinha"]}}, {"t": "video", "tag": "Vídeo", "titulo": "Perdi um prazo, levei um processo e o Claude me tirou do buraco", "det": {"theme": "IA no dia a dia", "tela": "Perdi um prazo e levei um processo", "corpo": "Eu empurrei uma burocracia do trabalho com a barriga, não vi que tinha prazo e levei um processo. Eu vou te contar uma que dói, mas que pode te salvar. Eu tinha um recadastramento do Da minha classe profissional para fazer, cheio de documento, pagamento em banco, assinatura com certificado digital, até uma procuração que a minha advogada precisava fazer. Era complexo e eu fui empurrando com a barriga porque achava que era coisa demais. Resultado: tinham me mandado uns avisos que passaram reto. Eu não vi que aquilo tinha prazo, perdi o prazo e levei um processo administrativo. Aquele frio na barriga de quem deixou a bola cair. Foi aí que o Claude entrou. Eu joguei tudo na conversa, todos os documentos, os e-mails, o processo, cada papel que eu tinha. E pedi para ele organizar aquela bagunça e me dar um passo a passo do que eu precisava fazer para resolver. Ele separou tudo, colocou em ordem e me disse exatamente por onde começar e o que vinha depois. Eles me deram um prazo novo. Se não fosse ele me guiando passo a passo, eu provavelmente teria perdido esse também, do mesmo jeito. E quando eu precisei mandar uma carta formal, sabe quem escreveu? Ele. Eu só revisei e enviei. O que eu aprendi é o seguinte. Aquelas coisas que a gente empurra com a barriga, quase sempre é porque elas são difíceis de entender e de organizar e o que é complexo dá medo. E é exatamente isso que o Claude desmancha. Ele pega o monte que te paralisa e transforma numa lista do que fazer, na ordem. Você só tem que seguir. E você, que eu sei que já está me seguindo, qual é a coisa burocrática que você está empurrando com a barriga agora? Me conta aqui. E considera jogar ela inteira no Claude.", "legenda": "Vou te contar uma que dói. Eu tinha um recadastramento complexo do trabalho e fui empurrando com a barriga porque achava demais. Não vi que tinha prazo, perdi e levei um processo administrativo. Aí joguei tudo no Claude e pedi para ele organizar e me dar um passo a passo. Sem ele, eu teria perdido o prazo novo também. Até a carta formal foi ele que escreveu. A gente empurra com a barriga o que é difícil de organizar e é isso que ele desmancha."}}]}, {"id": "016", "date": "16/07", "dow": "qui", "actions": [{"t": "story", "tag": "Story", "titulo": "Stories do dia, IA na prática", "det": {"tema": "IA na prática", "fisgar": "Texto, eu perdi um prazo e levei um processo.", "desenvolver": "Conte o aperto em dois stories, que você ficou empurrando com a barriga.", "interagir": "Caixinha, qual papel burocrático você está empurrando agora?", "direcionar": "Amanhã eu mostro como o Claude me organizou. Fica o gancho preso.", "frames": ["fisgar", "enquete e caixinha"]}}, {"t": "video", "tag": "Vídeo", "titulo": "Régua de cobrança com a IA", "det": {"theme": "Cobrança e inadimplência", "tela": "você esquece de olhar o sistema e perde grana", "corpo": "Você já perdeu o prazo de cobrar uma cliente simplesmente porque esqueceu? Existem plataformas que eu não vou falar o nome dos pontos, ASAAS, mandam lembrete de cobrança até por SMS, mas eu acho um pouco demais ficar avisando que a pessoa que ela está devendo. Eu prefiro fazer do meu jeito, com o Claude. Eu peço para ele montar um calendário de cobrança, um sistema, uma régua, com as mensagens já escritas para cada fase do atraso. Um lembrete antes de vencer, gentil, algo como a sua fatura vence em 3 dias. Uma no dia do vencimento, só avisando. E outras depois de vencer, mais insistentes, com firmeza. Ele já deixa tudo pronto, só para enviar. Mas para isso funcionar, você tem que alimentar o Claude direitinho. Eu vou dando para ele as informações de cada cliente, o valor que ela pagou, a data em que ela precisa pagar e a forma de pagamento. Com isso ele sabe quem está perto de vencer, quem já venceu e me lembra na hora certa. E o melhor, ele escreve cada mensagem num tom profissional, que não soa pessoal, então você cobra sem aquele aperto no peito. Fica aparecendo uma automação ou que a sua secretária mandou, mas não você, então ninguém fica chateado. O que muda é que a cobrança para de depender da sua memória e do seu humor do dia. O sistema faz por você e você só revisa e dispara. Cliente nenhum passa despercebido e você sai daquele papel chato de ficar correndo atrás de todo mundo de cabeça. E você, que eu sei que está me seguindo, eu já vi, você tem um sistema para cobrar ou cobra só quando lembra? Me conta aqui.", "legenda": "Você esquece de cobrar e o prazo passa? Existem aplicativos que mandam lembrete automático, mas eu prefiro fazer com o Claude. Peça para ele montar a sua régua de cobrança, com mensagens prontas antes de vencer, no dia e depois, cada uma num tom profissional. Alimente ele com o valor, a data e a forma de pagamento de cada cliente e ele te lembra na hora certa."}}, {"t": "pov", "tag": "POV", "titulo": "POV: você adia uma tarefa chata e ela só cresce.", "det": {"text": "POV: você adia uma tarefa chata e ela só cresce.", "grupo": "Organização e previsibilidade"}}]}, {"id": "017", "date": "17/07", "dow": "sex", "actions": [{"t": "story", "tag": "Story", "titulo": "Stories do dia, Mentalidade", "det": {"tema": "Mentalidade", "fisgar": "Texto e se der certo demais e eu não der conta?", "desenvolver": "Você falando do medo de crescer.", "interagir": "Enquete, o que te assusta mais, dar errado ou dar certo?", "direcionar": "Caixinha, o que o seu crescimento exigiria de você que hoje te dá medo?", "frames": ["fisgar", "enquete e caixinha"]}}, {"t": "video", "tag": "Vídeo", "titulo": "Dívida boa e dívida ruim", "det": {"theme": "Financeiro", "tela": "Dívida não é atestado de fracasso", "corpo": "Estar endividada não faz de você uma péssima empresária você precisa entender a situação e e de ajuda para sair da dívida da forma certa. E é claro que quem vai te ajudar é o Claude. Tem dívida ruim e tem dívida menos ruim. A ruim é a cara, de juro alto, que cresce sozinha enquanto você dorme. Os juros de atraso ou parcelamento do cartão e o cheque especial são os campeões. Tem financiamentos com letrinhas miúdas. Antes de você assinar o contrato, vale mais a pena você jogar o contrato no Claude para ele te dizer o que você não está vendo ali naquele contrato. A dívida menos ruim é a dívida barata e aquele empréstimo, por exemplo, que você pegou de propósito para comprar algo, um curso, um equipamento que vai gerar um retorno maior do que custou. Joga sempre no Claude para ver em quanto tempo você vai ter esse retorno e quanto você vai conseguir cobrar a mais do que o que você cobra hoje a partir daquele item que você comprou. Quando você já está com mais de uma, a regra é atacar primeiro a de juros mais alto, que é a que mais cresce, mesmo que ela não seja a maior nem a mais antiga. O que afunda você são os juros, mais do que o tamanho da dívida. Na prática, liste todas as suas dívidas, joga os contratos e peça ao Claude para ordenar pela taxa de juros, da mais cara para a mais barata e te mostrar qual atacar primeiro. E antes de pegar qualquer dívida nova, pega o contrato ou a proposta e peça para ele calcular os juros e ver se a parcela cabe no seu bolso. E você, que já tá me seguindo, que eu sei, você tem mais de uma dívida, sabe qual delas tem o juro mais alto? Me conta aqui.", "legenda": "Estar endividada não faz de você uma má empresária. Dívida ruim é a de juro alto que cresce sozinha, como o rotativo do cartão e o cheque especial. Ataque primeiro a de maior juro, mesmo que não seja a maior nem a mais antiga. Liste tudo e peça ao Claude para ordenar pela taxa e dizer qual pagar primeiro."}}, {"t": "carrossel", "tag": "Carrossel Ensino", "titulo": "2 IA na prática · 5 coisas que o Claude faz pela sua empresa", "det": {"tipo": "Ensino", "assunto": "2 IA na prática · 5 coisas que o Claude faz pela sua empresa", "arquivo": "Ensino/2 IA na prática/01 5 coisas que o Claude faz pela sua empresa"}}]}, {"id": "018", "date": "18/07", "dow": "sáb", "actions": [{"t": "story", "tag": "Story", "titulo": "Stories do dia, Dinheiro", "det": {"tema": "Dinheiro", "fisgar": "Texto, teve um mês que o caixa me pegou de surpresa.", "desenvolver": "Conte e mostre como você projeta as próximas semanas com o Claude.", "interagir": "Quiz, você sabe como vai estar o seu caixa daqui a quatro semanas?", "direcionar": "Caixinha, quer ver como eu monto essa previsão?", "frames": ["fisgar", "enquete e caixinha"]}}, {"t": "video", "tag": "Vídeo", "titulo": "Gravar um vídeo dá muito mais trabalho para uns corpos do que para outros", "det": {"theme": "Bastidores e histórias", "tela": "Apertar gravar não custa igual para todo mundo", "corpo": "Esse vídeo que parece simples começou uma hora antes, esperando o meu cabelo secar, com uma calcinha que quase não me deixa respirar. Eu edito o meu vídeo para a minha barriga não ficar aparecendo. Eu gravo com uma calcinha apertada que quase não me deixa respirar, só para ter um mínimo de postura e entregar um vídeo decente. Isso não aparece na tela. O que aparece é o resultado pronto, que parece super simples. Quando o conselho é grava mais, grava todo dia, se assume que apertar esse botão custa igual para todo mundo. E não custa. Eu uso o Claude para isso ficar mais leve. Ele organiza a minha semana de gravação conforme a minha energia, junta num dia só o que dá para gravar de uma vez e separa o resto para os dias em que eu tenho menos disposição ou mais reuniões pra fazer, pra que eu não precise ficar parando o tempo todo. Assim eu não preciso acordar pronta todo santo dia. Eu preparo em bloco e respiro. O meu corpo em si nunca foi o problema. O problema é que as pessoas fingem que o esforço é o mesmo e que todo mundo é igual. Finge que o esforço é o mesmo. Eu queria que a gente falasse mais sobre isso, sobre o que tem por trás de um vídeo que parece fácil. E você, que eu sei que já está me seguindo, o que você esconde de trabalho por trás de um vídeo seu? Me conta aqui.", "legenda": "Tem corpo que dá mais trabalho para gravar um vídeo. Eu edito a barriga, gravo com uma calcinha que quase não me deixa respirar e levo 1 hora só com o cabelo. O conselho de gravar todo dia finge que isso custa igual para todo mundo. O meu corpo nunca foi o problema. O problema é a régua. Eu uso o Claude para organizar a gravação pela minha energia e gravar em bloco, sem precisar acordar pronta todo dia."}}]}, {"id": "019", "date": "19/07", "dow": "dom", "actions": [{"t": "story", "tag": "Story", "titulo": "Stories do dia, Bastidor", "det": {"tema": "Bastidor", "fisgar": "Print do lembrete das 11 da manhã, todo dia chega isso para mim.", "desenvolver": "Conte que o Claude montou os 366 ensinamentos sozinho nos lembretes.", "interagir": "Caixinha, qual hábito bom você vive esquecendo?", "direcionar": "Enquete, quer ver como eu montei essa automação?", "frames": ["enquete e caixinha"]}}, {"t": "video", "tag": "Vídeo", "titulo": "A ordem certa das tarefas é a da sua energia", "det": {"theme": "TDAH e cabeça", "tela": "Não é falta de força de vontade", "corpo": "Você força a tarefa mais difícil na hora errada do dia e depois acha que o problema é falta de força de vontade. Tem 2 conselhos famosos de produtividade que brigam entre si. Um diz para você começar pelas tarefas pequenas e mais mecânicas. O outro diz para encarar primeiro a tarefa mais difícil do dia, o tal “comer o sapo\". E os dois estão certos e errados ao mesmo tempo. Só que a ordem certa não vem de uma regra nem de um método de produtividade que te empurraram goela a baixo. Vem de como a sua energia corre ao longo do dia. De manhã, por exemplo, eu não sou ninguém, então pego as coisas pequenas da minha lista e vou ticando enquanto acordo. Lá pelas 11h eu tenho coragem de atacar o que é pesado, tipo o financeiro. À noite a energia cai de novo, então só faço coisas pontuais e preparo o dia seguinte. E é aqui que o Claude entra bem. Você conta para ele as suas tarefas e em que parte do dia você rende mais. E ele organiza a sua lista por energia, o pesado para quando o seu corpo aguenta e o leve para quando ele não aguenta. Se você conectar ele à sua agenda do Google, ele ainda coloca as suas tarefas entre eventos que você possa vir a ter. Detalhe que ele não inventa a sua lista, ele coloca na ordem que funciona para você. Não tem nada de força de vontade aqui. Você não está enrolando, você está respeitando o seu corpo. Tarefa difícil na hora errada não rende. E Não é problema seu, é a ordem que estava trocada. E você, que eu sei que já está me seguindo, qual é o horário do dia em que você rende mais? Me conta aqui que eu quero saber.", "legenda": "Existe quem mande começar pelo pequeno e existe quem mande “comer o sapo” primeiro. Os dois estão meio certos. A ordem certa das tarefas vem da sua energia, não de uma regra. Pesado na hora que o corpo aguenta, leve quando ele não aguenta. O Claude organiza a sua lista por energia, ele não inventa a lista, só põe na ordem que funciona para você."}}]}]}, {"n": 4, "label": "20 a 26 jul", "days": [{"id": "020", "date": "20/07", "dow": "seg", "actions": [{"t": "story", "tag": "Story", "titulo": "Stories do dia, Mais leve", "det": {"tema": "Mais leve", "fisgar": "Mostre o app, esse aqui o Claude fez só para mim.", "desenvolver": "Mostre os timers e o contador de dias do seu desafio.", "interagir": "Enquete, você sabia que dá para o Claude criar um app só seu?", "direcionar": "Caixinha, que aplicativo a sua rotina pedia que ninguém fez?", "frames": ["enquete e caixinha"]}}, {"t": "video", "tag": "Vídeo", "titulo": "Você não precisa de curso de Claude", "det": {"theme": "IA na prática, negócio e conteúdo", "tela": "Você não precisa de curso de Claude", "corpo": "Você não precisa de curso de Claude, não precisa de aula para falar o que você precisa e apertar botão. Você não precisa saber o que é skill. Não precisa saber usar Claude Code nem saber programar. Não precisa de nada disso. Isso é a engenharia por trás. Você quer o resultado, não a engenharia. A parte difícil é outra. É você saber o resultado que quer e explicar o seu negócio para ele, como se explicasse para uma pessoa nova na empresa, quem é o seu cliente, como você trabalha, o que você vende. A dificuldade está aí, não no aplicativo. Então não gaste dinheiro aprendendo a clicar. Gaste energia organizando o que você vai contar para a IA. Com o contexto certo, ela entrega personalizado. Sem ele, ela entrega genérico para qualquer um. E você, que eu sei que já está me seguindo, você já se sentiu perdida achando que precisava de um curso para usar a IA? Me conta aqui.", "legenda": "Para de procurar curso de como usar o Claude. Ele é intuitivo, você senta e usa. Não precisa saber skill, Claude Code nem programar, isso é a engenharia e você quer o resultado. A parte difícil é você saber o que quer e explicar o seu negócio para a IA, quem é o seu cliente, como você trabalha, o que você vende. Com contexto ela entrega personalizado, sem contexto entrega genérico."}}, {"t": "pov", "tag": "POV", "titulo": "POV: você se chamou de burra por anos até descobrir que era só a sua cabeça funcionando diferente.", "det": {"text": "POV: você se chamou de burra por anos até descobrir que era só a sua cabeça funcionando diferente.", "grupo": "TDAH e cabeça"}}]}, {"id": "021", "date": "21/07", "dow": "ter", "actions": [{"t": "story", "tag": "Story", "titulo": "Stories do dia, Reflexão", "det": {"tema": "Reflexão", "fisgar": "Texto, se eu tirasse só uma coisa da sua cabeça hoje, qual seria?", "desenvolver": "Você falando sobre tirar o negócio de dentro da cabeça.", "interagir": "Caixinha, o que mais pesa na sua cabeça da empresa?", "direcionar": "Consultoria Expressa, em duas horas eu te ajudo a tirar uma dessas da cabeça.", "frames": ["fisgar", "consultoria", "enquete e caixinha"]}}, {"t": "video", "tag": "Vídeo", "titulo": "Cobrar barato atrai a pior cliente", "det": {"theme": "Precificação", "tela": "Preço baixo atrai a pior cliente", "corpo": "Você cobra barato achando que traz mais cliente e traz mesmo, só que traz justo a que dá mais trabalho. E o Claude me ajudou a sair dessa armadilha. Eu pedi para ele pesquisar o meu mercado pela extensão dele para o navegador, só para me situar. Depois pedi para ele calcular o meu preço a partir das minhas despesas, do quanto eu quero ganhar por mês e do quanto eu consigo produzir. Em poucos minutos ele me deu um preço que cobre os meus custos e ainda deixa lucro, no lugar do chute para baixo que eu fazia no medo. Porque o problema do preço baixo é quem ele atrai. Quem procura o mais barato costuma exigir mais, valorizar menos e negociar cada centavo. Você acaba trabalhando mais para ganhar menos e para aguentar quem não te valoriza. E eu aprendi isso do jeito difícil. Uma funcionária minha começou a dar um desconto enorme para todo mundo que não tinha fechado. Para os clientes não foi problema. Foi problema para mim, que fiquei com o dobro do trabalho ganhando menos. E o pior foi quando isso chegou no ouvido dos meus concorrentes e parceiros, porque passou uma ideia de desespero, como se eu estivesse sabotando a classe. Se um vai falando para o outro que você cobra barato, você nunca mais consegue cobrar o que acha que vale. Em agenda vazia, Dá só um pequeno percentual de desconto e ainda assim pagamento no Pix. Fora isso você queima o seu nome. E quando você cobra o seu valor de verdade, começa a atrair quem paga pelo que você entrega sem pechinchar. E você, que eu sei que já está me seguindo, segura a cliente errada com medo de dizer não ou já aprendeu a soltar? Me conta aqui.", "legenda": "Cobrar barato traz mais cliente e traz a que dá mais trabalho, exige mais, valoriza menos e negocia tudo. Peça ao Claude para pesquisar o seu mercado pela extensão do navegador e calcular o seu preço pelas despesas, pelo quanto quer ganhar e pelo quanto produz. Eu já vi uma funcionária sair dando desconto e queimar o meu nome com os parceiros. Em agenda vazia, no máximo 20%."}}, {"t": "carrossel", "tag": "Carrossel Verdade", "titulo": "Mentalidade", "det": {"tipo": "Verdade", "assunto": "Mentalidade", "arquivo": "Verdades/1 Mentalidade/02"}}]}, {"id": "022", "date": "22/07", "dow": "qua", "actions": [{"t": "story", "tag": "Story", "titulo": "Stories do dia, Organização", "det": {"tema": "Organização", "fisgar": "Recorte da tela, antes, com as pastas todas bagunçadas.", "desenvolver": "Mostre o depois, organizado e conte a sua convenção de nomes.", "interagir": "Enquete, você acha os seus arquivos na hora que precisa?", "direcionar": "Caixinha, quer o meu jeito de nomear os arquivos?", "frames": ["enquete e caixinha"]}}, {"t": "video", "tag": "Vídeo", "titulo": "O seu negócio é de compra que se repete ou de compra pontual", "det": {"theme": "Previsibilidade e caixa", "tela": "O seu cliente volta ou compra uma vez só?", "corpo": "Antes de fazer qualquer ação promocional, me diz: seu negócio é de compra que se repete ou de compra pontual? Porque isso muda tudo. Você descreve para o Claude o que vende e como a cliente compra e ele te diz onde o seu negócio se encaixa e o caminho de previsibilidade que serve para o seu caso. Sem isso, você acaba botando os pés pelas mãos. No negócio de recompra, a mesma cliente volta sempre, como a manicure, o salão, a nutricionista. Ali a previsibilidade vem de fidelizar e fazer a cliente voltar. No de compra pontual, a pessoa compra uma vez e some por muito tempo, como quem vende um serviço grande e esporádico. Ali a previsibilidade vem de outro lugar, de ter sempre gente nova chegando e de criar um depois para aquela cliente que comprou uma vez. Ou investir num tipo de marketing em que fica sempre vindo gente nova.\nPode ser que seu negócio tenha os dois acontecendo ao mesmo tempo. Você precisa fazer essa análise antes de pensar nas técnicas de marketing que você vai usar e para de copiar o caminho de quem tem um negócio diferente do seu. E você, que eu sei que já está me seguindo, o seu negócio é de cliente que volta ou de compra única? Me conta aqui.", "legenda": "Antes de buscar previsibilidade, descubra uma coisa, o seu negócio é de recompra ou de compra pontual? No de recompra a cliente volta sempre e a previsibilidade vem de fidelizar. No pontual a pessoa compra uma vez e some, então ela vem de atrair gente nova e de criar um depois. Descreva o seu negócio para o Claude e ele te diz o seu tipo e o caminho certo."}}]}, {"id": "023", "date": "23/07", "dow": "qui", "actions": [{"t": "story", "tag": "Story", "titulo": "Stories do dia, IA na prática", "det": {"tema": "IA na prática", "fisgar": "Texto, eu levava uma hora para responder um orçamento.", "desenvolver": "Print do antes e depois, o Claude responde com a sua voz em minutos.", "interagir": "Caixinha, quanto tempo você perde respondendo orçamento?", "direcionar": "Convide para o reel completo onde você mostra isso.", "frames": ["fisgar", "post do dia", "enquete e caixinha"]}}, {"t": "video", "tag": "Vídeo", "titulo": "Em uma tarde a sua bagunça de cliente vira uma base organizada", "det": {"theme": "CRM com o Claude", "tela": "Em uma tarde, cada cliente no lugar certo", "corpo": "Em uma tarde nenhum cliente some de novo. O maior empecilho para começar a se organizar é olhar para a bagunça de hoje e pensar, por onde eu começo? Cliente em mil lugares, conversa perdida, anotação solta. Parece um monte impossível. Mas dá para virar isso em uma tarde, com o Claude fazendo o trabalho pesado. O que eu faço é simples. Eu junto tudo que está espalhado, os prints das conversas, os e-mails, as anotações do caderno, tiro foto e jogo tudo na conversa com o Claude. Aí eu peço: organiza cada cliente para mim, separa por etapa e preenche o que der para deduzir. Ele lê aquele monte e devolve cada pessoa no seu lugar, com o que falta marcado para eu completar. E ele não joga num monte só. Ele coloca cada cliente numa etapa, do primeiro contato até o fechamento, passando por orçamento e negociação. Para cada uma ele guarda o que importa, de onde ela veio, o que ela precisa, o último contato e o mais importante: qual é o próximo passo e quando, para fazê-la comprar de novo. É esse próximo passo que faz a pessoa nunca mais sumir. Em uma tarde, aquilo que te dava agonia vira uma base limpa, que você abre e entende num olhar. O caos não some porque você trabalhou mais. Some porque o Claude organizou para você. E cada vez que for mudando a situação, você vai mandar para o Claude para ele atualizar o seu sistema. E você, que eu sei que já está me seguindo, a sua bagunça de cliente está em quantos lugares diferentes hoje? Me conta aqui.", "legenda": "A maior trava para se organizar é olhar a bagunça de hoje e pensar por onde começar. Eu junto os prints, os e-mails e as anotações soltas e jogo tudo no Claude, pedindo para ele organizar cada cliente por etapa. Ele devolve cada pessoa no lugar, do primeiro contato ao fechamento, com o próximo passo marcado. Em uma tarde o caos vira uma base que você entende num olhar."}}, {"t": "pov", "tag": "POV", "titulo": "POV: você se pergunta como eu posto todo dia sozinha, a resposta é a IA segurando os bastidores.", "det": {"text": "POV: você se pergunta como eu posto todo dia sozinha, a resposta é a IA segurando os bastidores.", "grupo": "Conteúdo e produção"}}]}, {"id": "024", "date": "24/07", "dow": "sex", "actions": [{"t": "story", "tag": "Story", "titulo": "Stories do dia, Mentalidade", "det": {"tema": "Mentalidade", "fisgar": "Texto, eu sinto culpa quando eu paro.", "desenvolver": "Você falando da culpa de descansar.", "interagir": "Enquete, você sente culpa quando para?", "direcionar": "Caixinha, o que você não se permite fazer por culpa?", "frames": ["fisgar", "enquete e caixinha"]}}, {"t": "video", "tag": "Vídeo", "titulo": "Cobrança bem feita não humilha", "det": {"theme": "Cobrança e inadimplência", "tela": "Quem te deve sumiu de vergonha", "corpo": "A cliente que some depois de te dever quase sempre está com vergonha e o jeito como você cobra decide se ela volta ou não. O Claude me ensinou a cobrar sem constranger ninguém. Eu confesso, o meu tom natural na cobrança sempre é ou raivoso ou constrangedor. Então eu escrevo a mensagem do meu jeito e peço para o Claude melhorar o tom e adaptar à situação. Ele me devolve firme, só que gentil, pronta para enviar, O mais neutra e profissional possível. O segredo está em cobrar no tom de confirmação, em vez do tom de acusação. O Claude, que me ensinou isso. Primeiro, quando a cliente some, eu mando uma mensagem só perguntando se está tudo bem com ela, sem falar de dinheiro. Isso já derruba o muro. Se ela não responde, aí vem a de confirmação, algo como, estou confirmando o pagamento do dia tal que ainda não caiu por aqui, será que foi alguma coisa do banco? Isso dá uma saída elegante para os 2 lados, porque nem todo atraso é má fé, muitas vezes a pessoa só esqueceu mesmo. E se você é como eu, que escreve no impulso, deixa o Claude revisar antes de você mandar. Você diz o que quer dizer, do jeito cru e ele tira o veneno e devolve no tom certo. Cobrança não precisa azedar a relação. E você, que eu sei que já está me seguindo, você costuma cobrar no impulso ou pensa no tom antes de mandar? Me conta aqui.", "legenda": "A cliente que some depois de dever quase sempre está envergonhada, não te ignorando. Cobre no tom de confirmação, em vez do tom de acusação. Mande primeiro uma mensagem perguntando se está tudo bem com ela. Depois, algo como estou confirmando o pagamento que ainda não caiu, foi algo do banco. Se o seu tom sai raivoso como o meu, peça ao Claude para deixar firme e gentil antes de enviar."}}, {"t": "carrossel", "tag": "Carrossel Ensino", "titulo": "4 Produtividade e rotina · Como eu gravo vários vídeos em um dia", "det": {"tipo": "Ensino", "assunto": "4 Produtividade e rotina · Como eu gravo vários vídeos em um dia", "arquivo": "Ensino/4 Produtividade e rotina/01 Como eu gravo vários vídeos em um dia"}}]}, {"id": "025", "date": "25/07", "dow": "sáb", "actions": [{"t": "story", "tag": "Story", "titulo": "Stories do dia, Preço", "det": {"tema": "Preço", "fisgar": "Texto, o meu cliente mais barato foi o que mais me deu trabalho.", "desenvolver": "Conte o caso, sem dizer nome.", "interagir": "Quiz, o seu cliente mais barato é o que mais te dá trabalho?", "direcionar": "Caixinha, me conta o seu caso de cliente barato.", "frames": ["fisgar", "enquete e caixinha"]}}, {"t": "video", "tag": "Vídeo", "titulo": "A dor conhecida que te prende", "det": {"theme": "Papo de empresa, sem o Claude", "tela": "Você prefere a dor que já conhece", "corpo": "Esse aqui é um Papo de empresa, sem o Claude, então hoje é só a real entre a gente. Você sabe exatamente o que precisa mudar, sente na pele e mesmo assim não sai do lugar. Eu vivo isso, sabendo exatamente o que preciso mudar e travando. Isso tem nome, chama autossabotagem. É quando você age contra os seus próprios objetivos sem nem perceber. E olha que cruel. Mesmo quando a sua situação não está ruim, você já sabe sofrer ali, já sabe aguentar aquilo. Então o seu cérebro, que vive tentando te proteger, prefere a dor que ele já conhece à incerteza de algo novo. Parece loucura, mas faz todo sentido para o seu instinto de sobrevivência. A gente troca o medo de mudar pelo conforto de continuar igual, mesmo quando igual dói. E aí entra a procrastinação. Como a sua mente está vendo aquela mudança como uma ameaça, então te empurra para qualquer outra coisa, só para você não encarar o que assusta. Você arruma mil tarefinhas e mil distrações para a coisa importante ir ficando sempre para depois. O caminho para sair disso começa com um passo só, reconhecer que esse adiamento todo é a sabotagem agindo. Quando você nomeia o medo, ele perde força. E aí você dá um passo pequeno, mas na direção certa, mesmo com o desconforto ali do lado. Não precisa ser um salto enorme, só precisa ser um passo. Foi assim que eu saí de lugares onde eu estava presa, um passo de cada vez. E se essa paralisia for muito funda, principalmente quando envolve dinheiro e decisões grandes, não enfrenta sozinha. Terapia ajuda demais a olhar para o que está te segurando por baixo. Não tem nada de fraqueza em pedir ajuda para isso. Acho que, se não fosse a terapia, eu nem estaria aqui. E você, que eu sei que já está me seguindo, tem alguma mudança que você sabe que precisa fazer e fica adiando? Me conta aqui.", "legenda": "Você sabe que precisa mudar mas não sai do lugar? Isso tem nome, autossabotagem. O seu cérebro prefere a dor que já conhece à incerteza do novo, então você fica num lugar que te machuca. A procrastinação entra como fuga, longe de ser preguiça. O caminho começa pequeno, reconhecer que o adiamento é a sabotagem agindo e dar um passo na direção certa, mesmo com medo. Se for muito funda, terapia ajuda."}}]}, {"id": "026", "date": "26/07", "dow": "dom", "actions": [{"t": "story", "tag": "Story", "titulo": "Stories do dia, Bastidor", "det": {"tema": "Bastidor", "fisgar": "Recorte da edição, eu só aprendi a exportar direito faz pouco tempo.", "desenvolver": "Mostre o CapCut, conte que o Claude te ensinou os caminhos.", "interagir": "Caixinha, o que mais te trava para fazer vídeo?", "direcionar": "Enquete, quer dicas de edição para quem grava sozinha?", "frames": ["enquete e caixinha"]}}, {"t": "video", "tag": "Vídeo", "titulo": "Sair da pressa", "det": {"theme": "Mentalidade de dona de negócio", "tela": "As suas piores decisões têm horário", "corpo": "Uma das coisas que mais drenam a nossa energia na hora de empreender é a tomada de decisão. Tomar decisão suga muito da gente e isso não pode ser feito no feeling, sem pensar, sem avaliar e sem dormir antes. Quanto maior a decisão, mais ela merece uma noite de sono. Eu sei que às vezes você tem que decidir rápido. Mas, quando der, faça assim. Pega o Claude, junta todos os números e pede um dashboard claro, com tudo o que você precisa saber. Peça também para ele te ajudar a pesar a decisão com calma, listando os prós, os contras e o impacto no seu caixa. Depois disso, durma. Durma uma noite de sono para, no dia seguinte, decidir fresca, tranquila e já sabendo os números. Eu sei que você vai ficar rolando na cama pensando na decisão, mas pelo menos vai estar pensando com os números na cabeça. Decida no dia seguinte. Não decida na hora. Decisão tomada cansada, no fim do dia, quase sempre é decisão da qual você se arrepende. E você, que eu sei que já está me seguindo, costuma decidir na hora ou dorme antes? Me conta aqui.", "legenda": "Tomar decisão é o que mais drena a nossa energia e não se toma no feeling. Quando der, pega o Claude, junta os números e pede um dashboard claro, com os prós, os contras e o impacto no caixa. Depois durma. No dia seguinte você decide fresca e já sabendo os números. Decida no dia seguinte, não na hora."}}]}]}, {"n": 5, "label": "27 jul a 2 ago", "days": [{"id": "027", "date": "27/07", "dow": "seg", "actions": [{"t": "story", "tag": "Story", "titulo": "Stories do dia, Mais leve", "det": {"tema": "Mais leve", "fisgar": "Vídeo dos cachorros, sabe quanto custa cuidar de sete de uma vez?", "desenvolver": "Conte o susto dos R$ 5 mil e como você planeja para não tomar tudo junto.", "interagir": "Enquete, você planeja os gastos ou eles te pegam de surpresa?", "direcionar": "Caixinha, qual gasto sempre te pega de surpresa?", "frames": ["enquete e caixinha"]}}, {"t": "video", "tag": "Vídeo", "titulo": "O cliente sumiu e você travou", "det": {"theme": "Previsibilidade e caixa", "tela": "Você abriu a agenda vazia essa semana e já botou a culpa na crise", "corpo": "Sumiu um cliente, sumiu outro, a semana ficou fraca e a sua cabeça já decretou que é a crise. É mercado está ruim e fica parada esperando passar. E enquanto você espera, a agenda continua vazia. Antes de aceitar isso, faz um diagnóstico com o Claude. Você conta para ele de onde vinham os seus clientes e o que mudou nas últimas semanas, no Instagram, na indicação, no Google, no que for. Ele te ajuda a separar 2 coisas que parecem iguais e não são: se está chegando menos gente ou se a mesma gente está chegando e fechando menos. Estabelecer isso é fundamental, porque são dois problemas diferentes que requerem duas soluções diferentes. Tem uma ação que você possa fazer para trazer movimento em poucos dias, voltar para quem já comprou de você. O Claude te ajuda a montar um plano para isso, separa quem sumiu há pouco, organiza por ordem de quem vale a pena chamar primeiro e joga as datas no seu calendário para você não deixar morrer. Em vez de esperar a crise passar, você volta a movimentar quem já é seu cliente. Já cliente sumindo quase sempre quer dizer que alguma coisa mudou e você ainda não olhou para ela. Quando você olha, na maioria das vezes dá para reagir rápido. Aí, seria legal você fazer um pedido de feedback e enviar para as pessoas que não fecharam com você. Vai doer, mas pelo menos você vai saber o que está acontecendo para solucionar essa questão. E você, que eu sei que já está me seguindo, quando o cliente some você corre atrás do motivo ou senta e espera a crise passar? Me conta aqui.", "legenda": "Some um cliente, some outro, a semana fica fraca e você já bota a culpa na crise. Antes disso, faz um diagnóstico com o Claude. Conta de onde vinham os seus clientes e o que mudou. Ele te ajuda a ver se está chegando menos gente ou se a mesma gente está fechando menos. Aí dá para reagir rápido, voltando para quem já comprou de você, com o Claude organizando o plano por data."}}, {"t": "pov", "tag": "POV", "titulo": "POV: você é empresária e nunca conseguiu guardar nem um mês de reserva.", "det": {"text": "POV: você é empresária e nunca conseguiu guardar nem um mês de reserva.", "grupo": "Reserva e futuro"}}]}, {"id": "028", "date": "28/07", "dow": "ter", "actions": [{"t": "story", "tag": "Story", "titulo": "Stories do dia, Prova social", "det": {"tema": "Prova social", "fisgar": "Texto, olha o que mudou na empresa de quem parou para organizar.", "desenvolver": "Conte um resultado de verdade, sem prometer milagre.", "interagir": "Caixinha, o que você mais quer organizar este mês?", "direcionar": "Fale do curso, é o passo a passo disso lá dentro.", "frames": ["fisgar", "curso", "prova social", "enquete e caixinha"]}}, {"t": "video", "tag": "Vídeo", "titulo": "Pró-labore e lucro, você é a primeira a receber", "det": {"theme": "Financeiro", "tela": "Você se paga ou só tira da empresa?", "corpo": "Você tira dinheiro da empresa quando precisa, quanto dá, sem critério nenhum. E ainda acha que aquele dinheiro é todo seu. O dinheiro da empresa é dinheiro da empresa e para pagar a empresa. O Claude já me deu um belo esporro por causa disso. Mas tem uma coisa que a gente precisa fazer: definir um pró-labore para gente, um salário. Mesmo que você seja a dona da empresa, você precisa tirar um salário. A questão é como calcular um pró-labore para você tirar sem acabar com o dinheiro da empresa? Na verdade, se você está tirando aos poucos, você já está acabando com a empresa. Você só precisa se organizar agora para tentar tirar esse dinheiro de uma vez, ou pelo menos estabelecer um único valor para tirar. E é o Claude que vai te dizer isso. Você vai jogar lá quanto a sua empresa faz por mês e quais são os seus gastos com a empresa. E aí ele vai te dizer quanto é possível tirar de pró-labore para você pagar suas contas pessoais. É claro que você precisa saber também o valor das suas despesas pessoais para poder alimentar o Claude, para ele te dar um número ainda mais assertivo. Por muito tempo eu tirava dinheiro da minha empresa quando precisava, quanto dava, sem critério nenhum e foi o Claude que me mostrou o estrago que isso fazia. E você, que eu sei que está me seguindo - tira dinheiro da empresa de qualquer jeito porque, na sua cabeça, aquele dinheiro é seu? Me conta aqui.", "legenda": "Você tira dinheiro da empresa sem critério ou tem um valor fixo? Esse valor fixo é o seu pró-labore, o seu salário de dona. E você é uma despesa da empresa como qualquer outra. Se você trabalha sem se pagar, o lucro que aparece é ilusão, porque quem está bancando é você. Peça ao Claude um valor que a empresa aguenta e quanto ela precisa vender para te pagar. O enquadramento e o imposto, a sua contadora fecha."}}, {"t": "carrossel", "tag": "Carrossel Lamentação", "titulo": "Cliente e cobrança", "det": {"tipo": "Lamentação", "assunto": "Cliente e cobrança", "arquivo": "Lamentação/02 Cliente e cobrança parte 2"}}]}, {"id": "029", "date": "29/07", "dow": "qua", "actions": [{"t": "story", "tag": "Story", "titulo": "Stories do dia, Equipe", "det": {"tema": "Equipe", "fisgar": "Texto, R$ 1 de salário não custa R$ 1 para a empresa.", "desenvolver": "Conte que cada R$ 1 vira perto de R$ 1,47, com o aviso de que a contadora confirma a conta.", "interagir": "Enquete, você sabe quanto custa de verdade um funcionário?", "direcionar": "Caixinha, quer ver como eu calculo o custo real com o Claude?", "frames": ["fisgar", "enquete e caixinha"]}}, {"t": "video", "tag": "Vídeo", "titulo": "O antes e depois de uma consultoria", "det": {"theme": "Bastidores e histórias", "tela": "A consultoria que devolveu o filho a ela", "corpo": "Tive uma cliente que empreendia afogada em trabalho com um filho atípico e hoje ela aproveita o filho sem a empresa nas costas. Tinha ajuda do marido e da mãe, mas a gente sabe a dificuldade de ser mãe atípica e sempre a mãe. O que mudou para ela foi ter o trabalho organizado. A gente montou um banco de tarefas dentro de uma conversa do Claude e ele organizou um dashboard com todas as suas tarefas e ela escolhe o que fazer conforme a sua agenda e a sua energia. Porque se o trabalho está organizado, quando você senta para trabalhar está tudo certo, mesmo que na hora que você levanta esteja o caos. E aí vem o melhor. Levantar para dar comida e botar o filho para dormir vira um privilégio, um momento de conexão que não tem preço. É para isso que uma mamãe escolhe empreender. Para saber que, quando ele dormir, ela volta e está tudo organizado, isso reenergiza. Tudo o que ela tinha para fazer já estava previsto numa playlist da semana. Então ela aproveitava o momento com o filho sem o estresse do trabalho solto das tarefas nadando sem rumo na cabeça. E você, que eu sei que já está me seguindo, o seu trabalho está organizado a ponto de te dar esses momentos? Me conta aqui.", "legenda": "Uma cliente saiu do CLT para empreender com mentoria, mãe de um filho autista. O que mudou a vida dela foi ter o trabalho organizado. A gente monta um banco de tarefas dentro do Claude e ele organiza a empresa. Ela escolhe o que fazer conforme a agenda e a energia e ainda aproveita o filho sem o peso do trabalho solto."}}]}, {"id": "030", "date": "30/07", "dow": "qui", "actions": [{"t": "story", "tag": "Story", "titulo": "Stories do dia, Fechamento", "det": {"tema": "Fechamento", "fisgar": "Texto, um mês atrás eu fazia tudo dentro da cabeça.", "desenvolver": "Recap do que mudou desde que você começou a usar a IA na empresa.", "interagir": "Caixinha, o que você quer ver no próximo mês?", "direcionar": "Agradeça, diga o que vem e convide para o curso ou a Consultoria.", "frames": ["fisgar", "consultoria", "curso", "enquete e caixinha"]}}, {"t": "video", "tag": "Vídeo", "titulo": "Uma conversa só para o iPhone e os meus atalhos", "det": {"theme": "IA no dia a dia", "tela": "Eu uso o app Atalhos para cada tarefa chata", "corpo": "Cada tarefinha repetida que você faz na mão no celular rouba a sua energia todo dia sem você ver. Eu tenho uma conversa no Claude que é só sobre o meu iPhone e o meu iPad. É ali que eu tiro toda dúvida do aparelho. E olha, uns 90% dessa conversa é uma coisa só, criar atalho. Se tem uma coisa que eu amo e atalho. Se dá para criar um atalho para facilitar a minha vida, eu vou criar. Tudo que é repetitivo, que eu faço todo dia na mão, eu pergunto para o Claude como transformar num clique só. E ele me ensina o passo a passo, certinho para o meu aparelho. Eu fiz, por exemplo, um atalho para adicionar um novo lembrete no aplicativo Lembretes. Você vai falar: “Mas, Isabella, isso já tem!” Não! Você tem que: Abrir o Lembretes Clicar na lista que você quer Clicar no “Mais” Escrever o lembrete São quatro passos. A ideia do atalho é que, em um botão, você já coloque o lembrete diretamente numa lista chamada “Inbox”, e depois você passa para a lista que você quiser. Teve uma que não é atalho, mas que mudou meu dia: a Siri. Antes me parecia que ela ouvia por pouquíssimo tempo e eu tinha que falar correndo, atropelado, para dar tempo. Eu nem sabia que dava para mudar isso. O Claude me mostrou que dá para aumentar o tempo de escuta dela. Agora eu falo no meu ritmo, sem engolir palavra. Ficou tudo muito melhor. Parece bobagem, mas é o tipo de coisa pequena que rouba a sua energia todo dia sem você perceber. Ainda mais eu que uso muito a Siri e o celular. Cada toque a mais, cada tarefa repetida na mão, vai te cansando. Quando você transforma isso em atalho, você devolve tempo e paciência para você. A lição é essa. Não é só a empresa que merece ser organizada e automatizada, a sua vida no celular também. E o Claude é um ótimo professor particular para isso, no seu ritmo, sem te julgar por não saber. E você, que eu sei que já está me seguindo, qual tarefinha chata do seu celular você bem que queria resolver num clique? Me conta aqui.", "legenda": "Eu tenho uma conversa no Claude só sobre o meu iPhone e iPad e uns 90% dela é criar atalho. Tudo que eu faço repetido na mão, eu pergunto como virar um clique só e ele me ensina o passo a passo para o meu aparelho. Até a Siri melhorou, eu não sabia que dava para aumentar o tempo de escuta dela. Coisa pequena que rouba energia todo dia. Vira atalho e te devolve tempo. Não é só a empresa que merece automação, o seu celular também."}}, {"t": "pov", "tag": "POV", "titulo": "POV: você vendeu bastante esse mês e mesmo assim a conta está no limite.", "det": {"text": "POV: você vendeu bastante esse mês e mesmo assim a conta está no limite.", "grupo": "Financeiro e caixa"}}]}, {"id": "031", "date": "31/07", "dow": "sex", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "O que você chama de burrice e cabeça de vento tem nome", "det": {"theme": "TDAH e cabeça", "tela": "O que você chama de burrice tem nome", "corpo": "Você senta para fazer uma coisa simples e não começa e ainda conclui que é burra e desorganizada. Você sabe que está enrolando, você só não sabe por que trava nem como sair disso. E aí vem a conclusão errada, que não tem compromisso, que é burra, que não para nada na cabeça. Demorei para entender que isso tem nome e tem explicação. O TDAH é a forma como o cérebro da gente funciona. E saber disso muda tudo, porque você para de brigar com você mesma e começa a montar uma estrutura que funciona para a sua cabeça. E uma parte enorme dessa estrutura é ter um cérebro fora da sua cabeça, um segundo cérebro. Eu uso o Lembretes, o Notas e o Claude para isso. Tudo que eu não posso deixar escapar eu jogo para ele, ele guarda, organiza e me devolve na hora certa. Às vezes, ele mesmo transforma as coisas que eu coloquei nele em lembretes para eu importar no aplicativo e poder ticar de forma organizada. Eentão eu paro de confiar na memória que me trai e passo a confiar num sistema de fora. Você nunca foi burra. Você estava tentando funcionar sem as ferramentas certas para a sua cabeça. Com elas, você pode chegar onde você quiser. E você, que eu sei que já está me seguindo, você já se chamou de burra por uma coisa que talvez seja só a sua cabeça funcionando diferente? Me conta aqui.", "legenda": "Você senta para fazer algo simples e não começa. Sabe que está enrolando, só não sabe por que trava nem como sair. E conclui que é burra, desorganizada, sem compromisso. Demorei para entender que isso tem nome e a forma como o cérebro funciona e TDAH. E que a saída é montar uma estrutura para a sua cabeça, com um cérebro fora da cabeça, como o Claude, guardando o que a memória deixa escapar."}}, {"t": "carrossel", "tag": "Carrossel Ensino", "titulo": "4 Produtividade e rotina · Por que você trava numa tarefa", "det": {"tipo": "Ensino", "assunto": "4 Produtividade e rotina · Por que você trava numa tarefa", "arquivo": "Ensino/4 Produtividade e rotina/02 Por que você trava numa tarefa"}}]}, {"id": "032", "date": "01/08", "dow": "sáb", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "O contador você não substitui pela IA", "det": {"theme": "IA na prática, negócio e conteúdo", "tela": "A IA não substitui o seu contador", "corpo": "Eu amo usar a IA para as contas da empresa, mas tem uma coisa que ela não faz por você: ser a sua contadora. Toda empresária precisa de um contador, isso é lei e a IA não entra no lugar dele. O que o contador resolve depende da sua área. O imposto que você paga, as obrigações que você tem, o que dá para deduzir, isso muda de negócio para negócio. Errar aqui custa caro, então essa parte tem que ser com um profissional. Agora, onde a IA ajuda muito. Ela faz a conta rápida de um imposto, de um juros, de uma taxa, para você ter uma ideia antes de sentar com o contador. Ela também te ajuda a entender o que ele fala, aquele monte de sigla que você paga e nunca entendeu. Já percebeu que todo contador fala como se ele estivesse falando com outro contador? Mas combina uma coisa comigo. Tudo que envolve imposto e cálculo de tributo você confirma com a sua contadora antes de tomar decisão. A IA te dá a base e a clareza. A palavra final é dela. As duas juntas, você para de assinar papel sem entender. E você, que eu sei que já está me seguindo, você entende o que o seu contador faz ou só paga e assina no escuro? Me conta aqui.", "legenda": "Eu amo usar a IA para as contas da empresa, mas ela não substitui o seu contador. O que você paga de imposto depende do seu CNAE e da sua área. E errar aqui custa caro. A IA ajuda a fazer a conta rápida e a entender as siglas que você nunca entendeu. Mas tudo que é imposto e tributo você confirma com a sua contadora. A IA dá a base, a palavra final é dela."}}]}, {"id": "033", "date": "02/08", "dow": "dom", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Os custos invisíveis que comem o seu lucro", "det": {"theme": "Precificação", "tela": "Os custos invisíveis comem o seu lucro", "corpo": "Você olha a concorrência, copia um preço parecido sem pensar e nem percebe que está cobrando a menos, se você contar isso para o Claude, ele te dá um esporro. Descreva o seu serviço para ele com detalhe, passo a passo, tudo que você usa e faz. E peça para ele somar o custo real de cada venda. Tem muita coisa que a gente não enxerga a olho nu, mas o Claude vê e deixa claro que aquilo tem que ser cobrado. Porque tem custo que a gente não vê ou que vê e não considera. O salão esquece do preço do produto e cobra só o corte. A confeiteira esquece o gás do forno. A manicure esquece quantas aplicações rende um esmalte. Quem manda pelo correio esquece a embalagem e o frete. E ainda tem a taxa do cartão e o imposto, que comem um pedaço de cada venda sem você ver. Mas o custo mais escondido de todos é o seu tempo. O deslocamento até a cliente, as horas respondendo no WhatsApp, o retrabalho que não foi culpa sua, mas você refez de graça. Você acha que o atendimento dura uma hora, mas com tudo somado ele dura 3 horas. E você cobrou por uma. Esses custos invisíveis não somem, ficam escondidos na sua margem, comendo o seu lucro um pouco em cada venda. No fim do mês você não entende por que sobrou tão pouco. O jeito certo é listar tudo que entra em cada serviço, o material, a taxa, o imposto, o seu tempo, pedir ao Claude o custo real de cada venda e botar o seu lucro em cima. Antes de chutar um preço, faça essa conta. E você, que eu sei que já está me seguindo, qual é o custo que você sempre esquece de contar? Me conta aqui.", "legenda": "A gente coloca preço sem pensar e esquece custo. O salão esquece o produto, a confeiteira o gás do forno, a manicure as aplicações do esmalte, quem envia pelo correio a embalagem e o frete. E ainda tem a taxa do cartão e o imposto. Mas o mais escondido é o seu tempo, o deslocamento, o WhatsApp e o retrabalho. Descreva tudo para o Claude, peça o custo real e ponha o seu lucro em cima."}}]}]}, {"n": 6, "label": "3 a 9 ago", "days": [{"id": "034", "date": "03/08", "dow": "seg", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Dona, mãe, esposa e funcionária", "det": {"theme": "Mentalidade de dona de negócio", "tela": "Você dá conta de tudo ou só parece?", "corpo": "Você tenta segurar todos os pratos ao mesmo tempo e termina o dia com a sensação de ter falhado em todos. Não existe mais carregar todos os pratos, a gente vai deixar cair alguns. Os pratos, na verdade, são de plástico e a queda deles não é permanente. Você deixa um prato cair, depois pega ele e volta a rodar. Depois outro pode cair. Isso é a vida. E você tem o poder de decidir, naquela semana, naquele dia, qual prato você prioriza e qual você continua segurando. Se tiver algum prato pela metade, está valendo também. Aceitar isso tira uma culpa enorme das costas. Planeje a sua semana. Primeiro, veja em quais eventos seus, dos seus filhos, da sua família você tem que estar e organize o seu trabalho em volta disso. Avise os seus funcionários que você vai estar ausente naqueles horários. Se você alimentou ele com todas as suas tarefas, o Claude sabe das coisas que você tem para fazer. Se não, tira o print da sua lista de tarefas, joga no Claude e pede para ele organizar a sua semana e dizer quais são as prioridades. E você, que eu sei que já está me seguindo, qual prato você deixou cair essa semana? Me conta aqui.", "legenda": "O erro é querer dar 100% em todos os papéis ao mesmo tempo e isso é impossível. A gente vai deixar cair alguns pratos e tudo bem, a queda não é permanente. Você decide a cada semana qual prato prioriza. Tira o print da sua lista, joga no Claude e pede para ele organizar a semana e dizer as prioridades. Aceitar isso tira uma culpa enorme das costas."}}, {"t": "pov", "tag": "POV", "titulo": "POV: você abre o notebook para trabalhar e tem 14 abas de coisas que começou e não terminou.", "det": {"text": "POV: você abre o notebook para trabalhar e tem 14 abas de coisas que começou e não terminou.", "grupo": "Bastidores e rotina"}}]}, {"id": "035", "date": "04/08", "dow": "ter", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Organizar quem te deve", "det": {"theme": "Cobrança e inadimplência", "tela": "Você sabe quem está te devendo agora?", "corpo": "Me responde agora: você sabe exatamente quem está te devendo, quanto e há quanto tempo? Eu vivia com minhas informações bagunçadas, até o Claude me dar um panorama claro de todas as minhas clientes. Eu alimento ele com cada atendimento e ele me devolve um painel completo, quem paga bem, quem vive atrasando, quem só paga com lembrete. Com isso eu sei exatamente como tratar cada uma, sem perder tempo nem depender da minha memória. No fim de cada atendimento, eu abro a conversa com o Claude e falo, essa cliente gastou tanto e vai pagar no dia tal. Parece pouco, mas com o tempo ele monta um padrão e me diz que tipo de pagante é cada cliente. Quem pode pagar no final do serviço, quem precisa dar entrada, quem merece uma regalia por ser pontual. Você para de tratar todo mundo igual e passa a tratar cada uma pelo histórico dela. E aí dá para criar regras justas. A cliente que sempre atrasa, por exemplo, passa a pagar adiantado, nem que seja metade e o resto no final. Se ficar sem graça de impor isso, você apresenta como uma nova política da empresa, diz que agora tem uma pessoa cuidando do financeiro e que essa virou uma regra para todo mundo. Tira o teu da reta. E você, que eu sei que já está me seguindo. Você tem controle dos tipos de cliente que você tem, ou você só vai ver isso quando aperta de grana? Me conta aqui.", "legenda": "Você sabe agora quem está te devendo, quanto e há quanto tempo ou vive no achismo? Conte cada atendimento para o Claude, essa cliente gastou tanto e paga no dia tal e ele monta um painel de quem paga bem, quem atrasa e quem precisa dar entrada. A que sempre atrasa passa a pagar adiantado, apresentado como nova política da empresa. Cobrança organizada vira decisão, não achismo."}}, {"t": "carrossel", "tag": "Carrossel Verdade", "titulo": "Mentalidade", "det": {"tipo": "Verdade", "assunto": "Mentalidade", "arquivo": "Verdades/1 Mentalidade/03"}}]}, {"id": "036", "date": "05/08", "dow": "qua", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Histórias de quem quase desistiu", "det": {"theme": "Bastidores e histórias", "tela": "Por que tanta gente empreende depois de um filho", "corpo": "Você só foi empreender de verdade depois que teve um filho e tem um motivo por trás disso que quase ninguém conta. Para quem não tem rede de apoio é muito difícil voltar para o CLT. Eu não estou falando mal do CLT, mas ele te leva pelo menos 9 horas do seu dia. Tirando as 8 que você passa dormindo, quanto sobra para o seu filho? Não é toda mulher que está disposta a pagar esse preço. Então a maioria das que decide
