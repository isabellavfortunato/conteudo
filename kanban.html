m empreender e têm essa gana de fazer dar certo são mulheres com filhos, porque cuidar dos filhos não tem preço. A flexibilidade de horário do empreendedorismo é enorme. Eu não estou dizendo que você não vai trabalhar muito, estou dizendo que dá para se organizar para trabalhar na hora em que você não está com eles. E é aqui que o Claude entra, porque essa flexibilidade só vira realidade quando você sabe exatamente tudo que você precisa fazer e todos os eventos em que você precisa estar presente e Claude vai te ajudar a montar a sua agenda em volta dos horários com os filhos e o Claude encaixa o trabalho nas janelas livres, para a flexibilidade deixar de ser só promessa e virar a sua rotina de verdade. Mas lembra: você precisa alimentá-lo com todas as tarefas que você precisa fazer, sejam elas pessoais, sejam elas do trabalho. Você pode pedir para ele fazer essa distinção e colocar os eventos, fazer a distinção entre a tarefa e o evento, porque são coisas completamente diferentes. O evento tem data e hora e a tarefa você encaixa entre os eventos. Ele pode priorizar determinadas tarefas para te ajudar nesse sentido. Pede sempre um conselho para o Claude, que sempre tem uma saída para os seus problemas empresariais e de organização. E você, que eu sei que já está me seguindo, a sua virada também veio depois de um filho? Me conta aqui.", "legenda": "O ponto de virada para muita mulher empreender é a chegada de um filho. O CLT pede 8, 9 horas do dia e nem toda mulher quer pagar esse preço. A flexibilidade do empreendedorismo é enorme, mas só vira realidade quando a semana está organizada. Você monta a agenda em volta dos horários com os filhos e o Claude encaixa o trabalho nas janelas livres."}}]}, {"id": "037", "date": "06/08", "dow": "qui", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "O perfeccionismo é medo do fracasso disfarçado", "det": {"theme": "Papo de empresa, sem o Claude", "tela": "Perfeccionismo é medo com nome bonito", "corpo": "Esse aqui é um Papo de empresa, sem o Claude, então hoje é só a real entre a gente. Você adia postar, adia lançar, adia se mostrar esperando ficar tudo perfeito e nunca fica. Aos seus olhos, nunca vai ficar. Eu já segurei coisa pronta por meses só porque achava que não estava boa o suficiente. Esse perfeccionismo é mais medo do fracasso do que outra coisa. Até existe um perfeccionismo que te puxa para cima, o de buscar fazer bem feito. E existe outro, o de viver com pavor de errar. É esse que te adoece, te paralisa e te faz fugir de tentar antes mesmo de começar. Esse cansa. E o que mais machuca é que a gente confunde o resultado com o nosso valor. Um post que não foi bem, um vídeo que não engatou, vira na sua cabeça a prova de que você não presta. Sendo que uma tentativa não diz nada sobre você, diz que você precisa tentar mais e tentar diferente até chegar na receita certa. O contrário de perfeccionismo é prática constante, com espaço para ir ajustando pelo caminho. E se essa autocobrança for tão forte que te paralisa de verdade, a terapia ajuda muito a mexer na raiz disso. Aliás, esse vídeo nasceu de uma sessão de terapia. E você, que eu sei que já está me seguindo, o seu perfeccionismo te puxa para frente ou te trava antes de começar? Me conta aqui.", "legenda": "Você adia postar esperando ficar tudo perfeito? Esse perfeccionismo quase sempre é medo do fracasso com roupa bonita. A pesquisa mostra que o perfeccionismo de evitar erro só traz cansaço e paralisia. E a gente confunde um resultado ruim com o próprio valor. Mas um post que não foi bem fala de uma tentativa, só daquela. Fala com você com a gentileza que daria a uma amiga e libera o bom o suficiente para o que não precisa ser perfeito."}}, {"t": "pov", "tag": "POV", "titulo": "POV: você passou a semana achando que era crise e era só um canal que tinha caído.", "det": {"text": "POV: você passou a semana achando que era crise e era só um canal que tinha caído.", "grupo": "Vendas e cliente"}}]}, {"id": "038", "date": "07/08", "dow": "sex", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Eu pesquisei fornecedor, medida e preço de um produto inteiro com o Claude", "det": {"theme": "IA no dia a dia", "tela": "Achei fornecedor, medida e preço sem entender nada", "corpo": "Eu queria mandar fazer um produto, mas era cheio de detalhe que eu não dominava, medida, quantidade, tipo de material. Em vez de me perder, eu botei o Claude para pesquisar tudo, do zero. Era um terço que a gente usa no budismo, que tem uma ordem certa nas contas, um número certo, partes diferentes, cores diferentes. Eu me perdia só de pensar. O meu já está quase sem todas as contas, porque meu cachorro comeu as contas, já que elas são de madeira. Então eu pedi primeiro para o Claude pesquisar quantas contas tem, o número exato, como cada parte se monta. Pedir para o Perplexity procurar também. Informação nunca é demais, afinal, é uma coisa que tem que ser preciso. Depois, com isso na mão, eu pedi para ele ver quanto custava. Aí ele percebeu uma coisa boa, as contas ficavam muito mais baratas no atacado. Eu falei, então me dá o preço dos saquinhos mínimos de contas. Ele me deu a conta certinha e ainda me disse para onde ir, o Saara, aqui no Rio. E foi além, me deu o endereço de cada loja que vende aquilo por lá. Eu pedi para ele fazer a mesma pesquisa no Mercado Livre e em loja virtual também. E o Mercado Livre ganhou disparado no preço. Como eu prefiro resolver online e por ali que eu vou. Para fechar, eu pedi para ele montar um card com tudo, as medidas, as cores, as quantidades, quantas de cada uma, o preço. Aí eu mando esse card para quem sabe fazer e gosta de andar pelo Saara e a pessoa garimpa para mim com a informação toda na mão. Eu achei o máximo. Eu não sabia nem por onde começar e muito menos aonde ir para procurar esse tipo de material. Uma pesquisa que ia me tomar dias, de coisa que eu nem entendia direito, ele fez inteira, da medida ao preço. E você, que eu sei que já está me seguindo, você já usou o Claude para pesquisar fornecedor e preço de alguma coisa? Me conta aqui.", "legenda": "Eu queria mandar fazer um produto cheio de detalhe que eu não dominava, medida, quantidade, material. Botei o Claude para pesquisar do zero. Ele achou o número certo das peças, viu que saía bem mais barato no atacado, me deu o preço para uma quantidade maior e ainda o endereço das lojas no Saara. Pesquisou no Mercado Livre também, que ganhou no preço. No fim montou um card com medidas, cores e quantidades para eu mandar para quem faz."}}, {"t": "carrossel", "tag": "Carrossel Ensino", "titulo": "4 Produtividade e rotina · Você começa mil coisas e não termina", "det": {"tipo": "Ensino", "assunto": "4 Produtividade e rotina · Você começa mil coisas e não termina", "arquivo": "Ensino/4 Produtividade e rotina/03 Você começa mil coisas e não termina"}}]}, {"id": "039", "date": "08/08", "dow": "sáb", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "A reserva que sai como um boleto", "det": {"theme": "Financeiro", "tela": "Quanto você guardou esse ano? Nada?", "corpo": "Todo começo de ano você jura que vai guardar dinheiro na empresa e no meio do ano não guardou nada. O Claude me ajudou a fazer 2 coisas: calcular quanto precisava ter de reserva, ou seja, as despesas da empresa por pelo menos 3 meses e depois ele me ajudou a achar quanto eu conseguia separar sem apertar demais as contas da empresa. Ele já conhece as contas da minha empresa, eu peço à minha conversa de financeiro me dizer quanto entrou e quanto saiu nos últimos 6 meses. Jogo lá e peço que ele me dizer quanto eu devo e quanto eu posso tirar para começar a fazer a reserva da minha empresa. É claro que, inicialmente, não vai ser um valor enorme, mas você pode pedir para ele fazer também uma escadinha para você ir aumentando. Agora, a partir de hoje, que você já sabe quanto você tem que tirar de reserva e que deve tratá-la como um boleto que você paga todo mês, sem falta. E você, que eu já vi que está me seguindo, você guarda um valor fixo ou só quando dá? Me conta aqui.", "legenda": "Todo ano você jura que vai guardar e nunca guarda? O erro é esperar sobrar, porque nunca sobra. A reserva tem que sair como um boleto obrigatório, uma fatia pequena de cada venda, assim que o dinheiro entra. Pode começar com 2%, o que importa é o hábito. Peça ao Claude para calcular quanto separar e simular a sua reserva crescendo mês a mês."}}]}, {"id": "040", "date": "09/08", "dow": "dom", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Eu analiso os perfis que bombam com a extensão do Claude", "det": {"theme": "IA na prática, negócio e conteúdo", "tela": "Roube a fórmula de quem bomba", "corpo": "Você fica olhando aquele perfil que bomba se perguntando o que ele tem que você não tem. Dá para parar de adivinhar. Eu uso a extensão do Claude no Chrome para analisar os perfis que bombam e eu vou te mostrar como. É simples. Eu pego os links dos perfis que eu quero entender e peço para o Claude analisar a bio, a foto e os vídeos. Eu falo assim, analisa 50 vídeos e me diz os melhores e o que tem neles que fez eles performarem tão bem. E ele me destrincha, vídeo por vídeo, o que está fazendo aquilo voar. Peço para analisar os ganchos, que é muito importante. E aí vem a parte que dói. No final, eu peço para ele comparar com o meu perfil, porque o meu não está performando. Agora que ele já sabe o que é performance, ele me dá um monte de tapa na cara. Mas é isso mesmo e o tapa que eu precisava para arrumar o que estava errado. E eu faço isso com gente da minha área e com gente de fora dela também. Porque às vezes quem está bombando num assunto totalmente diferente do seu tem um jeito de prender que dá para trazer para o seu. Um aviso importante sobre a extensão. Ela é uma forma diferente de usar o Claude e ela não conversa com o Claude normal. Se a conversa da extensão some, você não recupera. Então no final eu sempre peço para ele salvar tudo num Google Docs, para o trabalho não se perder. Porque o seu vídeo nunca vai crescer se você continuar chutando o que dá certo e o que não dá certo. Quando você entende o que faz o conteúdo dos outros funcionar, você para de postar de qualquer jeito e começa a postar sabendo o que está fazendo. E você, que eu sei que já está me seguindo, você já analisou por que os perfis que você admira bombam ou ainda posta no chute? Me conta aqui.", "legenda": "Você fica olhando o perfil que bomba e se perguntando o que ele tem que você não tem? Para de adivinhar. Eu uso a extensão do Claude no Chrome para analisar esses perfis. Pego os links e peço para analisar a bio, a foto e os vídeos, além de quais foram os melhores e por que performaram. No final eu comparo com o meu, que não está performando e levo um monte de tapa na cara que eu precisava. A conversa da extensão some se você não salva num Doc."}}]}]}, {"n": 7, "label": "10 a 16 ago", "days": [{"id": "041", "date": "10/08", "dow": "seg", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Você se sente uma fraude mesmo com resultado na mão", "det": {"theme": "TDAH e cabeça", "tela": "Você dá certo e se sente uma fraude", "corpo": "Você conquista uma coisa e na hora de comemorar vem a voz dizendo que foi sorte, que uma hora vão descobrir que você não é tão boa assim. E quando acontece algo estressante, você fica remoendo aquilo por dias, travada, sem conseguir produzir o que queria. Isso tem nome também. A sensação de fraude e o descontrole emocional são parte inerente ao TDAH. E o primeiro alívio é saber que os seus resultados são reais. Você chegou onde chegou porque é boa de verdade, mesmo carregando tudo isso. É sim uma conquista sua. É sim, porque eu tô dizendo. Às vezes a gente se autossabota e às vezes a gente esquece que existe essa possibilidade. A sua conquista é real, você só carrega uma cabeça que funciona diferente. Com a estrutura certa por fora e o apoio certo por dentro, fica mais leve. Onde a IA ajuda é tirando peso de cima de você. Com o segundo cérebro segurando a bagunça e os esquecimentos, sobra menos coisa para te sobrecarregar e te jogar nesse buraco. Mas eu preciso ser honesta. A parte de remoer e de se cobrar é emocional. E isso o Claude não resolve. Quem ajuda de verdade nisso é a terapia. E você, que eu sei que já está me seguindo, você também sente que é uma fraude mesmo quando dá tudo certo? Me conta aqui.", "legenda": "Você conquista e vem a voz dizendo que foi sorte, que vão descobrir que você não é tão boa. E quando algo estressa, você fica remoendo por dias e trava. A sensação de fraude e a dificuldade de segurar a emoção são parte do TDAH. O cérebro externo, como o Claude, tira o peso da bagunça e dos esquecimentos. Mas a parte de remoer e de se cobrar é emocional. Quem ajuda de verdade aí é a terapia."}}, {"t": "pov", "tag": "POV", "titulo": "POV: você entendeu que a IA virou a ferramenta que está te segurando no negócio.", "det": {"text": "POV: você entendeu que a IA virou a ferramenta que está te segurando no negócio.", "grupo": "Virada e mentalidade"}}]}, {"id": "042", "date": "11/08", "dow": "ter", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Quando o cliente pede desconto", "det": {"theme": "Precificação", "tela": "O desconto no susto fura o seu lucro", "corpo": "Toda vez que pedem desconto você baixa o preço no susto e depois descobre que furou o seu próprio lucro. E foi o Claude me ajudou a saber quando e quanto eu posso ceder sem perder dinheiro. Eu pedi para ele calcular qual é o percentual máximo que eu posso baixar sem furar o meu lucro mínimo. Agora eu tenho um limite claro na cabeça, então quando alguém insiste, eu sei até onde posso ir e o desconto vira uma escolha minha, em vez de um desespero na hora da venda. E quando o cliente pergunta qual é o melhor preço, em vez de já baixar, devolva a pergunta. Pergunte o que ele considera melhor, o mais barato ou o que mais resolve o problema dele. Isso tira a conversa do preço e leva para o valor, que é onde você ganha. É a hora de mostrar o resultado concreto que você entrega, porque quando o resultado fica claro, o preço para de parecer caro e começa a parecer justo. Dar desconto não é proibido, mas tem que ser raro e com critério. Para a maioria de quem pechincha, mostre o seu valor e segure o seu preço, sem briga. E se for dar desconto, que venha com uma contrapartida, nunca solto. Lembra do pacote, lá o desconto existe porque a cliente te dá fidelidade em troca. Desconto sem nada em troca só ensina o cliente a pedir mais. Existe uma exceção, a cliente que vale muito, aquela que indica um monte de gente. Para uma dessas, que insiste de verdade, um desconto pontual pode fazer sentido, desde que calculado, não dado no impulso. E você, que eu sei que já está me seguindo, costuma dar desconto na emoção ou com a conta na mão? Me conta aqui.", "legenda": "Sempre vai ter quem pechincha e dar desconto não é proibido, mas tem que ser raro e com critério. Peça ao Claude o percentual máximo que dá para baixar sem furar o seu lucro. Quando pedirem o melhor preço, devolva a pergunta, o mais barato ou o que mais resolve? E desconto só com contrapartida, nunca solto. A exceção é a cliente que indica muita gente."}}, {"t": "carrossel", "tag": "Carrossel Lamentação", "titulo": "Dinheiro", "det": {"tipo": "Lamentação", "assunto": "Dinheiro", "arquivo": "Lamentação/03 Dinheiro"}}]}, {"id": "043", "date": "12/08", "dow": "qua", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "O sistema pronto é difícil porque ele não foi feito para você", "det": {"theme": "CRM com o Claude", "tela": "Sistema pronto não foi feito para você", "corpo": "Você já tentou usar um sistema de cliente pronto e desistiu no segundo dia? Cheio de botão, de aba, de campo que não tem nada a ver com o seu negócio. Esses sistemas são feitos para agradar todo mundo ao mesmo tempo, a clínica, a loja, a imobiliária, você. E quando uma ferramenta tenta servir todo mundo, fica bom para a empresa que está vendendo a ferramenta, mas fica ruim quando a gente está tentando usar e não tem a funcionalidade que a gente precisa, mas tem todas as outras. Com o Claude é o contrário. Você não se encaixa numa ferramenta pronta, a ferramenta nasce do seu jeito. Você conta para ele como o seu negócio funciona, quais informações importam para você e o que não importa. E ele monta um controle com a sua cara. Só o que você usa, nada do que você não usa. E não fica engessado. Daqui a um mês você percebe que falta um campo, sobra outro, quer uma lista nova. Você fala com o Claude e ele muda na hora. Tente fazer isso num sistema pronto, onde você depende do que o programa deixou disponível. Aqui quem manda na ferramenta é você. É a diferença entre se moldar a uma coisa genérica e ter uma coisa feita para você. E o melhor, sem mais uma mensalidade, usando o Claude que você já tem e já paga. Você está com o Claude, pelo amor de deus. E você, que eu sei que já está me seguindo, você já largou algum sistema porque ele era complicado demais? Me conta aqui.", "legenda": "Você já largou um sistema de cliente no segundo dia, cheio de botão que não tem a ver com o seu negócio? Não é culpa sua. Ele foi feito para agradar todo mundo ao mesmo tempo e fica difícil para cada um. Com o Claude a ferramenta nasce do seu jeito, só com o que você usa. Precisou mudar, você fala e ele muda na hora. Sem mais uma mensalidade, com o Claude que você já tem."}}]}, {"id": "044", "date": "13/08", "dow": "qui", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Conhecer o seu mínimo viável por mês", "det": {"theme": "Previsibilidade e caixa", "tela": "Você sabe o seu mínimo por mês para sobreviver", "corpo": "Você sabe quanto a sua empresa precisa receber só para não ficar no vermelho no final do mês? Esse número muda todas as suas decisões. E o Claude calcula ele com você. Você dá para o Claude os seus custos fixos e ele soma o seu mínimo viável do mês, o quanto tem que entrar para a empresa não fechar no vermelho e te mostra quantas vendas isso representa. Porque vender muito não é a mesma coisa que ter dinheiro garantido. Dá para entrar bastante dinheiro e mesmo assim viver no aperto, se as despesas forem altas demais ou forem muitas. Quando você sabe o seu piso, tudo fica mais claro. Você sabe a partir de quanto começou a fazer dinheiro pra você, sabe quando pode respirar e sabe a hora de segurar o gasto. Sem esse número você fica sem saber o que fazer. Você vende à toa. Vende menos porque acha que está tranquila, vende de qualquer jeito, não faz o marketing da sua empresa porque acha que não precisa, achando que está indo bem só porque entrou bastante, sem ver o que saiu. E você, que eu sei que já está me seguindo, você sabe o seu mínimo do mês ou toca no escuro? Me conta aqui.", "legenda": "Você sabe o valor mínimo que a empresa precisa receber por mês só para sobreviver? Vender muito não é o mesmo que ter as contas pagas, dá para entrar bastante dinheiro e viver no aperto. Sabendo o seu mínimo, você sabe quando começou a lucrar, quando pode respirar e quando segurar o gasto. Dê os seus custos fixos para o Claude e ele calcula o seu mínimo viável e quantas vendas ele representa."}}, {"t": "pov", "tag": "POV", "titulo": "POV: você toma o remédio, foca o dia inteiro e mesmo assim esquece de pagar a conta.", "det": {"text": "POV: você toma o remédio, foca o dia inteiro e mesmo assim esquece de pagar a conta.", "grupo": "TDAH e cabeça"}}]}, {"id": "045", "date": "14/08", "dow": "sex", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Pedi 10 perfis da minha área ao Claude e vieram só mulheres brancas", "det": {"theme": "Bastidores e histórias", "tela": "Pedi dez perfis da minha área e vieram só brancas", "corpo": "Pedi ao Claude dez perfis da minha área e vieram só mulheres brancas. O que veio depois me marcou. Aí eu pedi as mulheres pardas e pretas. E aconteceu uma coisa que me marcou. Quase todas estavam falando sobre serem pardas e pretas. Poucas estavam ali falando de empreendedorismo, de inteligência artificial, das mesmas coisas que eu falo. O Claude só me mostrou na tela o que eu já sentia sem conseguir provar. Tem um conselho que se repete aqui, grava 10 vídeos por dia e você cresce. Esse conselho trata todo mundo como se acordasse pronta. E não é assim. Tem mulher que acorda com o cabelo perfeito ou põe um filtro e resolve. Eu levo 1 hora só esperando o meu cabelo secar, porque ele só fica bom se eu molhar antes. E ainda tem a parte que pesa mais. A mulher branca quase não é questionada. A mulher preta e parda precisa provar o tempo todo que sabe, que pode e que dá conta, fazendo 3 vezes o esforço para ter a mesma credibilidade. Eu não quero colocar todo mundo no mesmo balaio como se a condição fosse igual Muito menos quero dizer que não tem mulher parda ou preta sendo muito bem-sucedida e gravando dez vídeos por dia. Mas resta o fato de que as condições não são iguais. Será que não está na hora de a gente falar sobre isso? E você, que eu sei que já está me seguindo, Quantas mulheres pardas ou pretas você vê tentando ganhar autoridade por aqui? Me conta aqui.", "legenda": "Outro dia pedi ao Claude 10 perfis da minha área e vieram só mulheres brancas. Pedi as pardas e pretas e quase todas falavam sobre serem pardas e pretas, não sobre negócio. O conselho de gravar 10 vídeos por dia trata todo mundo como se acordasse pronta. E não é assim. A mulher preta e parda ainda faz 3 vezes o esforço para ter a mesma credibilidade. Será que não está na hora de falar sobre isso?"}}, {"t": "carrossel", "tag": "Carrossel Ensino", "titulo": "2 IA na prática · Como dar contexto e receber resposta útil", "det": {"tipo": "Ensino", "assunto": "2 IA na prática · Como dar contexto e receber resposta útil", "arquivo": "Ensino/2 IA na prática/02 Como dar contexto e receber resposta útil"}}]}, {"id": "046", "date": "15/08", "dow": "sáb", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Cada post é um experimento, não um veredito", "det": {"theme": "Papo de empresa, sem o Claude", "tela": "Um vídeo ruim não é um veredito", "corpo": "Esse aqui é um Papo de empresa, sem o Claude, então hoje é só a real entre a gente. Você posta com o coração na mão, o vídeo vai mal e você se sente um fracasso. Eu já postei chorando de nervoso. Eu vou te dar um jeito de tirar esse peso de cima de cada publicação. Trata cada post como um experimento. Quando você posta achando que aquilo é uma prova da sua capacidade, qualquer resultado fraco te derruba. Mas quando você posta para coletar dado, sobre o que conecta com a sua gente, o jogo muda. Um post de baixo alcance para de ser um fracasso e vira uma informação, aquele gancho não pegou dessa vez. E a versão publicada, mesmo torta, te ensina alguma coisa, enquanto a versão perfeita que ficou só na sua cabeça não ensina nada. Eu jurei que não ia falar de Claude, mas não dá para mim. Pede para ele analisar os seus vídeos e te dizer onde é que você poderia melhorar. Pede para ele comparar com perfis do seu mesmo nicho e ver o que está dando certo pra eles e aplicar pra você também. E o segredo para não desanimar é mudar a sua meta. Em vez de cobrar de você views e curtidas, que não dependem só de você, cobra uma meta que está nas suas mãos, tipo publicar 3 vezes por semana. Essa meta você cumpre, independente de como o post foi. Repara, postar mais é o que mais move o ponteiro, mais até do que caprichar demais num post só. E você, que eu sei que já está me seguindo, você posta com medo do veredito ou já encara cada post como um teste? Me conta aqui.", "legenda": "Você posta esperando dar certo e quando vai mal se sente um fracasso? Trata cada post como experimento. Postar para coletar dado tira o peso, um post de baixo alcance vira informação. Troca a meta de views por uma meta que só depende de você, tipo publicar 3 vezes por semana. Depois de cada post, anota o que funcionou, o que não funcionou e o que muda na próxima. Pausar sem culpa também faz parte."}}]}, {"id": "047", "date": "16/08", "dow": "dom", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Vergonha de cobrar", "det": {"theme": "Cobrança e inadimplência", "tela": "A sua vergonha está no bolso dos outros", "corpo": "Você sente uma vergonha enorme de cobrar e deixa o seu dinheiro parado na mão dos outros. Eu sentia uma vergonha enorme. Parecia feio, parecia que eu estava sendo mercenária e eu acabava deixando o dinheiro lá, parado. O Claude me ajudou a entender que eu precisava mudar. Eu montei com ele uma conversa fixa, que eu chamo de conversa de vendas. A cada venda eu jogo lá o nome da cliente, o valor, quando ela vai pagar e em quantas vezes. Com isso ele me devolve um relatório de quem vai me pagar e quando e ainda monta um calendário de cobrança com as mensagens já escritas. Porque essa vergonha vem de longe. Vem da ideia de que falar de dinheiro é feio, do medo da rejeição, de crenças que a gente carrega desde a infância, do receio de parecer arrogante, mas principalmente da dificuldade que a gente tem de reconhecer o nosso valor. Mas cobrar é cuidar do seu negócio porque tem gente contando com esse dinheiro: a sua funcionária, o seu fornecedor e principalmente você. E o que tirou dessa situação foi parar de depender da minha coragem do dia. O Claude escreve as mensagens por mim, para cada momento: uma 3 dias antes de vencer, uma no dia, uma 2 dias depois e uma 5 dias depois e ele mesmo vai mudando o tom, da lembrança leve até a cobrança mais firme. Eu sento 10 minutos, olho quem está na fila e mando todas no Whatsapp. E você, que já está me seguindo, deixa de cobrar porque sente vergonha? Me conta aqui.", "legenda": "A vergonha de cobrar vem de longe, do medo da rejeição, de achar que dinheiro é feio, da dificuldade de reconhecer o próprio valor. Mas cobrar é cuidar de quem depende de você, a sua funcionária, o seu fornecedor e você. Crie uma conversa de vendas com o Claude, jogue cada venda lá e peça um calendário de cobrança com as mensagens prontas. Você senta 10 minutos e manda todas."}}]}]}, {"n": 8, "label": "17 a 23 ago", "days": [{"id": "048", "date": "17/08", "dow": "seg", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "As despesas, onde você ganha ou perde dinheiro", "det": {"theme": "Financeiro", "tela": "O problema talvez não seja vender", "corpo": "VVocê jura que o problema é vender pouco e na real você desperdiça quase tudo que vende. Talvez você precise é gastar menos e o Claude na lata me mostrou isso com os meus próprios números. Eu joguei os meus gastos dos últimos 3 meses numa conversa com ele e pedi para achar o que estava vazando. Apareceu dinheiro escapando que eu nem via e bastou cortar para o mês respirar. Porque o vilão quase sempre são os gastos pequenos que ninguém soma. A assinatura que você esqueceu de cancelar. Os 2 aplicativos que fazem a mesma coisa e você paga os 2. A multa e o juro daquele boleto que você pagou atrasado. A taxa do cartão, o almocinho que você pediu no delivery, o desconto camarada que virou regra, o retrabalho que você refez de graça. Pingado, parece pouco, mas tudo junto no mês e um rombo. O passo a passo no Claude é simples. Pega os seus gastos dos últimos meses e joga no Claude. Extrato de saídas e faturas de cartão. Pede para ele achar o que está duplicado, o que você esqueceu de cancelar e o que dá para cortar sem atrapalhar o seu trabalho. E pede mais 2 coisas: me diz quanto esse dinheiro representa em percentual em relação às minhas despesas totais e me diz quanto eu economizo com cada corte. Ele te entrega um tapa na cara. Vender muito é ótimo de mostrar “Eu faturei um milhão”, Mas se gastou 90% desse milhão, de nada adiantou. O que faz a empresa ganhar dinheiro de verdade é apertar a despesa ao máximo, cortar o que não faz sentido e ficar só com o que tem retorno. E você, que já está me seguindo o que eu sei, qual foi a última despesa boba que você descobriu que estava pagando sem usar? Me conta aqui.", "legenda": "Você acha que precisa vender mais e talvez precise mesmo é gastar menos. O vilão quase sempre são os gastos pequenos, a assinatura esquecida, 2 aplicativos iguais, a multa do boleto atrasado, a taxa do cartão, o desconto que virou regra. Jogue os seus gastos dos últimos meses no Claude e peça o que está duplicado, o que dá para cortar e quanto você economiza em cada um. Cortar a despesa certa é o que faz a empresa ganhar dinheiro."}}, {"t": "pov", "tag": "POV", "titulo": "POV: um dia na minha vida de empresária que toca o negócio sozinha, com a IA do lado o tempo todo.", "det": {"text": "POV: um dia na minha vida de empresária que toca o negócio sozinha, com a IA do lado o tempo todo.", "grupo": "Conteúdo e produção"}}]}, {"id": "049", "date": "18/08", "dow": "ter", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Você não tira férias porque os pagamentos dependem só de você", "det": {"theme": "Mentalidade de dona de negócio", "tela": "Há quanto tempo você não tira férias de verdade?", "corpo": "Essa é a coisa que mais prende a empresária pequena. Te vendem que uma empresa boa roda sem a dona. Isso é verdade lá na frente. Quando entra milhão de verdade todo mês, você tem dinheiro para pagar bem alguém de confiança e entregar a senha do cartão na mão dessa pessoa. Aí sim a empresa anda sem você. Enquanto a sua empresa é pequena, o cartão ainda é seu. E algumas coisas ainda passam pela sua mão. Isso é o tamanho que você tem hoje. Não é incapacidade nem você está atrasada, enquanto está todo tirando férias em Porto de Ganlinhas. O que mudou para mim foi parar de carregar isso na cabeça. Eu pedi para o Claude montar o meu calendário de pagamentos, com cada conta no dia certo e um lembrete antes. O que dá para adiantar antes de viajar, ele já me avisa para deixar pago. O que dá para programar o pagamento, a gente programa no app do banco. O que não dá ou o que surgir de urgência, você realmente vai ter que fazer durante as férias. Então, assim, Dá pra tirar uns dias de férias? Sim, mas eu só não sei se você vai estar 100% longe da empresa. Pra isso, você vai precisar de uma pessoa de muita confiança. Enquanto você não tem essa pessoa, curte, sabendo que você está on call 24 por 7. Se você for como eu, que só tem o Claude, o máximo que ele vai poder te fazer é te lembrar de fazer calendários. Eu tenho uma conversa do Claude que pega os boletos no meu e-mail e coloca numa pasta, já me ajuda. E você, que eu sei que já está me seguindo, há quanto tempo você não tira férias de verdade por causa disso? Me conta aqui.", "legenda": "A empresária pequena não consegue sumir por completo porque os pagamentos ainda dependem dela. Isso é tamanho, não defeito. A empresa anda sozinha quando você pode pagar bem e confiar a senha do cartão a alguém. Até lá, dá para tirar férias preparando antes. Eu peço para o Claude montar o calendário de pagamentos e os lembretes. Aí consigo viajar sem medo de esquecer uma conta."}}, {"t": "carrossel", "tag": "Carrossel Verdade", "titulo": "Mentalidade", "det": {"tipo": "Verdade", "assunto": "Mentalidade", "arquivo": "Verdades/1 Mentalidade/04"}}]}, {"id": "050", "date": "19/08", "dow": "qua", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Eu sei o dia exato que o meu remédio vai acabar", "det": {"theme": "IA no dia a dia", "tela": "Nunca mais fico sem remédio", "corpo": "Você descobre que o remédio de uso contínuo acabou bem na hora que a receita não está na mão. Eu vivia nisso, sempre pedindo receita para a médica no meio do caminho e me incomodava. Aí eu organizei isso com o Claude e nunca mais. O que eu fiz foi simples. Eu fiz uma lista dos remédios de uso contínuo que eu tomo, coloquei numa conversa com o Claude quantos eu tomo por dia de cada um e pedi para ele me dizer quantos dias cada caixa ia durar. Pura conta, nada de palpite. Aí veio a parte boa. Eu pedi para ele criar uma tarefa que me avisa quando um deles estiver chegando perto de acabar. E funciona. Ele já me avisou, por exemplo, que um ia durar só mais 6 dias e que eu precisava renovar a receita. Eu liguei na hora para a minha médica e já deixei a receita encaminhada, com folga, sem desespero de última hora. Para esse tipo de coisa, o Perplexity e o Claude andam juntos aqui em casa, porque em assunto de remédio eles se completam, um pesquisa, o outro organiza. O Perplexity, por exemplo, consegue ler a bula e te dizer a posologia: para que serve, como tomar. Mas ele te dá o link de onde ele pegou, e aí você pode olhar na própria bula, se quiser. Mas só pra deixar claro: nenhum dos dois tem receita, nem muda a dose de nada. Eu tenho uma médica que me acompanha. Eu só faço a contagem das doses para poder pedir pra ela com certa folga, porque senão ela vai ficar sempre me dando remédio na emergência. Eu não quero fazer isso com ela. E você, que eu sei que já está me seguindo, você já ficou sem um remédio importante por não ter visto que ia acabar? Me conta aqui.", "legenda": "Sabe a correria de ver que o remédio de uso contínuo acabou e a receita não está na mão? Organizei com o Claude. Fiz a lista do que tomo, disse quanto tomo por dia e pedi para calcular quantos dias cada caixa dura. Criei uma tarefa que me avisa quando está acabando e renovo a receita com folga. Os remédios são prescritos pela minha médica, ele só organiza, não receita nem muda dose."}}]}, {"id": "051", "date": "20/08", "dow": "qui", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Por que o mesmo conteúdo bomba no Instagram e morre no TikTok", "det": {"theme": "IA na prática, negócio e conteúdo", "tela": "TikTok não é Instagram", "corpo": "Você fez um vídeo que bombou no Instagram, jogou o mesmo no TikTok e ele morreu. Antes de achar que o problema é você, deixa eu te mostrar o que o Claude me ensinou sobre isso. Eu uso a extensão do Claude no Chrome para isso também. Eu pego o TikTok e o Instagram da mesma pessoa e mando ele analisar os 2 lados. Aí ele me mostra por que um perfil não performa no TikTok e performa no Instagram ou o contrário. E quase sempre a resposta é a mesma. A pessoa está tentando aproveitar o conteúdo de uma rede na outra, sem adaptar. Só que cada plataforma tem a sua lógica. O Instagram gosta mais de uma coisa e entrega mais, o TikTok gosta de outra. O que prende numa pode espantar na outra. No Instagram, a pessoa te assiste porque já confia em você e quer guardar aquilo. No TikTok, você está falando para estranho e ele decide em 2 segundos se fica ou se vai embora. São públicos diferentes, então o vídeo precisa abrir diferente. Por isso eu não reciclo no automático. Mentira! Eu reciclo, mas é porque eu não tenho paciência pra fazer conteúdo pro Instagram. Então, vê se me dá like aqui. Mais uma coisa eu faço: quando um vídeo vai bem numa rede, eu pego a ideia e penso como ela precisa nascer de novo na outra. Mesmo assunto, abertura diferente, ritmo diferente. E você, que eu sei que já está me seguindo, você posta a mesma coisa nas 2 redes ou adapta para cada uma? Me conta aqui.", "legenda": "Você fez um vídeo que bombou no Instagram, jogou no TikTok e ele morreu? O problema não é você. Eu uso a extensão do Claude no Chrome, coloco o TikTok e o Instagram da mesma pessoa e peço para ele analisar os 2. Quase sempre é a mesma coisa, a pessoa recicla o conteúdo sem adaptar e cada rede tem a sua lógica. No Instagram te assistem porque confiam, no TikTok você fala para estranho que decide em 2 segundos."}}, {"t": "pov", "tag": "POV", "titulo": "POV: você pensa na aposentadoria e percebe que está contando só com o INSS.", "det": {"text": "POV: você pensa na aposentadoria e percebe que está contando só com o INSS.", "grupo": "Reserva e futuro"}}]}, {"id": "052", "date": "21/08", "dow": "sex", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Garantir parte do dinheiro antes do mês começar", "det": {"theme": "Previsibilidade e caixa", "tela": "Quanto você já tem garantido para o próximo mês?", "corpo": "Você começa todo mês do zero, na correria de fechar venda, sem nada garantido na conta. E o Claude te ajuda a desenhar isso. O Claude olha o que você já vende (você já deu o relatório de vendas pra ele) e te mostra o que que dá para transformar em dinheiro recorrente e calcula a mistura entre a parte fixa e a parte que vem dos trabalhos pontuais. Porque dinheiro garantido todo mês não se resume a assinatura. Pode ser um contrato de acompanhamento, um pacote fechado ou um serviço complementar que a cliente contrata depois do trabalho principal. Esse depois é ouro, o que a cliente precisa quando o serviço grande termina pode virar a sua mensalidade. E vender pacote no lugar de item avulso também firma o caixa, porque venda muito picada deixa tudo instável e a solução fechada dá chão. O modelo que mais protege é o de mistura, uma parte fixa que entra todo mês e paga as contas e outra que vem dos trabalhos pontuais que pagam melhor. E você, que eu sei que já está me seguindo, quanto do seu mês já está garantido antes de ele começar? Me conta aqui.", "legenda": "Estabilidade vem menos de mais cliente e mais de mais base fixa, o dinheiro que você já sabe que entra antes do mês começar. E ele não se resume a assinatura, pode ser contrato de acompanhamento, pacote fechado ou um serviço que a cliente contrata depois do principal. O melhor é o modelo de mistura, uma parte fixa que paga as contas e outra dos trabalhos pontuais. O Claude calcula essa mistura com você."}}, {"t": "carrossel", "tag": "Carrossel Ensino", "titulo": "4 Produtividade e rotina · O trabalho invisível por trás de um vídeo", "det": {"tipo": "Ensino", "assunto": "4 Produtividade e rotina · O trabalho invisível por trás de um vídeo", "arquivo": "Ensino/4 Produtividade e rotina/04 O trabalho invisível por trás de um vídeo"}}]}, {"id": "053", "date": "22/08", "dow": "sáb", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "O follow-up que você esquece o Claude faz por você", "det": {"theme": "CRM com o Claude", "tela": "A venda quase fechada que você esqueceu", "corpo": "A venda mais fácil de perder é a que estava quase fechada, a cliente pediu o orçamento, você mandou, ela ficou de pensar e sumiu. Você jurou que ia dar um retorno e a vida atropelou. Esse retorno que não acontece é dinheiro escorrendo da sua mão toda semana. Com o CRM montado no Claude, isso para de depender da sua memória. Você pergunta para ele: quem recebeu orçamento e ficou em silêncio, quem está parado há mais de uma semana, quem está perto de fechar. Ele lê o seu WhatsApp e te devolve a lista na hora, com nome e há quanto tempo cada uma está esperando. E ele não para na lista. Você pede para ele escrever a mensagem de retorno para cada caso, no seu jeito de falar. Lembra que ele acessa seu WhatsApp? Você pode pedir para ele analisar a sua forma de falar e internalizar. Uma mensagem para quem sumiu depois do orçamento, outra para quem está quase lá. Você só lê, dá um ajuste e envia. O que te tomava a tarde inteira vira meia hora no máximo. Fazer follow-up é cuidado com a cliente e lembrar dela mesmo quando a vida te atropelou. A maioria sumiu por esquecimento, não por falta de interesse. Um retorno gentil na hora certa recupera a venda que você já tinha dado como perdida. E venda feita é dinheiro no bolso. E você, que eu sei que já está me seguindo, quantos orçamentos você mandou esse mês e nunca mais deu retorno? Me conta aqui.", "legenda": "A venda mais fácil de perder é a que estava quase fechada. A cliente pediu orçamento, sumiu e você esqueceu de chamar de volta. Com o CRM no Claude, eu pergunto quem ficou em silêncio depois da proposta e ele me dá a lista na hora. Ainda escreve a mensagem de retorno no meu jeito de falar. Eu leio, ajusto e envio. Follow-up é cuidado e recupera venda que parecia perdida."}}]}, {"id": "054", "date": "23/08", "dow": "dom", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Olhe o preço da concorrência, mas não copie", "det": {"theme": "Precificação", "tela": "Você chuta o seu preço no escuro", "corpo": "Você não faz ideia de quanto a sua concorrência cobra e mesmo assim chuta o seu preço no escuro. Aqui você vai usar a extensão do Claude para o Chrome e vai pedir para ele analisar toda a sua concorrência: você vai descrever o seu serviço com detalhes, coloca um determinado CEP e pede para ele procurar em um raio um determinado a partir dali. Ele vai fazer uma limpa na internet e vai achar absolutamente todo mundo que faz a mesma coisa que você, quem colocar preço, você já vai ver o preço, quem tiver link para site ou pro WhatsApp, ele até manda mensagem, mas de qualquer forma ele pode fazer uma lista com todos os sites. Você pode visitar o site das pessoas para ver também como cada um está se apresentando, você pode pedir para ele te dar o link do Google meu negócio e fuçar todo mundo, principalmente as avaliações. A ideia não é você copiar nada, a ideia é você saber com quem você está lidando e manter o seu preço numa faixa que seja condizente com o mercado. É óbvio que o seu preço tem que seguir outros critérios também, esse é só um deles. Quando você faz benchmarking que é exatamente isso que é extensão do Claude pro Chrome fez você, um estudo de mercado. Outra coisa muito normal de se fazer desde que o mundo é mundo é o cliente oculto né então você pode pedir para a extensão do Claude pro Chrome para ele juntar endereços e telefones para você e fazer uma planilha com isso tudo e você pedir para alguém ir lá perguntar o preço ou fazer isso pelo WhatsApp, acho que agora todo mundo faz isso pelo WhatsApp então pede pro Claude fazer uma lista com todos os WhatsApp e até pede para ele escrever um textinho ou ajustar o seu texto. E você, que eu sei que tá me seguindo? Você fuça os seus concorrentes? Como é que era antes de saber da extensão do Claude pro Chrome?", "legenda": "Olhar a concorrência é benchmarking e ajuda a manter o seu preço dentro do mercado, sem copiar ninguém. Com a extensão do Claude para o navegador, descreva o seu serviço, dê o seu CEP e um raio e ele acha todos os concorrentes, os preços, os sites e o Google meu negócio com as avaliações. Dá até para montar uma lista de WhatsApp para fazer cliente oculto. Você olha para se situar e precifica pelos seus critérios."}}]}]}, {"n": 9, "label": "24 a 30 ago", "days": [{"id": "055", "date": "24/08", "dow": "seg", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Mulher com TDAH produz tanto quanto qualquer uma", "det": {"theme": "TDAH e cabeça", "tela": "Você se esforça o dobro para fazer o básico que os outros fazem com a metade", "corpo": "Você faz um esforço enorme para entregar o que para os outros parece fácil e ainda precisa mostrar serviço o tempo todo para ter um mínimo de reconhecimento. O que mudou esse jogo para mim foi parar de carregar tudo na cabeça. Eu uso o Claude como um segundo cérebro, fora da minha cabeça. Tudo que eu preciso lembrar, registrar e organizar vai para ele. Ele segura a estrutura que a minha cabeça não segura sozinha. E isso me libera para usar o que eu tenho de melhor. Que é a minha criatividade. Porque o cérebro com TDAH tem força de sobra. O hiperfoco, a criatividade, a capacidade de ligar coisas que ninguém liga. Com a estrutura externa segurando o trivial, essas forças aparecem e você entrega igual ou mais que qualquer pessoa. A mulher com TDAH entrega tanto quanto qualquer uma. O que faltava era a estrutura que a cabeça dela pede. Com ela, essa mulher não fica atrás de ninguém. Porque a mulher com TDAH é mais fácil de ter uma hiperatividade mental do que uma hiperatividade física, e normalmente a mulher com TDAH é diagnosticada já adulta. Sem contar a quantidade de coisas que uma mulher já carrega nas costas por ser mulher E você, que eu sei que já está me seguindo, você sente que se esforça o dobro para conseguir o mesmo que os outros conseguem fácil? Me conta aqui.", "legenda": "Cansa mais que o trabalho ter que se esforçar o dobro para entregar o que para os outros parece fácil e ainda mostrar serviço o tempo todo para um mínimo de reconhecimento. O que virou esse jogo para mim foi usar o Claude como um segundo cérebro, que lembra, registra e organiza por mim. Com a estrutura externa segurando o resto, o hiperfoco e a criatividade aparecem e você entrega igual ou mais que qualquer uma."}}, {"t": "pov", "tag": "POV", "titulo": "POV: chega o dia de pagar as contas e você reza para o dinheiro dar.", "det": {"text": "POV: chega o dia de pagar as contas e você reza para o dinheiro dar.", "grupo": "Financeiro e caixa"}}]}, {"id": "056", "date": "25/08", "dow": "ter", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Eu não consigo ver dinheiro parado na conta", "det": {"theme": "Financeiro", "tela": "Eu não consigo ver dinheiro parado na conta", "corpo": "Eu dou consultoria de organização e mesmo assim não consigo ver dinheiro parado na conta. Pago conta antes de vencer, gasto, faço qualquer coisa só para aquele dinheiro não ficar parado ali. Já tentei segurar na força de vontade mil vezes e nunca funcionou. E foi aí que eu entendi uma coisa. Quem guarda dinheiro não tem mais disciplina que você. Essa pessoa só fez o dinheiro sumir da vista dela. Quando você não vê, você não mexe. Então eu sentei com o Perplexity e contei isso tudo para ele, do jeito que eu contaria para uma amiga. Pedi para ele montar um esquema em que a minha reserva vai para um lugar que eu não abro toda hora e os pagamentos saem sozinhos na data certa. Ele organizou tudo, me disse quanto separar, me ensinou a ideia de porquinho ou cofrinho das contas digitais, que é muito prático, e ainda botou os lembretes no Google Calendar para eu não precisar lembrar do dia que o dinheiro precisa ir pra lá, mas, na verdade, no próprio aplicativo do banco, você já consegue fazer essa transferência automática no dia que você escolher. E o que mudou foi parar de depender de mim mesma na hora da fraqueza. O dinheiro fica longe da minha mão e eu paro de sabotar a minha própria reserva. Se isso também é mais forte que você, monta essa barreira. Eu tenho pra mim que quem viveu era Collor tem esse mesmo problema. E você, que eu sei que já está me seguindo, você também não consegue ver dinheiro parado ou já deu um jeito nisso? Me conta aqui.", "legenda": "Eu dou consultoria de organização e não consigo ver dinheiro parado na conta. Pago conta antes de vencer só para não ver ele ali. O que mudou foi a barreira e não a força de vontade. Sentei com o Claude, ele montou um esquema em que a reserva vai para um lugar que eu não abro toda hora e os pagamentos saem sozinhos na data. Se isso é mais forte que você, monta a barreira."}}, {"t": "carrossel", "tag": "Carrossel Lamentação", "titulo": "Sobrecarga e tempo", "det": {"tipo": "Lamentação", "assunto": "Sobrecarga e tempo", "arquivo": "Lamentação/04 Sobrecarga e tempo parte 1"}}]}, {"id": "057", "date": "26/08", "dow": "qua", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Não nasci para números é desculpa", "det": {"theme": "Provocações e mitos para quebrar", "tela": "A desculpa que te custa mais caro", "corpo": "Você diz que não nasceu para números e foge da planilha. Essa é a desculpa mais cara que existe. E olha que eu sou de Letras, literalmente. Ninguém nasce para números. A questão é querer aprender, porque aprender número é muito fácil. Se você se empenhar e estudar e fácil. Mas a questão é, você quer? Você vai sentir prazer fazendo isso? Tem gente que gosta. Não é o meu caso. E é por isso que eu não largo o meu projeto de finanças no Claude, porque ali eu tenho tudo. Ah, mas você deixa tudo lá? Não, de jeito nenhum: eu peço para ele fazer a planilha e um docx explicando tudo o que aconteceu ali periodicamente. E quando aparece um número que eu não entendo, eu peço para o Claude explicar em linguagem de gente, até eu me sentir segura e entender de fato o que é que está se passando nas minhas finanças. Eu também não nasci para números, mas a sorte é que hoje a gente nem precisa mais de calculadora. Você precisa saber quais números você precisa enxergar. No dia em que você tiver essa informação, o Claude te dá os números e ainda te ajuda a analisar os números até que você vá ficar craque em fazer essas análises. E eu tenho certeza que você já aprendeu coisas bem mais difíceis na vida. E você, que eu sei que já está me seguindo, usa a desculpa dos números ou já encarou? Me conta aqui.", "legenda": "Não nasci para números é a desculpa mais cara que existe. Ninguém nasce para números, o que pega é querer aprender, porque é fácil. Eu não gosto, por isso não largo o meu projeto de finanças no Claude, com tudo bloqueado, a planilha e um docx explicando cada coisa. E o que eu não entendo eu peço para o Claude explicar em linguagem de gente."}}]}, {"id": "058", "date": "27/08", "dow": "qui", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Plano B para o sucesso também", "det": {"theme": "Produtividade", "tela": "Você tem plano para quando der muito certo?", "corpo": "Você tem mil planos B para quando dá ruim e nenhum para quando vende muito mais do que esperava. E desse ninguém fala. Para quando aperta, a gente já falou mil vezes aqui e ter uma reserva de pelo menos 3 meses, com clientes variados, os que pagam pouco, mas pagam sempre e os que pagam mais. Agora, você já parou para pensar no seu plano B para quando dá muito certo? Vamos supor que você esperava vender 50 mil esse mês e na verdade vendeu 70 mil, que você nem esperava. O que você faz? Você sai gastando 20 mil que nem uma doida, não né? Você tem que ter um plano B aqui também. A primeira coisa é óbvia, sim, se dá um presentinho, um bônus para você. Mas antes você pergunta para o Claude, pedindo para ele olhar o semestre inteiro, para a conta não ficar em cima de um único mês fora da curva. Você pede para ele analisar 6 meses de vendas e dizer quanto dá para tirar de bônus com segurança por ter vendido mais do que esperava. Outra parte vai para a reserva, que também ganha um reforço nesse mês bom. E talvez seja a hora de comprar à vista aquele equipamento que você está paquerando há tempos, para fugir de juros e parcelas. Se você for esperta, quando você viu aquele equipamento, você já abriu uma conversa com o Claude para decidir se valia a pena. Agora é voltar naquela conversa e perguntar se já é o momento, se dá para dar uma entrada ou se é melhor guardar e esperar. Então registre os seus 2 planos B, o de quando aperta, que eu prefiro chamar de momento de crise em vez de fracasso e o de quando dá muito certo, que quase ninguém tem. E você, que eu sei que já está me seguindo, tem plano B para o sucesso ou só para a crise? Me conta aqui.", "legenda": "A gente tem mil planos B para quando aperta, a reserva de 3 meses, os clientes variados. Mas e quando dá muito certo? Se você esperava vender 50 mil e vendeu 70, não sai gastando que nem uma doida. Pergunta para o Claude, olhando um semestre inteiro, quanto dá para tirar de bônus com segurança. Reforça a reserva e volta naquela conversa que você já teve com ele se for comprar um equipamento à vista."}}, {"t": "pov", "tag": "POV", "titulo": "POV: você senta para fazer uma coisa e levanta 2 horas depois sem ter feito ela.", "det": {"text": "POV: você senta para fazer uma coisa e levanta 2 horas depois sem ter feito ela.", "grupo": "Bastidores e rotina"}}]}, {"id": "059", "date": "28/08", "dow": "sex", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "O conselho que mudou meu negócio", "det": {"theme": "Bastidores e histórias", "tela": "Você acorda com aperto de ter que trabalhar?", "corpo": "Você acordou hoje com aquele aperto no peito de ter que trabalhar de novo e teve um conselho que tirou isso de mim. Faça algo que não seja penoso. Eu sei que tem aquela máxima de trabalhe com o que ama e nunca trabalhará um dia na vida. Eu não acredito nisso. Trabalho é trabalho e, quando você tem responsabilidade e lida com gente e complicado de qualquer jeito. Mas você não precisa se sentir sufocada dia após dia. Você não precisa ter ansiedade constante de fazer aquilo. Dá para ter uma carreira fazendo coisas que você goste e usando o melhor do seu potencial. Mas, para isso, você precisa saber qual é o melhor do seu potencial e o que você gosta de fazer. Mas principalmente saber que você pode mudar de opinião e transicionar de carreira E aqui o Claude pode dar uma mão:​​ você conversa com ele sobre as coisas que você faz no seu dia e ele te ajuda a enxergar onde está o melhor do seu potencial e o que mais te pesa, para as suas escolhas ficarem mais conscientes. Outro dia eu fiz uma ferramenta de valores no Claude, porque eu sentia que estava indo contra algum valor meu. Eu também sentia que os meus valores tinham mudado e que estava passando por um período de transição. Quando eu coloquei tudo num dashboard, ficou muito claro para onde eu estava indo. A gente quase não reflete sobre isso. E essas informações são fundamentais para as escolhas da nossa vida e para a gente olhar para trás um dia e falar, eu tenho orgulho do que eu fiz. E você, que eu sei que já está me seguindo, qual conselho mudou o seu negócio? Me conta aqui.", "legenda": "O conselho que mudou o meu negócio, faça algo que não seja penoso. Eu não acredito naquela de trabalhe com o que ama e nunca mais trabalhe. Trabalho é trabalho. Mas dá para ter uma carreira usando o melhor do seu potencial, desde que você saiba qual é ele. O Claude pode te ajudar a enxergar onde está esse melhor e o que mais te pesa."}}, {"t": "carrossel", "tag": "Carrossel Ensino", "titulo": "2 IA na prática · O que a IA não faz pela sua empresa", "det": {"tipo": "Ensino", "assunto": "2 IA na prática · O que a IA não faz pela sua empresa", "arquivo": "Ensino/2 IA na prática/03 O que a IA não faz pela sua empresa"}}]}, {"id": "060", "date": "29/08", "dow": "sáb", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "O Claude acha o remédio mais barato na farmácia perto de você", "det": {"theme": "IA no dia a dia", "tela": "Você paga caro no remédio sem ver", "corpo": "Você sai pagando o preço que aparece na primeira farmácia e perde dinheiro todo mês sem perceber. Eu parei de fazer isso e quem faz por mim agora é o Claude. Sempre que eu vou comprar os meus remédios, eu coloco a lista toda numa conversa com o Claude e peço para ele ver, nas farmácias que existem ali, onde cada um está mais barato. E tem um truque que muda o jogo: eu coloco o CEP do shopping aqui perto, para ele não ficar procurando farmácia do outro lado do bairro, onde eu não vou. Eu moro numa ilha, então eu desço no shopping e pronto, andar até outra farmácia longe não compensa. Aí ele me responde certinho. Esse aqui está mais barato numa, aquele outro está mais barato na outra. Eu sigo praticamente 100%, porque de fato umas 90% das vezes ele acerta. E o legal de farmácia é que ele olha em cada site. Às vezes, o que vale a pena é comprar no site para retirar na loja, e a loja está ali do lado. O que ele às vezes erra é fácil de consertar. Algumas farmácias colocam promoção se você levar 3 caixas e ele pega essa promoção. Só que quem toma remédio de uso contínuo dificilmente tem receita para 3 caixas de uma vez. Então eu corrijo, falo que só tenho receita para 2 e ele refaz a conta na hora. E não é só remédio. Eu faço isso para o preço de qualquer coisa que eu vá comprar. A lógica é sempre a mesma, dou o que eu quero, dou o lugar e deixo ele garimpar o melhor preço para mim. Inclusive, isso vale também pra compras online. Ele te dá o link e aí você vai lá e compra. E você, que eu sei que já está me seguindo, você compara preço antes de comprar ou paga o primeiro que aparece? Me conta aqui.", "legenda": "Você paga o preço da primeira farmácia e perde dinheiro sem ver? Eu coloco a lista dos meus remédios numa conversa com o Claude e peço para ver onde cada um está mais barato. O truque é dar o CEP do shopping perto de mim, para ele não procurar longe, onde eu não vou. Sigo quase 100%, ele acerta umas 90% das vezes. E faço o mesmo para qualquer compra. Os remédios são prescritos pela minha médica, ele só pesquisa preço."}}]}, {"id": "061", "date": "30/08", "dow": "dom", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Está sem dinheiro essa semana", "det": {"theme": "Cobrança e inadimplência", "tela": "Quando a cliente diz que está sem dinheiro", "corpo": "É sempre aquela ladainha: a cliente te manda mensagem dizendo que está sem dinheiro essa semana, que vai pagar depois. E agora? A forma como você responde decide se vai receber de fato ou se vai perder a cliente. O Claude me ajudou a ter a resposta certa na ponta da língua. Eu explico a situação para ele e peço opções do que fazer. Ele me dá saídas que eu nem imaginava, escreve a mensagem sempre num tom que acolhe a pessoa, mas que já encaminha a solução, em vez de deixar tudo no ar, como eu faria. Ele me ensinou que não adianta ficar falando sobre o problema, a gente tem que pensar numa solução. Se a cliente valer a pena, em vez de só dizer “tudo bem”, você responde algo como, “entendo, então vamos já combinar uma data nova para gente tirar essa pendência?”. Você acolhe e ao mesmo tempo marca o novo prazo, ali, na hora. Se você aceitar adiar sempre e ela for assim, meio abusadinha, ela vai achar que isso é regra, que pode toda vez e não pode. Isso é uma exceção e você deixa isso claro, sem ser grosseira. Se você sente que vai virar hábito e melhor abrir mão dessa cliente, porque outras clientes virão e você não precisa carregar quem não respeita o combinado. E você, que eu sei que já está me seguindo? Você deixa cliente pagar depois ou é categórica e não deixa isso acontecer? Me conta aqui.", "legenda": "A cliente diz que está sem dinheiro essa semana. A resposta certa tira o foco do problema dela e põe na solução, algo como entendo, vamos já combinar uma data nova. Você acolhe e marca o prazo na hora. Mas deixe claro que é exceção, sem ser grosseira, senão ela vai achar que pode sempre. Peça ao Claude opções de resposta para várias situações."}}]}]}, {"n": 10, "label": "31 ago a 6 set", "days": [{"id": "062", "date": "31/08", "dow": "seg", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "A cliente comprou do concorrente porque você demorou a responder", "det": {"theme": "CRM com o Claude", "tela": "Você demora e a venda vai embora", "corpo": "A cliente te procurou, você demorou a responder e quando viu ela já tinha comprado do concorrente. Você tem cliente espalhada para todo lado. Uma no WhatsApp, outra no direct do Instagram, outra no e-mail, mais uma que você anotou rapidamente no caderno e o resto está na sua cabeça. Aí você esquece de responder e só percebe dias depois, quando ela já comprou de um concorrente. O pior é que a cliente procurou você. Ela quer o seu serviço. O que pega é a dificuldade de acompanhar cada pessoa. É por isso que você precisa conversar com o Claude e montar uma ferramenta nada complicada, em que você não gasta nem um centavo a mais com sistema difícil. Você usa só o dinheiro que já gasta com o Claude. Essa bagunça te custa quantas vendas por mês? Você sabe? Deve ser bastante. A cliente que pediu orçamento ficou no vácuo e você nunca mais lembrou de chamar. Ela fica chateada de ter sido ignorada e ainda te dá trabalho para reverter. E tudo isso porque você está usando a sua cabeça como caderno de recado. A cabeça nem foi feita para isso. O que te falta tem nome, se chama CRM. É um sistema onde você cadastra cada cliente, os dados principais, data de nascimento, os produtos que ela comprou, quando ela faz cada compra, quando e quanto ela gasta. Lá você enxerga quem ela é e qual o próximo passo dela. O que precisa ser feito, se precisa entrar em contato, se precisa pedir um feedback. Até o aniversário entra, porque às vezes só um parabéns já faz a pessoa se sentir especial. Se você for uma extensionista de cílios, por exemplo, você pode colocar um lembrete a cada 15 dias ou três semanas para mandar mensagem pra ela marcar pra voltar. E o melhor, falando só no microfone do Claude, você registra tudo sobre a cliente e ele transforma isso num CRM construído exatamente para a sua necessidade. Um CRM pago pode passar de R$ 300 por mês. Você não precisa de um. Você monta o seu sozinha. E você, que eu sei que já está me seguindo, as suas clientes estão num lugar só ou espalhadas na sua cabeça? Me conta aqui.", "legenda": "Você tem cliente espalhada no WhatsApp, no direct, no e-mail, no caderno e na cabeça, esquece de responder e ela compra de um concorrente. O que falta tem nome, CRM. Um sistema onde cada cliente tem um lugar e um próximo passo, do contato ao parabéns de aniversário. E você monta o seu falando no microfone do Claude, sem pagar mais de R$ 300 por mês num sistema pronto. Usa só o que você já gasta com o Claude."}}, {"t": "pov", "tag": "POV", "titulo": "POV: você tem cliente antigo parado e nunca chamou de volta.", "det": {"text": "POV: você tem cliente antigo parado e nunca chamou de volta.", "grupo": "Vendas e cliente"}}]}, {"id": "063", "date": "01/09", "dow": "ter", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "As desculpas que parecem racionais", "det": {"theme": "Papo de empresa, sem o Claude", "tela": "As suas desculpas são boas demais", "corpo": "Esse aqui é um Papo de empresa, sem o Claude, então hoje é só a real entre a gente. “Não tenho dinheiro”, “é arriscado”, “não é o momento”, as suas desculpas são tão boas que você nem questiona. Eu vou tocar numa ferida agora. Eu já fui rainha das desculpas, então eu falo de dentro. Aquelas suas desculpas tão racionais para não dar o passo, elas podem ser pura autossabotagem disfarçada de bom senso. A mente é feita para criar mesmo e ela é genial em fabricar justificativa que parece perfeita. Soa tudo tão sensato que você nem questiona. E quanto mais inteligente você é, melhores ficam as suas desculpas. Mas, no fundo e só um jeito de aliviar a culpa de não estar fazendo, agindo. A gente jura que vai agir quando a grana melhorar, quando der mais segurança. Só que tem um detalhe. Quem se sabota costuma continuar parada e o dinheiro não aparece do nada. O que te trava mora muito mais aqui dentro, no medo, do que lá fora, na falta de condição. Dá um primeiro passo, pode ser pequeno e cuidadoso, no seu ritmo, com o medo junto. A questão é só parar de usar a desculpa como trava. Vamos fazer juntas uma coisa hoje que noss vai aproximar de onde a gente quer chegar? E você, que eu sei que já está me seguindo, qual é a desculpa que você mais repete para não começar? Me conta aqui.", "legenda": "Aquelas suas desculpas racionais para não começar podem ser autossabotagem disfarçada de bom senso. Não tenho dinheiro e arriscado, não é o momento, soa sensato e você nem questiona. Mas a prova que dói é essa, quem se sabota continua parada mesmo quando o dinheiro aparece do nada. O que te trava mora mais no medo do que na falta de condição. Pega a sua desculpa preferida e pergunta, isso é verdade ou é proteção? E dá o primeiro passo possível."}}, {"t": "carrossel", "tag": "Carrossel Verdade", "titulo": "Mentalidade", "det": {"tipo": "Verdade", "assunto": "Mentalidade", "arquivo": "Verdades/1 Mentalidade/05"}}]}, {"id": "064", "date": "02/09", "dow": "qua", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "O Diário de bordo que eu mando para o Claude", "det": {"theme": "TDAH e cabeça", "tela": "O seu corpo desliga na hora errada?", "corpo": "Todo fim de tarde, quando eu fecho a minha primeira empresa, bate uma letargia pesada bem na hora em que eu queria render na segunda. Então eu perguntei para o Perplexity o que ele achava. Contei para ele que eu já faço acompanhamento com a minha psiquiatra e que tomo as minhas medicações. Ele me explicou umas coisas, mas em momento nenhum me aconselhou nada sobre isso, porque tratamento é com a minha psiquiatra. O que ele me deu foram coisas práticas para testar: me movimentar quando o pico chega, lá pelas 18 horas, fazer um polichinelo e escrever sobre o que eu estou sentindo na hora. Foi daí que nasceu uma série que eu comecei, o Diário de bordo. Eu não escrevo, eu não digito, eu dito. Vou ditando tudo o que estou sentindo, como foi o dia, o que passa pela minha cabeça e o que eu acho que preciso levar para a minha terapeuta na próxima sessão. No fim da semana, esses diários vão para o Claude, para ele resumir tudo e montar um checklist do que eu tenho que falar com ela. Repara no que o Claude faz aqui. Ele não está no lugar da minha psiquiatra nem da minha terapeuta. Ele organiza o que eu sinto porque eu alimentei ele com esse material, o meu material, a minha voz, para eu chegar na consulta com tudo na mão. A parte de cuidar de mim continua sendo a minha responsabilidade e das profissionais. E você, que eu sei que já está me seguindo, também tem aquele horário em que o corpo pede para desligar bem na hora que você queria render? Me conta aqui.", "legenda": "Todo fim de tarde, quando eu fecho a minha primeira empresa, bate uma letargia bem na hora que eu queria render na segunda. Perguntei ao Perplexity o que fazer e ele me deu coisas práticas para testar, sem nunca se meter no que é da minha psiquiatra. E criei o Diário de bordo: eu dito tudo o que sinto e mando para o Claude resumir num checklist para a minha terapeuta. A IA organiza. Quem cuida de mim são elas."}}]}, {"id": "065", "date": "03/09", "dow": "qui", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Ofertas ao redor do serviço principal", "det": {"theme": "Previsibilidade e caixa", "tela": "Tem dinheiro escondido no seu serviço", "corpo": "Tem dinheiro escondido em volta do seu serviço principal e você entrega tudo isso de graça. E o Claude é quem vai te ajudar a montar essas ofertas. Você descreve o seu serviço principal para o Claude e ele mapeia o que dá para oferecer em cada momento, com preço e monta as ofertas complementares prontas para você apresentar. Pensa no caminho da cliente. Antes do serviço, dá para vender um diagnóstico ou uma orientação. Durante, dá para incluir um upgrade ou um item que combina. Depois, dá para oferecer acompanhamento, manutenção ou um treinamento. Cada um desses é um serviço de verdade, com preço próprio, que hoje você talvez entregue de graça ou nem ofereça. E para quem vive de serviço eventual, essa receita complementar é o que segura o caixa entre um trabalho grande e outro. A cliente fica mais tempo com você e o seu dinheiro para de depender só da venda principal. E você, que eu sei que já está me seguindo, o que você oferece antes, durante e depois do seu serviço? Me conta aqui.", "legenda": "Tem dinheiro escondido ao redor do seu serviço principal. Antes, um diagnóstico ou uma orientação. Durante, um upgrade ou um item que combina. Depois, acompanhamento, manutenção ou treinamento. Cada um é um serviço com preço, que você talvez entregue de graça. Para quem vive de trabalho eventual, essa receita segura o caixa entre um grande e outro. O Claude mapeia tudo isso e monta as ofertas com você."}}, {"t": "pov", "tag": "POV", "titulo": "POV: você parou de achar que precisava dar conta de tudo sozinha.", "det": {"text": "POV: você parou de achar que precisava dar conta de tudo sozinha.", "grupo": "Virada e mentalidade"}}]}, {"id": "066", "date": "04/09", "dow": "sex", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "A empresária que se acha cara", "det": {"theme": "Mentalidade de dona de negócio", "tela": "Há quanto tempo você não aumenta seu preço?", "corpo": "A pessoa que faz meia boca cobra caro sem piscar e você, que entrega impecável, fica se tremendo na hora de dizer o preço. Para mim isso é mais uma questão de cara de pau do que do valor do trabalho de cada um. E é aqui que o Claude entra. Você explica para ele tudo o que você entrega no seu produto, Todos os serviços que você disponibiliza, onde você trabalha e ele faz a pesquisa de mercado considerando tudo isso, para te ajudar a precificar de maneira certa ou pelo menos justa, para você decidir. A decisão final é sempre sua. O Claude pode até te mostrar o que fazer para você se colocar no nível de um profissional que ele pesquisou. Porque para mim a questão nunca foi cobrar caro ou cobrar barato. A questão é o tanto que você está segura ou não do que você faz e de quanto você faz bem. E aí, sim, botar um preço nisso. E você, que eu sei que já está me seguindo, ainda dá aquela tremida na hora de dizer o preço? Me conta aqui.", "legenda": "Tem gente com trabalho impecável que treme para cobrar e tem gente medíocre que cobra caro sem piscar. Para mim isso é cara de pau. A questão é cobrar o que o seu trabalho vale, considerando tudo. Você explica ao Claude as vantagens do seu produto, ele pesquisa o mercado e te ajuda a precificar justo. A decisão final é sempre sua."}}, {"t": "carrossel", "tag": "Carrossel Ensino", "titulo": "4 Produtividade e rotina · 5 tarefas para deixar com a IA hoje", "det": {"tipo": "Ensino", "assunto": "4 Produtividade e rotina · 5 tarefas para deixar com a IA hoje", "arquivo": "Ensino/4 Produtividade e rotina/05 5 tarefas para deixar com a IA hoje"}}]}, {"id": "067", "date": "05/09", "dow": "sáb", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Você nunca listou tudo que você faz", "det": {"theme": "Precificação", "tela": "Tem serviço seu rendendo zero", "corpo": "Você faz um monte de coisa de graça achando que é só um extra e tem serviço seu rendendo zero. Às vezes, tem serviços paralelos que você vende e não contabiliza quanto você ganha por eles ou serviços paralelos você poderia vender junto com os seus serviços por uma comissão e você não tá fazendo isso. Foi o Claude que escancarou na minha frente o tanto que eu tava perdendo de dinheiro. Eu sentei com ele e descrevi tudo que eu fazia no meu dia, inclusive aquelas coisas que eu fazia meio por fora, sem cobrar, achando que era só um extra. O Claude me ajudou a separar cada uma dessas tarefas como um serviço de verdade, botar um preço em cada uma e enxergar de quais delas eu poderia até vender mais. Apareceram serviços que eu nunca tinha enxergado como serviço. Porque isso é mais comum do que parece. Pensa numa nutricionista. Ela não vende só a consulta. Ela tem o retorno, que é outro atendimento, com outro preço. Ela monta o cardápio e o plano, que é um trabalho à parte. Tem nutricionista que cria grupo de desafio para emagrecer ou para largar o açúcar. Isso é mais um serviço, com mais um valor. Tudo isso ela costuma tratar como um a mais, de brinde, sem nunca quantificar. Mas cada um desses é um serviço que pode ter preço e ser vendido separado. E principalmente, esse dinheiro tem que ser contabilizado como dinheiro que entra na empresa. Tem “favorzinhos” que você faz que você pode botar, por exemplo, como brinde e agregar valor ao que você já vende. E quando você descreve tudo que faz o que que acontece?  Você enxerga dinheiro em coisas que já entrega de graça. E passa a oferecer cada serviço de propósito, em vez de deixar ele jogado no fundo da sua mente. O Claude te ajuda a fazer esse mapa completo, a dar nome e preço a cada serviço e a montar ofertas separadas para você vender mais para a mesma cliente. Tem serviço seu rendendo zero só porque você nunca botou ele no papel com um preço. Ei, você que tá me seguindo, que eu já sei, já colocou no papel todos os seus serviços e tudo o que você pode agregar à sua venda?", "legenda": "Você descreve os seus produtos, mas nunca listou todos os serviços que presta. Aquele retorno, o plano, o grupo de desafio, os favores que você faz de graça, tudo isso é serviço com preço e pode ser vendido separado ou virar um brinde que agrega valor. Peça ao Claude para mapear tudo que você faz, dar nome e preço a cada serviço e montar ofertas para vender mais para a mesma cliente."}}]}, {"id": "068", "date": "06/09", "dow": "dom", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "O arquivo de contexto que você cola sempre", "det": {"theme": "IA na prática, negócio e conteúdo", "tela": "Você se apresenta para a IA toda vez", "corpo": "Você abre uma conversa nova com a IA e explica tudo do zero de novo, toda santa vez. Quem você é, o que a sua empresa faz, quem é o seu cliente. Toda santa vez do zero. Isso cansa e faz você perder tempo. Acontece que o Claude é meio muito esquecido. Uma conversa não fala com a outra. E dentro da mesma conversa, quando ele cansa, ele já não lembra direito do que você disse lá no começo. Ela precisa dessas informações na mão o tempo todo. Então faz o seguinte. Monta um arquivo com tudo que a IA sempre vai precisar saber. Quem você é, como a sua empresa funciona, quem é o seu cliente, como você fala. Guarda isso num documento e pronto. Aí, toda conversa nova, você só abre o arquivo, copia e cola. Em vez de gastar 10 minutos se apresentando, você cola e já começa a trabalhar. E o melhor, quanto mais completo esse arquivo, mais personalizado fica tudo que a IA te entrega. Além disso, no final da conversa, pede sempre ao Claude para fazer um documento de continuidade para você poder começar uma nova conversa sobre aquele mesmo assunto. Assim, você já tem as suas informações e tem as informações da própria conversa. Se você alimentar as conversas com esses documentos, você já vai estar à frente de muita gente. E você, que eu sei que já está me seguindo, você ainda explica tudo de novo toda vez que abre uma conversa? Me conta aqui.", "legenda": "Você abre uma conversa nova e explica tudo de novo para a IA, quem você é, o que faz, quem é o seu cliente. Ela é esquecida, uma conversa não fala com a outra. A solução é montar um arquivo com tudo que ela sempre precisa saber e só colar no começo de cada conversa. Você economiza tempo e ainda recebe respostas com a sua cara. Leva uma tarde para montar e serve para sempre."}}]}]}, {"n": 11, "label": "7 a 13 set", "days": [{"id": "069", "date": "07/09", "dow": "seg", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Onde guardar a reserva sem se perder no economês", "det": {"theme": "Reserva e futuro", "tela": "Como eu guardaria a reserva da empresa sem entender de finanças", "corpo": "Você até junta um pouco para a reserva, mas na hora de botar para render você congela. Aparece renda fixa, CDB, liquidez e você fecha tudo achando que isso é para quem entende de finanças. Então faz o seguinte, pega o Claude e fala com ele do jeito que você fala comigo. Se quiser pedir para o Perplexity também está valendo. Pede para ele te explicar Cada um explica o teu negócio e vê qual é melhor pra você, qual vale mais a pena pra você e para o tipo de empresa que você tem e, dependendo de como você recebe e dependendo das suas contas a pagar, você pode escolher um tipo ou outro. Ele me contou que: renda fixa é guardar o dinheiro num lugar que rende sozinho, com a regra combinada desde o começo que liquidez é o tempo que o dinheiro leva para voltar para a sua mão quando você precisar. que CDB é quando você empresta para um banco e ele te paga por isso. que o CDI não é um investimento, é só a referência que diz o quanto esse dinheiro rende. Por exemplo, pode ser a base de cálculo para o CDB. E o melhor, ele te mostra que dá para fazer isso na conta digital que você já usa, sem pagar consultor e longe do banco grande, que cobra uma taxa alta e fica com boa parte do que ia ser seu. Aí você olha só 2 coisas, em quanto tempo o dinheiro volta se você precisar e quanto custa tirar antes da hora combinada. Para uma reserva, você quer um lugar de onde dá para sacar rápido no início, quando você está começando a sua reserva, pode ser que você tenha uma urgência e precise tirar o dinheiro rápido. Por exemplo, quando você já tem uma reserva, um colchão, é legal. Vale a pena você ir colocando dinheiro para uma liquidez maior, e aí você ganha mais. Uma coisa importante, isso aqui é para você entender o caminho e se organizar, não para servir de recomendação de investimento, então a escolha final você confirma com alguém da área. Tem pessoas que trabalham com isso e cuidam da sua carteira de investimentos em troca de um percentual. Os percentuais em bancos grandes são muito maiores do que os de bancos menores e que são especializados nisso. Não farei nomes porque não tem ninguém me patrocinando. E você, que eu sei que já está me seguindo, já sabia que dava para começar sozinha na sua conta digital ou achava que precisava de banco grande e de consultor? Me conta aqui.", "legenda": "Você junta um pouco para a reserva, mas trava quando aparece renda fixa, CDB e liquidez. Pede para o Claude explicar essas palavras em português de gente e te dizer onde guardar. Ele mostra que dá para fazer na conta digital, sem consultor e longe do banco grande. Olha só 2 coisas, em quanto tempo o dinheiro volta e quanto custa tirar antes da hora. Isso é para você se organizar, confirme a escolha com alguém da área."}}, {"t": "pov", "tag": "POV", "titulo": "POV: você tem mil ideias na cabeça e nenhuma anotada.", "det": {"text": "POV: você tem mil ideias na cabeça e nenhuma anotada.", "grupo": "Organização e previsibilidade"}}]}, {"id": "070", "date": "08/09", "dow": "ter", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Depois eu organizo é o erro número um", "det": {"theme": "Provocações e mitos para quebrar", "tela": "Cada mês bagunçado custa um salário", "corpo": "Você vive falando depois eu organizo e cada mês desorganizada custa o salário de uma funcionária. A única forma de o depois acontecer é ele virar uma bola de neve e você não ter como fugir dele. Enquanto as coisas ficam soltas na sua cabeça, elas nunca acontecem. E esse depois eu organizo tem um custo que dá para calcular. Peça para o Claude calcular quanto a desorganização está te custando por mês, em dinheiro perdido e em tempo, para o número aparecer na sua frente. Cada mês desorganizada custa mais ou menos o valor de uma funcionária a mais que você poderia ter. E não é só dinheiro e o tempo que você perde no susto, o retrabalho, a coisa que some, o cliente que fica esperando e ansiedade, estresse. Coloca no Claude todas as tarefas que você precisa fazer. Coloca tudo desorganizado. Não precisa ter uma ordem. Quem vai colocar a ordem é o próprio Claude. Abre o microfone e vai falando. Depois peça para ele distinguir o que é evento e tem a hora e hora e o que é tarefa que tem prazo, mas pode ser feito em qualquer hora, inclusive entre eventos e aí pede para ele ir quebrando a organização em pedaços pequenos que cabem na semana. Mas, para isso, você tem que adquirir o hábito de ir falando pro Claude as coisas que você tem para fazer. Abre uma conversa e usa o comando de voz para ir dizendo pro Claude tudo o que você precisa fazer. E você, que eu sei que já está me seguindo, quantos depois você já empurrou? Me conta aqui.", "legenda": "Depois eu organizo é o erro número um, porque o depois nunca chega, sempre tem algo mais urgente. A única forma de ele acontecer é virar compromisso na agenda, com dia e hora. Peça para o Claude calcular quanto a desorganização te custa por mês, em dinheiro e em tempo e te ajudar a quebrar a organização em pedaços que cabem na semana."}}, {"t": "carrossel", "tag": "Carrossel Lamentação", "titulo": "Sobrecarga e tempo", "det": {"tipo": "Lamentação", "assunto": "Sobrecarga e tempo", "arquivo": "Lamentação/05 Sobrecarga e tempo parte 2"}}]}, {"id": "071", "date": "09/09", "dow": "qua", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Você vendeu muito, mas a conta está vazia", "det": {"theme": "Financeiro", "tela": "Vendeu tanto e cadê o dinheiro?", "corpo": "Você fechou um monte de venda esse mês e a sua conta está vazia de novo. Tem uma explicação que ninguém te deu.: o quanto você vendeu e o quanto de fato entrou na sua conta são 2 coisas bem diferentes. Você vende 10, mas na sua conta não tem 10. E eu enxergo isso com o Claude, de um jeito simples: vai no aplicativo do seu banco você baixa o extrato. Aliás, baixa ele em 2: um só com as entradas e outro só com as saídas. Joga os 2 no Claude junto com o seu relatório de vendas e pede para ele cruzar: quanto eu vendi, quanto de fato entrou e quanto saiu. E já aproveita e pede para ele te dizer quanto ainda vai entrar nas próximas semanas, com base no que você já vendeu a prazo e parc
