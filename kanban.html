mo analisar perfil que bomba e pesquisar preço, então perder ia doer demais. Eu uso para muita coisa legal. Primeira coisa: eu já não compro mais nada sem pedir pra ele fazer uma pesquisa pra mim. Aí ele entra nos sites, vê qual é o mais barato, me dá o link, e eu já vou comprar. Às vezes eu boto num raio, perto de casa, para que eu aí vou na loja direto. A segunda forma de usar a extensão é analisar perfis de TikTok e vídeos criadores da minha área. Eu peço sempre para analisar os vídeos que mais bombaram e me dizer o que eles têm de bom e o que eu posso fazer no meu perfil para melhorar, inspirado naquele vídeo. Isso tem um poder enorme. Agora, pra não perder isso tudo, o que é que eu faço? É simples e salva a minha vida. No final de tudo, antes de fechar qualquer coisa, eu peço para ele jogar o resultado num documento. Eu falo assim, me coloca isso num Google Docs para eu poder salvar. Você só tem que estar ali presente pra poder fazer o seu login, porque isso ele não faz, Mas ele joga no seu drive toda a pesquisa já feita e formatada. Caso você queira continuar a pesquisa, mas você já pediu para ele fazer o DOCS, é só pedir para ele atualizar, que ele atualiza. A regra que eu carrego para tudo e não é só para a extensão e nunca deixar um trabalho importante preso num lugar que pode sumir. Toda conversa que vale, eu mando para um documento meu. Porque ferramenta atualiza, trava, muda do nada e você não quer descobrir isso no dia que perdeu 3 horas de trabalho. Já aconteceu comigo e foi assim que eu virei essa chata que salva tudo. Então fica o aviso de amiga. Usa a extensão, ela é maravilhosa, mas trata ela como uma areia que escorre entre os dedos. Pega o que ela te deu e guarda num lugar seguro antes de soltar. E você, que eu sei que já está me seguindo, já perdeu um trabalho inteiro porque confiou que ia estar lá depois? Me conta aqui.", "legenda": "A extensão do Claude no Chrome é uma forma diferente de usar o Claude e ela não conversa com o do aplicativo. O que você faz ali fica só ali e se a conversa some, você não recupera. Por isso, antes de fechar, eu sempre peço para ele salvar tudo num Doc. Trata a extensão como areia entre os dedos, guarda o que ela te deu antes de soltar."}}]}, {"id": "107", "date": "15/10", "dow": "qui", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "O medo de dar certo", "det": {"theme": "Papo de empresa, sem o Claude", "tela": "E se o seu medo for dar certo?", "corpo": "Esse aqui é um Papo de empresa, sem o Claude, então hoje é só a real entre a gente. Todo mundo fala do medo de fracassar e quase ninguém te conta que dar muito certo também assusta. Pode parecer doido, mas é isso: paralisa tanto quanto o outro, às vezes mais. Pensa comigo. Se você abrir a sua empresa e der muito certo, muda tudo. Você assume mais responsabilidade, fica mais exposta ao julgamento dos outros e perde aquela desculpa confortável de que você ainda está só tentando. Enquanto você está só tentando, ninguém cobra muito de você. O sucesso cobra de você ficar à altura. E isso assusta muito. E tem uma raiz mais funda. Se lá no fundo você acredita que não é boa o suficiente, que não merece, a ideia de dar certo dá um pânico estranho. Eu já senti isso, sabotar uma coisa boa bem na hora que ela ia deslanchar. Porque o sucesso te colocaria num lugar de destaque que aquela voz interna jura que você não dá conta. Quando você percebe que parte do seu medo é justamente de ir bem, você para de acreditar que é incapaz e começa a ver que é só uma defesa antiga. Você merece ocupar aquele espaço. Você merece dar certo. E dar certo se aprende a carregar aos poucos, um passo de cada vez. Você não precisa nascer pronta. Pode ser que você tropece e está tudo bem. Os grandes também tropeçam. E você, que eu sei que já está me seguindo, será que o que te trava é o medo de falhar ou o medo de dar muito certo? Me conta aqui.", "legenda": "Todo mundo fala do medo de fracassar, mas quase ninguém fala do medo de dar certo. Dar muito certo significa mais responsabilidade, mais exposição e perder a desculpa de que você ainda está só tentando. E se lá no fundo você sente que não merece, o sucesso vira pânico, então você se paralisa antes de tentar. Reconhecer isso já muda o jogo. Você merece ocupar espaço e dar certo, um passo de cada vez. Esse medo antigo a terapia ajuda a desarmar."}}, {"t": "pov", "tag": "POV", "titulo": "POV: você acha que precisa de uma equipe para fazer conteúdo e está fazendo tudo no celular com a IA.", "det": {"text": "POV: você acha que precisa de uma equipe para fazer conteúdo e está fazendo tudo no celular com a IA.", "grupo": "Conteúdo e produção"}}]}, {"id": "108", "date": "16/10", "dow": "sex", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Começando e com medo de cobrar", "det": {"theme": "Precificação", "tela": "Precisa de anos para cobrar bem?", "corpo": "Você está começando agora e trava na hora de dizer o preço, porque acha que ainda não tem experiência para cobrar? Eu já passei por isso e eu montei um preço de início que faz sentido. Eu pedi para o Claude calcular um preço de entrada que cobrisse os meus custos com material, tempo e deslocamento e ainda deixasse um lucro pequeno, mesmo no começo. E pedi para ele montar uma oferta especial para as minhas primeiras clientes, com uma condição em troca. Em poucos minutos eu tinha o número e o convite prontos. Porque tem uma armadilha em que quase toda iniciante cai, a de trabalhar de graça achando que é assim que se conquista cliente. Só que de graça você não paga as suas contas e ainda ensina a cliente a não valorizar o seu trabalho. Mesmo começando, você tem custo e o seu preço nunca pode ser zero. Ele pode ser menor no início, mas precisa cobrir o que você gasta e deixar alguma coisa para você. E aqui está o que muda tudo. Em vez de simplesmente baixar o preço, você troca uma condição especial por divulgação. Fala para sua cliente: “Fulana, esse já é o menor preço com desconto que eu consigo fazer. É o preço de lançamento.” Você pode dizer também que sim, dá o desconto, mas em troca pede um depoimento, uma foto do resultado, uma marcação nas redes ou uma indicação para uma amiga. Assim o seu preço cheio continua existindo, a vantagem tem uma contrapartida clara e cada cliente que entra te ajuda a trazer a próxima. Começar barato pode ser uma escolha esperta, desde que seja temporário e com algo em troca. Conforme você junta depoimentos e clientes felizes, o seu preço sobe. E você, está começando agora e com medo de cobrar? Me conta aqui que eu te ajudo a montar o seu preço de início.", "legenda": "Começou agora e trava na hora de cobrar? Mesmo sem experiência, o seu preço nunca é zero, ele cobre os seus custos e deixa um lucro pequeno. Em vez de trabalhar de graça, ofereça um valor de lançamento para as primeiras clientes em troca de um depoimento, uma foto ou uma indicação. Assim o preço cheio continua existindo e cada cliente te traz a próxima. Peça ao Claude para calcular esse preço de entrada e escrever o convite."}}, {"t": "carrossel", "tag": "Carrossel Ensino", "titulo": "2 IA na prática · Organizar a semana pela energia", "det": {"tipo": "Ensino", "assunto": "2 IA na prática · Organizar a semana pela energia", "arquivo": "Ensino/2 IA na prática/04 Organizar a semana pela energia"}}]}, {"id": "109", "date": "17/10", "dow": "sáb", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "O checklist diário que cabe", "det": {"theme": "Produtividade", "tela": "O seu checklist morre antes do almoço", "corpo": "Você monta aquele checklist lindo de manhã e à noite metade está intacta. E vem a frustração de sempre. Essa coisa de fazer o checklist, de tirar tarefas da sua cabeça e colocar no papel ou num lugar digital e uma coisa certíssima como método de organização. A questão é que está faltando a segunda parte disso: revisar a lista que você fez. E às vezes mais de uma vez no dia. Se você está achando que eu vou dizer para você jogar pro Claude fazer a tua checklist, infelizmente não tem como! A checklist, quem tem que fazer é você, porque as coisas estão dentro da tua cabeça. O que você pode fazer é jogar essa lista por comando de voz para o Claude e pedir 3 coisas: que ele estime mais ou menos quanto tempo cada tarefa leva, que ele me ajude a priorizar pelo que de fato move a empresa e que ele encaixe essas tarefas nos buracos entre as suas reuniões do Google Agenda, se você tiver conectado o Google Agenda ao seu Claude. E se você está se importando com a quantidade de tarefas que tem na sua lista, esse não é o problema. Você pode ter 30 tarefas pequenas que você faz em 2 horas, assim como pode ter uma tarefa que vai levar o dia inteiro. Não se assuste com a quantidade de tarefas que tem na sua lista. Veja a sua lista como uma forma de você tirar coisas da sua cabeça e usar o tempo da revisão para poder refletir sobre elas e colocá-las onde elas devem estar. O meu sistema é simples. Eu tenho uma caixa de entrada onde eu jogo tudo que vem na cabeça, na hora, sem pensar, sempre por comando de voz. Em alguns momentos do dia eu sento e esvazio essa caixa, cada coisa vai para a sua lista. O que tem hora marcada eu ponho com hora e já vai automaticamente para o calendário. O que não tem fica solto e eu vou fazendo aos pouquinhos. Quando eu vou falando pro Claude, eu começo a falar e, à medida que ele vai pegando esse tempo, ele vai fazendo a média e vai conseguindo me ajudar a alocar essas tarefas entre reuniões, por exemplo. Mas, criar o hábito de fazer essa revisão várias vezes por dia é o que faz a sua checklist funcionar. A ordem dessas tarefas segue a minha energia. De manhã, quando eu ainda estou acordando, eu pego as fáceis e mecânicas e vou fazendo. Quando o meu corpo está pronto para pensar, umas 11h, aí sim eu ataco a tarefa complexa, a chata, a que exige cabeça. Forçar uma coisa difícil na hora errada do dia é o que faz ela não sair. E você, que eu sei que já está me seguindo, monta o seu checklist pelo tempo que tem ou só vai empilhando tarefa? Me conta aqui.", "legenda": "Você monta o checklist de manhã e à noite metade está intacta? O número de itens engana. 30 tarefinhas cabem numa tarde, 3 tarefões não cabem na semana. O que vale é a lista caber no tempo que você tem. Você junta as tarefas. O Claude estima o tempo de cada uma, prioriza e encaixa nos buracos da sua agenda. E faça o complexo quando o corpo está pronto, o fácil quando não está."}}]}, {"id": "110", "date": "18/10", "dow": "dom", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Você não controla o mercado, controla o desenho do seu negócio", "det": {"theme": "Previsibilidade e caixa", "tela": "O seu caixa sobe e desce sem você entender", "corpo": "Um mês entra muito, no outro despenca e a sua divulgação roda igual. Tem uma verdade dura por trás disso. Você não controla o mercado, você só controla o “desenho” do seu negócio. E o Claude te ajuda a enxergar esse desenho. Você dá para ele os extratos dos últimos meses e ele te mostra quanto do seu dinheiro é garantido e quanto depende do acaso, daquele cliente que pode aparecer ou não. Ele enxerga os padrões. Ele pode te ajudar também a planejar uma diversificação de tipos de clientes para que você tenha alguns clientes “fiéis”, mas que pagam com desconto e cliente “avulsos” que pagam mais, mas não te dão essa previsibilidade. E aí, quando você vê a situação, para de ficar sem entender sua empresa e vê exatamente como o dinheiro se comporta na sua empresa. A sua divulgação traz gente, mas não garante a venda. A pessoa chega, mas fechar ainda depende de confiança, de momento, de urgência. Prever quem vai comprar é quase impossível. Agora, proteger o seu caixa é outra coisa, isso você arruma. E não é uma questão de se esforçar mais. Muita empresária trabalha demais e mesmo assim o mês despenca, porque falta o ese “desenho” financeiro por trás. Previsibilidade total não existe. O que dá para ter é a relativa, que já tira a maior parte do susto do mês. E você, que eu sei que já está me seguindo, o seu mês é uma montanha-russa ou você já desenhou um chão firme? Me conta aqui.", "legenda": "Por que um mês entra muito e no outro despenca, mesmo com a divulgação igual? Porque você não controla o mercado, controla o desenho do seu negócio. A divulgação traz gente, mas a venda depende de confiança e momento. Previsibilidade total não existe, a relativa sim. Ela tira o susto. Dê os últimos meses para o Claude e veja quanto do seu dinheiro é garantido e quanto depende do acaso."}}]}]}, {"n": 17, "label": "19 a 25 out", "days": [{"id": "111", "date": "19/10", "dow": "seg", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "A sua empresa pequena não é um corporativo pequeno", "det": {"theme": "Mentalidade de dona de negócio", "tela": "Quantas áreas da sua empresa são só você?", "corpo": "Você toca a sua empresa sozinha e se sente atrasada porque acha que empresa de verdade tem time, organograma e diretor para cada coisa. Isso assusta, né? Eu pedi que o Claude organizasse a minha empresa em áreas, marketing, financeiro, atendimento, tudo separadinho, Pra eu saber quais eram as tarefas de cada uma. E ele fez, mesmo as áreas em que a única pessoa sou eu. Porque a área existe mesmo sem ninguém contratado nela. O meu conteúdo é a área de marketing. A área da empresa existe de qualquer forma. Não é porque não tem ninguém lá que as coisas daquela área não são feitas. Elas são feitas provavelmente por você. A sua empresa pequena tem estrutura própria. Ela não é um minicorporativo. As pessoas pensam muito isso, né? Que aquela estrutura enorme do corporativo tem que diminuir e virar uma pequena empresa. Não é assim. A pequena empresa tem a sua lógica. Aquele conselho de que você “tem que sair da operação e ir para a estratégia” só faz sentido quando entra milhão de verdade todo mês. É quando você tem cargo de RH, de marketing e de financeiro ocupado por gente de verdade. E que você tenha dinheiro para pagar muito bem a essas pessoas. Porque imagina você deixar a senha do banco da empresa Pra alguém que não tem esse tipo de responsabilidade. Até lá, ser a empresa inteira sozinha não é vergonha. É o tamanho que você tem agora. Se você quiser chegar lá, também é outra história, porque quanto maior a empresa, maior a responsabilidade que vem com ela. Então para de se comparar com quem está em outro jogo. Procura mulheres que também tocam empresa pequena e troca com elas. Você vai parar de se sentir atrasada numa comparação que nem é a sua. E você, que eu sei que já está me seguindo, quantas áreas da sua empresa hoje são só você? Me conta aqui.", "legenda": "A sua empresa pequena tem estrutura própria. Ter uma pessoa por área ou ser você em todas elas não é falha de gestão. É o estágio em que você está. O Claude me ajudou a enxergar as áreas e a dar tarefa para cada uma, mesmo as que sou só eu. Para de comparar o seu negócio com o corporativo. Compara com quem está no mesmo lugar que você."}}, {"t": "pov", "tag": "POV", "titulo": "POV: você entendeu que a reserva é uma conta que a empresa paga para ela mesma.", "det": {"text": "POV: você entendeu que a reserva é uma conta que a empresa paga para ela mesma.", "grupo": "Reserva e futuro"}}]}, {"id": "112", "date": "20/10", "dow": "ter", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "A cliente inadimplente que te indica", "det": {"theme": "Cobrança e inadimplência", "tela": "a cliente que paga mal, mas te indica: vale a pena?", "corpo": "Tem aquela cliente que não paga direito, mas te enche de elogio e te indica para todo mundo. Você segura ela por causa das indicações, mas será que vale mesmo a pena? O Claude me ajudou a responder isso com número, em vez de agir com o coração. Eu pedi para ele fazer a conta de quanto essa cliente de fato me trouxe de dinheiro com as indicações e quanto ela me custou, contando o que ela deixou de pagar, o que pagou atrasado sem multa nem juros e as indicações dela. O Claude dá o resultado, mas quem tem que tomar a decisão é você. E às vezes a decisão é uma bela armadilha. Às vezes até vale a pena fechar o olho. Mas na maioria das vezes, a cliente que não paga indica gente parecida com ela, que também não paga. Então a indicação que parecia uma maravilha vira só mais trabalho de graça, multiplicado. Você atende mais, recebe menos e ainda acha que está sendo esperta por causa do boca a boca. E para tomar essa decisão com clareza, você precisa ter tudo registrado. Eu deixo um atalho do Claude no celular e vou jogando ali, de qualquer jeito, o que cada cliente gastou e como pagou. Mesmo que pareça uma bagunça sem pé nem cabeça, quando eu peço para ele organizar, ele me devolve quem realmente vale e quem só está me fazendo trabalhar à toa, sem retorno? Ou, mesmo atrasando, está me dando algum tipo de retorno. Não é manter uma cliente que paga mal porque ela é uma cliente antiga ou já virou amiga. Isso não pode. Mas e você, que eu sei que está me seguindo? Você cobra na lata ou mão da pasta? Me conta aqui.", "legenda": "Tem a cliente que não paga direito, mas te elogia e te indica e você segura por isso. Só que ela costuma indicar gente parecida, que também não paga, então a indicação vira trabalho de graça multiplicado. Peça ao Claude para fazer a conta do quanto ela traz e do quanto custa. Registre cada cliente num atalho no celular e deixe ele organizar quem vale a pena."}}, {"t": "carrossel", "tag": "Carrossel Lamentação", "titulo": "Medo de crescer", "det": {"tipo": "Lamentação", "assunto": "Medo de crescer", "arquivo": "Lamentação/09 Medo de crescer"}}]}, {"id": "113", "date": "21/10", "dow": "qua", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "O remédio te dá foco, não te lembra das coisas", "det": {"theme": "TDAH e cabeça", "tela": "O foco melhora e o esquecimento fica", "corpo": "Quem toma remédio para o TDAH sabe a diferença que ele faz no foco. Você consegue sentar e trabalhar concentrada por muito mais tempo. Mas tem uma parte que ele não alcança e ninguém te avisa. Você continua esquecendo a conta que vence, O recado que não deu. O celular que ficou perdido. O remédio mexe com o foco e a atenção. De fato, a atenção melhora esses esquecimentos, mas lembra que o remédio tem tempo para fazer efeito. Ele não faz efeito 24 horas por dia. O que resolve é tirar a informação da sua cabeça e botar num segundo cérebro. Eu uso o Lembretes e o Claude para isso. Tudo que não pode escapar eu mando para ele na hora, usando o microfone, assim não me atrapalha, ele registra e me devolve no momento certo, com lembrete. Funciona assim. A conta que vence dia 10 já está com data marcada para me avisar. O combinado que eu fechei no WhatsApp eu jogo para o Claude na hora, antes de esquecer. A tarefa que eu odeio ele quebra em passos pequenos para eu não fugir dela. A minha cabeça larga, ele segura. O remédio é uma parte do cuidado e quem cuida disso é o seu médico. Mas o esquecimento do dia a dia quem segura é um segundo cérebro. E você, que eu sei que já está me seguindo, você também achou que o remédio ia te lembrar das coisas e descobriu que não é bem assim? Me conta aqui.", "legenda": "O remédio do TDAH faz diferença no foco, você senta e trabalha concentrada. Mas o esquecimento é outra coisa e falha de memória e o remédio só ajuda, não melhora totalmente. O que resolve é tirar a informação da cabeça e botar num cérebro de fora. Eu uso o Claude, mando tudo que não pode escapar e ele me devolve na hora certa, com lembrete. O remédio é com o médico, o esquecimento é com o cérebro externo."}}]}, {"id": "114", "date": "22/10", "dow": "qui", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Massoterapeuta, o seu serviço rende mais do que a massagem avulsa", "det": {"theme": "Diversificar a renda", "tela": "Você ainda vende só sessão avulsa?", "corpo": "Essa é a minha série sobre diversificar a renda. Massoterapeuta, você vive de sessão avulsa e começa todo mês no zero sem saber quanto vai entrar? O seu serviço base é a sessão de massagem, então comece por aí. ●      Relaxante: ajuda a reduzir estresse e tensão muscular. ●      Terapêutica: voltada para aliviar dores e desconfortos específicos. ●      Shiatsu: aplica pressão com os dedos em pontos do corpo, com foco em equilíbrio e alívio de dores. ●      Drenagem linfática: estimula o sistema linfático e ajuda em inchaço e retenção de líquidos. ●      Desportiva: indicada para atletas ou quem treina, visando recuperação muscular. ●      Reflexologia: trabalha pontos reflexos, geralmente nos pés e mãos. Entre outras, imagino eu. Cada uma pode ter uma proposta própria. Mas o pulo do gato, obviamente é vender o pacote. Em vez de vender sessão solta, você vende um pacote de 10 sessões com um desconto pequeno em cada sessão. E ganha uma coisa que vale ouro, previsibilidade. Você passa a saber quanto entra antes do mês começar. Pega o Claude para montar isso com você. Eu pediria assim, tenho a agenda com tantos horários por semana e cobro tal valor na sessão, me ajuda a desenhar 3 pacotes e me mostra quanto cada um traz de entrada fixa por mês. Me diz também quanto eu posso dar de desconto para valer a pena o pacote e eu abrir mão da sessão individual. Em minutos você tem a tabela na mão, sem fazer conta na ponta do lápis. Depois, dá para se cercar de outros serviços de outras profissionais, como uma manicure ou uma esteticista, para indicarem clientes uma à outra. E dá para fechar parceria com uma marca de produto que você confia e ganhar uma porcentagem no que a cliente leva para casa. E você, que eu sei que já está me seguindo, você ainda vende só sessão avulsa? Me conta aqui.", "legenda": "Massoterapeuta, dá para sair da sessão avulsa. Monte pacotes de 10 sessões com um desconto pequeno e ganhe previsibilidade, sabendo quanto entra antes do mês começar. Peça ao Claude para desenhar os pacotes com base na sua agenda e no seu preço e ver quanto cada um traz por mês. Some parcerias com outras profissionais e comissão de produto. Antes de fechar preço, fale com a sua contadora."}}, {"t": "pov", "tag": "POV", "titulo": "POV: você precisou tirar dinheiro da empresa de novo para fechar o mês pessoal.", "det": {"text": "POV: você precisou tirar dinheiro da empresa de novo para fechar o mês pessoal.", "grupo": "Financeiro e caixa"}}]}, {"id": "115", "date": "23/10", "dow": "sex", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Psicóloga, o seu conhecimento pode virar renda além do consultório", "det": {"theme": "Diversificar a renda", "tela": "Psicóloga, você depende só da agenda de atendimento?", "corpo": "Para crescer sem se esgotar, dá para criar outras frentes de receita além da sessão individual: ●      atendimento em grupo; ●      palestras; ●      cursos e workshops; ●      e-books e materiais digitais; ●      cursos online; ●      produtos de assinatura ou comunidades. Você também pode criar um produto que vende enquanto você atende, como um curso para outras psicólogas ou um material digital com a sua abordagem. Você tem um olhar, uma forma de conduzir, uma metodologia que outras profissionais podem querer aprender. Isso pode virar aula gravada, e-book, workshop ou comunidade, dependendo do seu posicionamento. O Claude te ajuda na parte de negócio do curso. Eu pediria assim: “Quero montar um curso para psicólogas sobre a minha abordagem. Me ajuda a organizar os módulos, a ordem das aulas e o que entra em cada uma.” Ele te devolve uma estrutura para você preencher com o seu conteúdo, que é só seu. Ele também pode te ajudar a montar os e-books, as palestras, o workshop. Dá também para se juntar a outras profissionais e oferecer complementos à experiência da paciente, como atividades, eventos ou encontros temáticos, dependendo da faixa etária e da sua área de atuação. O conteúdo das sessões e o cuidado com a paciente seguem sendo só seus, sempre. E você, que eu sei que já está me seguindo, você já pensou em ensinar o que sabe para outras psicólogas? Me conta aqui.", "legenda": "Psicóloga, o atendimento tem o limite das suas horas. Crie um curso para outras psicólogas sobre a sua abordagem, que vende enquanto você atende. Peça ao Claude para organizar os módulos e a ordem das aulas, sempre na parte de negócio. Você preenche com o seu conteúdo, que é só seu. O cuidado com o paciente segue sendo seu. A IA fica na organização, nunca no clínico."}}, {"t": "carrossel", "tag": "Carrossel Ensino", "titulo": "2 IA na prática · As 3 ferramentas de IA que eu uso", "det": {"tipo": "Ensino", "assunto": "2 IA na prática · As 3 ferramentas de IA que eu uso", "arquivo": "Ensino/2 IA na prática/05 As 3 ferramentas de IA que eu uso"}}]}, {"id": "116", "date": "24/10", "dow": "sáb", "actions": [{"t": "video", "tag": "Vídeo", "titulo": "Maquiadora, o seu trabalho rende muito além da maquiagem em si", "det": {"theme": "Diversificar a renda", "tela": "Você cobra só pela maquiagem pronta?", "corpo": "Essa é a minha série sobre diversificar a renda. Maquiadora, tem renda passando na sua frente toda vez que a cliente compra a maquiagem em outro lugar. O primeiro caminho são as marcas. Tenha marcas de confiança atreladas ao seu nome, de maquiagem e de cuidado com a pele e ganhe uma porcentagem no que a cliente compra por indicação sua. O segundo caminho é um curso de automaquiagem, para ensinar a cliente a se virar no dia a dia. Isso pode virar também workshop, aula individual ou turma ao vivo, dependendo do seu posicionamento. Tem um serviço que poucas oferecem e as clientes amam: ir junto comprar maquiagem. A loja tem luz ruim, a pessoa não sabe testar o tom certo e você cobra por essa consultoria enquanto ajuda a cliente a acertar a compra. Além disso, você pode vender e-books, apostilas, minicursos, comunidade por assinatura e sobre maquiagem, pra quem quer seguir a carreira, ou sobre auto-maquiagem, pra quem, por exemplo, não quer passar pelo curso inteiro O Claude entra organizando tudo isso. Eu pediria assim: “Quero montar um curso de automaquiagem, uma consultoria de compras e uma comunidade de assinatur const useFB = firebaseConfig && firebaseConfig.apiKey && firebaseConfig.apiKey.indexOf('COLE')!==0;
let saveImpl=null;
async function initStore(){
  if(useFB){
    try{
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
      const { getFirestore, doc, onSnapshot, setDoc, deleteField } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
      const app=initializeApp(firebaseConfig); const db=getFirestore(app); const ref=doc(db,'estado','calendario');
      onSnapshot(ref,(snap)=>{const d=snap.data()||{};marks.clear();Object.keys(d).forEach(k=>{if(d[k]&&(k.indexOf('kf-')===0||k.indexOf('arq-')===0))marks.add(k);});render();},()=>{note.textContent='Erro de conexão';});
      saveImpl=async(k,on)=>{await setDoc(ref,{[k]:on?true:deleteField()},{merge:true});};
      note.textContent='Sincronizado entre dispositivos'; return;
    }catch(e){ note.textContent='Salvo neste aparelho'; }
  } else { note.textContent='Salvo neste aparelho. Ligue o Firebase para sincronizar.'; }
  try{ JSON.parse(localStorage.getItem('kanban-marks')||'[]').forEach(x=>marks.add(x)); }catch(e){}
  saveImpl=async(k,on)=>{ if(on)marks.add(k); else marks.delete(k); localStorage.setItem('kanban-marks',JSON.stringify([...marks])); };
  render();
}
async function toggle(k,on){ if(!useFB){ if(on)marks.add(k); else marks.delete(k); render(); } await saveImpl(k,on); }


function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function actId(dayId,a){return 'kf-'+a.t[0]+'-'+dayId;}
function cardHTML(dayId,a){const id=actId(dayId,a);const done=marks.has(id);
  return `<div class="cardk ${a.t} ${done?'done':''}" data-day="${dayId}" data-t="${a.t}"><span class="ck-tag">${esc(a.tag)}</span><div class="ck-tit">${esc(a.titulo)}</div><div class="ck-foot"><label><input type="checkbox" ${done?'checked':''} data-id="${id}"> feito</label></div></div>`;}
function dayHTML(d){let h=`<div class="col"><div class="colh"><span class="dnum">${d.date}</span><span class="ddow">${d.dow}</span><span class="dn">dia ${d.id}</span></div>`;
  d.actions.forEach(a=>h+=cardHTML(d.id,a));h+=`</div>`;return h;}
function render(){const app=document.getElementById('app');let html='',shown=0;
  for(const w of DATA){const arq=marks.has('arq-w'+w.n);if(view===0&&arq)continue;if(view===1&&!arq)continue;shown++;
    html+=`<div class="wkblock"><div class="wkhead"><b>Semana ${w.n}</b><span class="rng">${w.label}</span><button class="arch" data-w="${w.n}">${view===0?'Arquivar semana':'Desarquivar'}</button></div><div class="cols">`;
    for(const d of w.days)html+=dayHTML(d);html+=`</div></div>`;}
  if(!shown)html=`<div class="empty">${view===0?'Tudo arquivado por aqui.':'Nada arquivado ainda.'}</div>`;
  app.innerHTML=html;
  app.querySelectorAll('input[type=checkbox]').forEach(cb=>cb.addEventListener('change',async e=>{e.stopPropagation();const id=e.target.dataset.id;e.target.closest('.cardk').classList.toggle('done',e.target.checked);await toggle(id,e.target.checked);}));
  app.querySelectorAll('.arch').forEach(b=>b.addEventListener('click',async e=>{const k='arq-w'+b.dataset.w;await toggle(k,!marks.has(k));}));
  app.querySelectorAll('.cardk').forEach(c=>c.addEventListener('click',e=>{if(e.target.closest('.ck-foot'))return;openModal(c.dataset.day,c.dataset.t);}));
}
function findAction(dayId,t){for(const w of DATA)for(const d of w.days)if(d.id==dayId)for(const a of d.actions)if(a.t===t)return {d,a};return null;}
function openModal(dayId,t){const f=findAction(dayId,t);if(!f)return;const a=f.a,det=a.det;let h=`<button class="mclose" id="mclose">fechar</button><span class="mtag mt-${a.t}">${esc(a.tag)}</span><h3>${esc(a.titulo)}</h3>`;
  if(a.t==='video'){if(det.theme)h+=`<div class="blk"><span class="lbl">Tema</span>${esc(det.theme)}</div>`;if(det.tela)h+=`<div class="blk tela"><span class="lbl">Tela</span>${esc(det.tela)}</div>`;if(det.corpo)h+=`<div class="blk">${esc(det.corpo)}</div>`;if(det.legenda)h+=`<div class="blk"><span class="lbl">Legenda</span>${esc(det.legenda)}</div>`;}
  else if(a.t==='carrossel'){h+=`<div class="blk"><span class="lbl">${esc(det.tipo)}</span>${esc(det.assunto)}</div><div class="blk" style="font-size:12px;color:#8a8474">${esc(det.arquivo)}</div>`;}
  else if(a.t==='pov'){h+=`<div class="blk">${esc(det.text)}</div><div class="blk" style="font-size:12px;color:#8a8474">Grupo ${esc(det.grupo)}</div>`;}
  else if(a.t==='story'){h+=`<div class="blk"><span class="lbl">Fisgar</span>${esc(det.fisgar)}</div><div class="blk"><span class="lbl">Desenvolver</span>${esc(det.desenvolver)}</div><div class="blk"><span class="lbl">Interagir</span>${esc(det.interagir)}</div><div class="blk"><span class="lbl">Direcionar</span>${esc(det.direcionar)}</div>`;if(det.frames&&det.frames.length)h+=`<div class="blk" style="font-size:12px;color:#8a8474">Frames, ${det.frames.map(esc).join(', ')}</div>`;}
  document.getElementById('sheet').innerHTML=h;document.getElementById('modal').classList.add('on');
  document.getElementById('mclose').onclick=()=>document.getElementById('modal').classList.remove('on');
}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')e.currentTarget.classList.remove('on');});
function setView(v){view=v;document.getElementById('v0').classList.toggle('on',v===0);document.getElementById('v1').classList.toggle('on',v===1);render();window.scrollTo({top:0,behavior:'smooth'});}
