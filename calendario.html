<!doctype html><html lang="pt-br"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Calendário de publicação</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;500;700&display=swap');
:root{--navy:#0b121f;--cream:#e6ded4;--wine:#721035;--red:#a6280c;--orange:#c14b21;--bg:#f4f1ea;--card:#fff;--line:#e2dccf;--muted:#6f6a60}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--navy);font-family:'Roboto',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.wrap{max-width:580px;margin:0 auto;padding:0 14px 60px}
header{position:sticky;top:0;z-index:5;background:var(--navy);color:var(--cream);margin:0 -14px;padding:16px 16px 14px;border-bottom:3px solid var(--orange)}
.top{display:flex;align-items:center;gap:10px}
.back{color:#c7bdaf;text-decoration:none;font-size:22px;line-height:1}
h1{font-family:'Bebas Neue',sans-serif;font-weight:400;letter-spacing:1px;font-size:30px;line-height:1;margin:0}
.sub{font-size:12px;color:#c7bdaf;margin:6px 0 0}
#syncnote{font-size:11px;color:var(--orange);margin-top:3px;font-weight:600}
.seg{display:flex;background:#10192b;border-radius:10px;padding:4px;gap:4px;margin-top:12px}
.seg button{flex:1;border:0;background:transparent;color:#c7bdaf;font-family:'Roboto';font-size:12.5px;font-weight:500;padding:9px 4px;border-radius:7px;cursor:pointer}
.seg button.on{background:var(--cream);color:var(--navy)}
.legend{display:flex;gap:13px;flex-wrap:wrap;margin:12px 2px 2px;font-size:12px;color:var(--muted)}
.legend span{display:inline-flex;align-items:center;gap:6px}
.dot{width:11px;height:11px;border-radius:3px;display:inline-block}
.d-l{background:var(--wine)}.d-v{background:var(--cream);border:1px solid #cdbfa6}.d-e{background:var(--navy)}.d-s{background:var(--orange)}
.wk{display:flex;align-items:baseline;gap:10px;margin:26px 2px 12px;padding-bottom:7px;border-bottom:2px solid var(--wine)}
.wk b{font-family:'Bebas Neue',sans-serif;font-weight:400;letter-spacing:1px;font-size:22px}
.wk .rng{font-size:13px;color:var(--muted)}.wk .cnt{margin-left:auto;font-size:11px;color:var(--orange);font-weight:700;letter-spacing:.5px}
.day{border-radius:13px;margin-bottom:10px;overflow:hidden;border:1px solid var(--line);background:var(--card)}
.row{display:flex;gap:10px;padding:12px 13px;align-items:flex-start}
.pill{flex:0 0 auto;text-align:center;min-width:44px}
.pill .dow{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;line-height:1;opacity:.7}
.pill .dm{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.5px;line-height:1.05}
.vid{flex:1;min-width:0}.vt{font-size:14px;font-weight:500;line-height:1.3}
.meta{display:flex;gap:8px;align-items:center;margin-top:5px;flex-wrap:wrap}
.tag{font-size:11px;color:var(--muted);background:#efeadf;border-radius:20px;padding:2px 9px}
.num{font-size:11px;color:#a59c8c;font-weight:700}
.extra{padding:13px;border-top:1px solid rgba(0,0,0,.08)}
.day.lament{background:var(--wine);border-color:var(--wine);color:var(--cream)}
.day.ensino{background:var(--navy);border-color:var(--navy);color:var(--cream)}
.day.verdade{background:var(--cream);border-color:#d8cbb2;color:var(--navy)}
.day.lament .pill .dow,.day.ensino .pill .dow{opacity:.6}
.day.lament .tag,.day.ensino .tag{background:rgba(255,255,255,.14);color:#e6ded4}
.day.verdade .tag{background:#dccdb2;color:#5a4a2e}
.day.lament .num,.day.ensino .num{color:rgba(230,222,212,.6)}
.day.lament .extra,.day.ensino .extra{border-top-color:rgba(255,255,255,.18)}
.day.verdade .extra{border-top-color:rgba(0,0,0,.12)}
.badge{display:inline-block;font-family:'Bebas Neue',sans-serif;letter-spacing:1.5px;font-size:13px;padding:3px 11px;border-radius:6px}
.badge.lament{background:var(--cream);color:var(--wine)}.badge.ensino{background:var(--orange);color:#fff}.badge.verdade{background:var(--wine);color:var(--cream)}
.assunto{font-family:'Bebas Neue',sans-serif;letter-spacing:.5px;font-size:22px;line-height:1.05;margin:9px 0 6px}
.file{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px;line-height:1.4;opacity:.75;word-break:break-word}
.done{display:flex;align-items:center;gap:8px;margin-top:11px;font-size:13px;cursor:pointer;user-select:none}
.done input{width:18px;height:18px;accent-color:var(--orange)}
.day.posted{opacity:.5}.day.posted .assunto{text-decoration:line-through}
.story{margin:0 9px 9px;background:#fbf8f1;border:1px solid var(--line);border-left:4px solid var(--orange);border-radius:0 10px 10px 0}
.story-h{width:100%;display:flex;align-items:center;gap:9px;background:transparent;border:0;cursor:pointer;padding:11px 12px;text-align:left}
.st-tag{font-family:'Bebas Neue',sans-serif;letter-spacing:1.5px;font-size:13px;color:#fff;background:var(--orange);padding:2px 9px;border-radius:5px}
.st-tema{font-size:13px;font-weight:500;color:var(--navy);flex:1}
.st-arrow{font-size:18px;color:var(--orange);transition:transform .15s}
.story[data-open="1"] .st-arrow{transform:rotate(90deg)}
.story-body{display:none;padding:0 13px 13px}.story[data-open="1"] .story-body{display:block}
.beat{margin:9px 0;font-size:13px;line-height:1.45;color:#33312c}
.beat b{font-family:'Bebas Neue',sans-serif;letter-spacing:1px;font-weight:400;font-size:14px;color:var(--wine);margin-right:7px}
.frames{margin-top:11px;font-size:11.5px;color:var(--muted)}
.frames i{font-style:normal;background:#efe7d8;border-radius:20px;padding:2px 9px;margin-right:5px;display:inline-block;margin-top:4px}
.empty{text-align:center;color:var(--muted);padding:40px 10px;font-size:14px}
:focus-visible{outline:2px solid var(--orange);outline-offset:2px}
@media(max-width:380px){h1{font-size:27px}.assunto{font-size:20px}.seg button{font-size:11.5px}}
</style></head><body><div class="wrap">

const posted = new Set();
let mode = 0, saveImpl = null;
const note = document.getElementById('syncnote');
const useFB = firebaseConfig && firebaseConfig.apiKey && firebaseConfig.apiKey.indexOf('COLE') !== 0;

async function initStore(){
  if(useFB){
    try{
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
      const { getFirestore, doc, onSnapshot, setDoc, deleteField } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const ref = doc(db, 'estado', 'calendario');
      onSnapshot(ref, (snap)=>{
        posted.clear();
        const d = snap.data() || {};
        Object.keys(d).forEach(k=>{ if(d[k]) posted.add(k); });
        render();
      }, (e)=>{ note.textContent='Erro de conexão com o Firebase'; console.error(e); });
      saveImpl = async (id,on)=>{ await setDoc(ref, { [id]: on ? true : deleteField() }, { merge:true }); };
      note.textContent = 'Sincronizado entre dispositivos';
      return;
    }catch(e){ console.error(e); note.textContent='Firebase falhou, salvando neste aparelho'; }
  } else {
    note.textContent = 'Salvo neste aparelho. Ligue o Firebase para sincronizar.';
  }
  try{ JSON.parse(localStorage.getItem('postados')||'[]').forEach(x=>posted.add(x)); }catch(e){}
  saveImpl = async (id,on)=>{ if(on)posted.add(id); else posted.delete(id); localStorage.setItem('postados', JSON.stringify([...posted])); };
  render();
}
async function toggle(id,on){ if(!useFB){ if(on)posted.add(id); else posted.delete(id); } await saveImpl(id,on); }

function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
const cls={'Lamentação':'lament','Verdade':'verdade','Ensino':'ensino'};
function storyHTML(s,open){
  let h=`<div class="story" data-open="${open?1:0}"><button class="story-h"><span class="st-tag">Story</span><span class="st-tema">${esc(s.tema)}</span><span class="st-arrow">›</span></button><div class="story-body">`;
  h+=`<div class="beat"><b>Fisgar</b>${esc(s.fisgar)}</div><div class="beat"><b>Desenvolver</b>${esc(s.desenvolver)}</div><div class="beat"><b>Interagir</b>${esc(s.interagir)}</div><div class="beat"><b>Direcionar</b>${esc(s.direcionar)}</div>`;
  if(s.frames&&s.frames.length){h+=`<div class="frames">Frames sugeridos: `+s.frames.map(f=>`<i>${esc(f)}</i>`).join('')+`</div>`;}
  h+=`</div></div>`;return h;
}
function dayHTML(d,openStory){
  const ex=d.extra,k=ex?cls[ex.tipo]:'plain',isP=ex&&posted.has(d.id);
  let h=`<div class="day ${ex?k:''} ${isP?'posted':''}">`;
  h+=`<div class="row"><div class="pill"><div class="dow">${d.dow}</div><div class="dm">${d.date}</div></div>`;
  h+=`<div class="vid"><div class="vt">${esc(d.title)}</div><div class="meta"><span class="num">vídeo ${d.id}</span><span class="tag">${esc(d.theme)}</span></div></div></div>`;
  if(ex){h+=`<div class="extra"><span class="badge ${k}">${ex.tipo}</span><div class="assunto">${esc(ex.assunto)}</div><div class="file">${esc(ex.arquivo)}</div><label class="done"><input type="checkbox" ${isP?'checked':''} data-id="${d.id}"> postado</label></div>`;}
  if(d.story){h+=storyHTML(d.story,openStory);}
  h+=`</div>`;return h;
}
function render(){
  const app=document.getElementById('app');let html='',shown=0;
  for(const w of DATA){
    let days=w.days;
    if(mode===1)days=days.filter(d=>d.extra);
    if(mode===2)days=days.filter(d=>d.story);
    if(!days.length)continue;
    const cnt=mode===2?w.days.filter(d=>d.story).length:w.days.filter(d=>d.extra).length;
    const lbl=mode===2?(cnt+' '+(cnt===1?'story':'stories')):(cnt+' '+(cnt===1?'carrossel':'carrosséis'));
    html+=`<div class="wk"><b>Semana ${w.n}</b><span class="rng">${w.label}</span><span class="cnt">${lbl}</span></div>`;
    for(const d of days)html+=dayHTML(d,mode===2);shown+=days.length;
  }
  if(!shown)html=`<div class="empty">Nada para mostrar nesta visão.</div>`;
  app.innerHTML=html;
  app.querySelectorAll('input[type=checkbox]').forEach(cb=>cb.addEventListener('change',async e=>{e.target.closest('.day').classList.toggle('posted',e.target.checked);await toggle(e.target.dataset.id,e.target.checked);}));
  app.querySelectorAll('.story-h').forEach(b=>b.addEventListener('click',()=>{const s=b.closest('.story');s.dataset.open=s.dataset.open==='1'?'0':'1';}));
}
function setMode(m){mode=m;[0,1,2].forEach(i=>document.getElementById('b'+i).classList.toggle('on',i===m));render();window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('b0').onclick=()=>setMode(0);
document.getElementById('b1').onclick=()=>setMode(1);
document.getElementById('b2').onclick=()=>setMode(2);
initStore();
</script></body></html>
