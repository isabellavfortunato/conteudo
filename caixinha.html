<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Caixinha de pergunta</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:#f4f1ea;color:#0b121f;font-family:system-ui,-apple-system,'Helvetica Neue',sans-serif}
.wrap{max-width:520px;margin:0 auto;padding:16px 14px 60px}
h1{font-size:21px;margin:4px 0 2px;font-weight:700}
.lead{font-size:13px;color:#6f6a60;margin:0 0 16px;line-height:1.5}
label{display:block;font-size:13px;font-weight:600;margin:14px 0 6px;color:#33312c}
input[type=text],textarea{width:100%;border:1px solid #d8d2c6;border-radius:10px;padding:11px 12px;
  font-size:15px;font-family:inherit;background:#fff;color:#0b121f}
textarea{resize:vertical;min-height:64px;line-height:1.4}
input:focus,textarea:focus{outline:2px solid #c14b21;outline-offset:1px;border-color:#c14b21}
.row{display:flex;gap:10px;align-items:center;margin-top:12px;flex-wrap:wrap}
.chk{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:#33312c}
.chk input{width:18px;height:18px;accent-color:#c14b21}
.swatches{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.sw{width:34px;height:34px;border-radius:8px;cursor:pointer;border:2px solid transparent}
.sw.on{border-color:#0b121f;box-shadow:0 0 0 2px #fff inset}
.btns{display:flex;gap:10px;margin-top:18px}
.btn{flex:1;border:0;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;
  font-family:inherit;background:#0b121f;color:#e6ded4}
.btn.alt{background:#fff;color:#0b121f;border:1px solid #d8d2c6}
.stage{margin-top:18px;display:flex;justify-content:center}
.frame{position:relative;width:300px;aspect-ratio:9/16;border-radius:18px;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 26px;
  box-shadow:0 10px 40px rgba(0,0,0,.18)}
.sticker{position:relative;background:#fff;border-radius:20px;padding:30px 20px 22px;width:100%;
  box-shadow:0 6px 22px rgba(0,0,0,.16);margin-top:22px}
.av{position:absolute;top:-22px;left:50%;transform:translateX(-50%);width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;overflow:hidden;border:3px solid #fff;background:#c7c7cc}
.av.grad{background:radial-gradient(circle at 30% 30%,#fdd25a,#e54b6d 45%,#9b3bd6)}
.prompt{font-size:12px;color:#9a9a9a;text-align:center;margin:0 0 6px;font-weight:500}
.question{font-size:18px;color:#1c1c1e;text-align:center;line-height:1.32;font-weight:500;word-break:break-word}
.answer{margin-top:20px;font-size:21px;font-weight:700;text-align:center;line-height:1.3;word-break:break-word}
.hint{font-size:12px;color:#9a9a9a;text-align:center;margin-top:8px}
.fs{position:fixed;inset:0;background:#111;z-index:50;display:none;align-items:center;justify-content:center;flex-direction:column}
.fs.on{display:flex}
.fs .frame{width:min(86vw,calc(86vh*9/16));box-shadow:none;border-radius:6px}
.fsbar{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;
  padding:12px 16px;color:#fff;font-size:13px;z-index:51}
.fsbar button{background:rgba(255,255,255,.16);color:#fff;border:0;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer}
.fshelp{position:fixed;bottom:14px;left:0;right:0;text-align:center;color:#cfcfcf;font-size:12px;z-index:51}
</style>
</head>
<body>
<div class="wrap">
  <h1>Caixinha de pergunta</h1>
  <p class="lead">Digite a pergunta que você quer fingir que recebeu. Escolha um fundo, tire um print e use no seu story.</p>

  <label for="q">Pergunta que vai dentro da caixinha</label>
  <textarea id="q" placeholder="Como você organiza a empresa com TDAH?"></textarea>

  <label for="p">Rótulo da caixinha</label>
  <input id="p" type="text" value="faça uma pergunta">

  <label for="a">Sua resposta, opcional, aparece embaixo</label>
  <textarea id="a" placeholder="Deixe em branco se for responder por vídeo ou áudio."></textarea>

  <label>Fundo</label>
  <div class="swatches" id="sw"></div>

  <div class="row">
    <label class="chk"><input type="checkbox" id="grad"> Avatar colorido</label>
    <label class="chk"><input type="checkbox" id="hideAns"> Esconder a resposta</label>
  </div>

  <div class="btns">
    <button class="btn" id="full">Tela cheia para o print</button>
  </div>

  <div class="stage"><div class="frame" id="frame"></div></div>
</div>

<div class="fs" id="fs">
  <div class="fsbar"><span>Tire o print agora</span><button id="close">Voltar a editar</button></div>
  <div class="frame" id="frameFs"></div>
  <div class="fshelp">Depois é só recortar as bordas no editor do Instagram.</div>
</div>

<script>
const BGS=[
  {bg:'#0b121f',fg:'#ffffff'},{bg:'#721035',fg:'#e6ded4'},{bg:'#a6280c',fg:'#e6ded4'},
  {bg:'#c14b21',fg:'#ffffff'},{bg:'#e6ded4',fg:'#0b121f'},{bg:'#ffffff',fg:'#0b121f'}
];
let bgi=0;
const q=document.getElementById('q'),p=document.getElementById('p'),a=document.getElementById('a'),
  grad=document.getElementById('grad'),hideAns=document.getElementById('hideAns');
const PERSON='<svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg>';

function swatches(){
  const c=document.getElementById('sw');c.innerHTML='';
  BGS.forEach((o,i)=>{const d=document.createElement('div');d.className='sw'+(i===bgi?' on':'');
    d.style.background=o.bg;if(o.bg==='#ffffff')d.style.borderColor='#d8d2c6';
    d.onclick=()=>{bgi=i;swatches();paint();};c.appendChild(d);});
}
function stickerHTML(){
  const pr=(p.value||'').trim()||'faça uma pergunta';
  const qq=(q.value||'').trim()||'sua pergunta aqui';
  let h=`<div class="sticker"><div class="av${grad.checked?' grad':''}">${grad.checked?'':PERSON}</div>`;
  h+=`<div class="prompt">${esc(pr)}</div><div class="question">${esc(qq)}</div></div>`;
  return h;
}
function esc(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function frameInner(){
  const o=BGS[bgi];let h=stickerHTML();
  const ans=(a.value||'').trim();
  if(ans && !hideAns.checked){h+=`<div class="answer" style="color:${o.fg}">${esc(ans)}</div>`;}
  return h;
}
function paint(){
  const o=BGS[bgi];
  ['frame','frameFs'].forEach(id=>{const f=document.getElementById(id);if(!f)return;
    f.style.background=o.bg;f.innerHTML=frameInner();});
}
[q,p,a].forEach(el=>el.addEventListener('input',paint));
grad.addEventListener('change',paint);hideAns.addEventListener('change',paint);
document.getElementById('full').onclick=()=>{paint();document.getElementById('fs').classList.add('on');};
document.getElementById('close').onclick=()=>document.getElementById('fs').classList.remove('on');
swatches();paint();
</script>
</body>
</html>
